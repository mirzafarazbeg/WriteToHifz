نسان ضعيفا"],[4,"النساء","An-Nisa",29,"ياايها الذين ءامنوا لا تاكلوا اموالكم بينكم بالباطل الا ان تكون تجارة عن تراض منكم ولا تقتلوا انفسكم ان الله كان بكم رحيما"],[4,"النساء","An-Nisa",30,"ومن يفعل ذالك عدوانا وظلما فسوف نصليه نارا وكان ذالك علي الله يسيرا"],[4,"النساء","An-Nisa",31,"ان تجتنبوا كبائر ما تنهون عنه نكفر عنكم سياتكم وندخلكم مدخلا كريما"],[4,"النساء","An-Nisa",32,"ولا تتمنوا ما فضل الله به بعضكم علي بعض للرجال نصيب مما اكتسبوا وللنساء نصيب مما اكتسبن وسلوا الله من فضله ان الله كان بكل شيء عليما"],[4,"النساء","An-Nisa",33,"ولكل جعلنا موالي مما ترك الوالدان والاقربون والذين عقدت ايمانكم فاتوهم نصيبهم ان الله كان علي كل شيء شهيدا"],[4,"النساء","An-Nisa",34,"الرجال قوامون علي النساء بما فضل الله بعضهم علي بعض وبما انفقوا من اموالهم فالصالحات قانتات حافظات للغيب بما حفظ الله والاتي تخافون نشوزهن فعظوهن واهجروهن في المضاجع واضربوهن فان اطعنكم فلا تبغوا عليهن سبيلا ان الله كان عليا كبيرا"],[4,"النساء","An-Nisa",35,"وان خفتم شقاق بينهما فابعثوا حكما من اهله وحكما من اهلها ان يريدا اصلاحا يوفق الله بينهما ان الله كان عليما خبيرا"],[4,"النساء","An-Nisa",36,"۞واعبدوا الله ولا تشركوا به شيا وبالوالدين احسانا وبذي القربي واليتامي والمساكين والجار ذي القربي والجار الجنب والصاحب بالجنب وابن السبيل وما ملكت ايمانكم ان الله لا يحب من كان مختالا فخورا"],[4,"النساء","An-Nisa",37,"الذين يبخلون ويامرون الناس بالبخل ويكتمون ما ءاتيهم الله من فضله واعتدنا للكافرين عذابا مهينا"],[4,"النساء","An-Nisa",38,"والذين ينفقون اموالهم رئاء الناس ولا يؤمنون بالله ولا باليوم الاخر ومن يكن الشيطان له قرينا فساء قرينا"],[4,"النساء","An-Nisa",39,"وماذا عليهم لو ءامنوا بالله واليوم الاخر وانفقوا مما رزقهم الله وكان الله بهم عليما"],[4,"النساء","An-Nisa",40,"ان الله لا يظلم مثقال ذرة وان تك حسنة يضاعفها ويؤت من لدنه اجرا عظيما"],[4,"النساء","An-Nisa",41,"فكيف اذا جئنا من كل امة بشهيد وجئنا بك علي هاؤلاء شهيدا"],[4,"النساء","An-Nisa",42,"يومئذ يود الذين كفروا وعصوا الرسول لو تسوي بهم الارض ولا يكتمون الله حديثا"],[4,"النساء","An-Nisa",43,"ياايها الذين ءامنوا لا تقربوا الصلواة وانتم سكاري حتي تعلموا ما تقولون ولا جنبا الا عابري سبيل حتي تغتسلوا وان كنتم مرضي او علي سفر او جاء احد منكم من الغائط او لامستم النساء فلم تجدوا ماء فتيمموا صعيدا طيبا فامسحوا بوجوهكم وايديكم ان الله كان عفوا غفورا"],[4,"النساء","An-Nisa",44,"الم تر الي الذين اوتوا نصيبا من الكتاب يشترون الضلالة ويريدون ان تضلوا السبيل"],[4,"النساء","An-Nisa",45,"والله اعلم باعدائكم وكفي بالله وليا وكفي بالله نصيرا"],[4,"النساء","An-Nisa",46,"من الذين هادوا يحرفون الكلم عن مواضعه ويقولون سمعنا وعصينا واسمع غير مسمع وراعنا ليا بالسنتهم وطعنا في الدين ولو انهم قالوا سمعنا واطعنا واسمع وانظرنا لكان خيرا لهم واقوم ولاكن لعنهم الله بكفرهم فلا يؤمنون الا قليلا"],[4,"النساء","An-Nisa",47,"ياايها الذين اوتوا الكتاب ءامنوا بما نزلنا مصدقا لما معكم من قبل ان نطمس وجوها فنردها علي ادبارها او نلعنهم كما لعنا اصحاب السبت وكان امر الله مفعولا"],[4,"النساء","An-Nisa",48,"ان الله لا يغفر ان يشرك به ويغفر ما دون ذالك لمن يشاء ومن يشرك بالله فقد افتري اثما عظيما"],[4,"النساء","An-Nisa",49,"الم تر الي الذين يزكون انفسهم بل الله يزكي من يشاء ولا يظلمون فتيلا"],[4,"النساء","An-Nisa",50,"انظر كيف يفترون علي الله الكذب وكفي به اثما مبينا"],[4,"النساء","An-Nisa",51,"الم تر الي الذين اوتوا نصيبا من الكتاب يؤمنون بالجبت والطاغوت ويقولون للذين كفروا هاؤلاء اهدي من الذين ءامنوا سبيلا"],[4,"النساء","An-Nisa",52,"اولائك الذين لعنهم الله ومن يلعن الله فلن تجد له نصيرا"],[4,"النساء","An-Nisa",53,"ام لهم نصيب من الملك فاذا لا يؤتون الناس نقيرا"],[4,"النساء","An-Nisa",54,"ام يحسدون الناس علي ما ءاتيهم الله من فضله فقد ءاتينا ءال ابراهيم الكتاب والحكمة وءاتيناهم ملكا عظيما"],[4,"النساء","An-Nisa",55,"فمنهم من ءامن به ومنهم من صد عنه وكفي بجهنم سعيرا"],[4,"النساء","An-Nisa",56,"ان الذين كفروا باياتنا سوف نصليهم نارا كلما نضجت جلودهم بدلناهم جلودا غيرها ليذوقوا العذاب ان الله كان عزيزا حكيما"],[4,"النساء","An-Nisa",57,"والذين ءامنوا وعملوا الصالحات سندخلهم جنات تجري من تحتها الانهار خالدين فيها ابدا لهم فيها ازواج مطهرة وندخلهم ظلا ظليلا"],[4,"النساء","An-Nisa",58,"۞ان الله يامركم ان تؤدوا الامانات الي اهلها واذا حكمتم بين الناس ان تحكموا بالعدل ان الله نعما يعظكم به ان الله كان سميعا بصيرا"],[4,"النساء","An-Nisa",59,"ياايها الذين ءامنوا اطيعوا الله واطيعوا الرسول واولي الامر منكم فان تنازعتم في شيء فردوه الي الله والرسول ان كنتم تؤمنون بالله واليوم الاخر ذالك خير واحسن تاويلا"],[4,"النساء","An-Nisa",60,"الم تر الي الذين يزعمون انهم ءامنوا بما انزل اليك وما انزل من قبلك يريدون ان يتحاكموا الي الطاغوت وقد امروا ان يكفروا به ويريد الشيطان ان يضلهم ضلالا بعيدا"],[4,"النساء","An-Nisa",61,"واذا قيل لهم تعالوا الي ما انزل الله والي الرسول رايت المنافقين يصدون عنك صدودا"],[4,"النساء","An-Nisa",62,"فكيف اذا اصابتهم مصيبة بما قدمت ايديهم ثم جاءوك يحلفون بالله ان اردنا الا احسانا وتوفيقا"],[4,"النساء","An-Nisa",63,"اولائك الذين يعلم الله ما في قلوبهم فاعرض عنهم وعظهم وقل لهم في انفسهم قولا بليغا"],[4,"النساء","An-Nisa",64,"وما ارسلنا من رسول الا ليطاع باذن الله ولو انهم اذ ظلموا انفسهم جاءوك فاستغفروا الله واستغفر لهم الرسول لوجدوا الله توابا رحيما"],[4,"النساء","An-Nisa",65,"فلا وربك لا يؤمنون حتي يحكموك فيما شجر بينهم ثم لا يجدوا في انفسهم حرجا مما قضيت ويسلموا تسليما"],[4,"النساء","An-Nisa",66,"ولو انا كتبنا عليهم ان اقتلوا انفسكم او اخرجوا من دياركم ما فعلوه الا قليل منهم ولو انهم فعلوا ما يوعظون به لكان خيرا لهم واشد تثبيتا"],[4,"النساء","An-Nisa",67,"واذا لاتيناهم من لدنا اجرا عظيما"],[4,"النساء","An-Nisa",68,"ولهديناهم صراطا مستقيما"],[4,"النساء","An-Nisa",69,"ومن يطع الله والرسول فاولائك مع الذين انعم الله عليهم من النبين والصديقين والشهداء والصالحين وحسن اولائك رفيقا"],[4,"النساء","An-Nisa",70,"ذالك الفضل من الله وكفي بالله عليما"],[4,"النساء","An-Nisa",71,"ياايها الذين ءامنوا خذوا حذركم فانفروا ثبات او انفروا جميعا"],[4,"النساء","An-Nisa",72,"وان منكم لمن ليبطئن فان اصابتكم مصيبة قال قد انعم الله علي اذ لم اكن معهم شهيدا"],[4,"النساء","An-Nisa",73,"ولئن اصابكم فضل من الله ليقولن كان لم تكن بينكم وبينه مودة ياليتني كنت معهم فافوز فوزا عظيما"],[4,"النساء","An-Nisa",74,"۞فليقاتل في سبيل الله الذين يشرون الحيواة الدنيا بالاخرة ومن يقاتل في سبيل الله فيقتل او يغلب فسوف نؤتيه اجرا عظيما"],[4,"النساء","An-Nisa",75,"وما لكم لا تقاتلون في سبيل الله والمستضعفين من الرجال والنساء والولدان الذين يقولون ربنا اخرجنا من هاذه القرية الظالم اهلها واجعل لنا من لدنك وليا واجعل لنا من لدنك نصيرا"],[4,"النساء","An-Nisa",76,"الذين ءامنوا يقاتلون في سبيل الله والذين كفروا يقاتلون في سبيل الطاغوت فقاتلوا اولياء الشيطان ان كيد الشيطان كان ضعيفا"],[4,"النساء","An-Nisa",77,"الم تر الي الذين قيل لهم كفوا ايديكم واقيموا الصلواة وءاتوا الزكواة فلما كتب عليهم القتال اذا فريق منهم يخشون الناس كخشية الله او اشد خشية وقالوا ربنا لم كتبت علينا القتال لولا اخرتنا الي اجل قريب قل متاع الدنيا قليل والاخرة خير لمن اتقي ولا تظلمون فتيلا"],[4,"النساء","An-Nisa",78,"اينما تكونوا يدرككم الموت ولو كنتم في بروج مشيدة وان تصبهم حسنة يقولوا هاذه من عند الله وان تصبهم سيئة يقولوا هاذه من عندك قل كل من عند الله فمال هاؤلاء القوم لا يكادون يفقهون حديثا"],[4,"النساء","An-Nisa",79,"ما اصابك من حسنة فمن الله وما اصابك من سيئة فمن نفسك وارسلناك للناس رسولا وكفي بالله شهيدا"],[4,"النساء","An-Nisa",80,"من يطع الرسول فقد اطاع الله ومن تولي فما ارسلناك عليهم حفيظا"],[4,"النساء","An-Nisa",81,"ويقولون طاعة فاذا برزوا من عندك بيت طائفة منهم غير الذي تقول والله يكتب ما يبيتون فاعرض عنهم وتوكل علي الله وكفي بالله وكيلا"],[4,"النساء","An-Nisa",82,"افلا يتدبرون القرءان ولو كان من عند غير الله لوجدوا فيه اختلافا كثيرا"],[4,"النساء","An-Nisa",83,"واذا جاءهم امر من الامن او الخوف اذاعوا به ولو ردوه الي الرسول والي اولي الامر منهم لعلمه الذين يستنبطونه منهم ولولا فضل الله عليكم ورحمته لاتبعتم الشيطان الا قليلا"],[4,"النساء","An-Nisa",84,"فقاتل في سبيل الله لا تكلف الا نفسك وحرض المؤمنين عسي الله ان يكف باس الذين كفروا والله اشد باسا واشد تنكيلا"],[4,"النساء","An-Nisa",85,"من يشفع شفاعة حسنة يكن له نصيب منها ومن يشفع شفاعة سيئة يكن له كفل منها وكان الله علي كل شيء مقيتا"],[4,"النساء","An-Nisa",86,"واذا حييتم بتحية فحيوا باحسن منها او ردوها ان الله كان علي كل شيء حسيبا"],[4,"النساء","An-Nisa",87,"الله لا الاه الا هو ليجمعنكم الي يوم القيامة لا ريب فيه ومن اصدق من الله حديثا"],[4,"النساء","An-Nisa",88,"۞فما لكم في المنافقين فئتين والله اركسهم بما كسبوا اتريدون ان تهدوا من اضل الله ومن يضلل الله فلن تجد له سبيلا"],[4,"النساء","An-Nisa",89,"ودوا لو تكفرون كما كفروا فتكونون سواء فلا تتخذوا منهم اولياء حتي يهاجروا في سبيل الله فان تولوا فخذوهم واقتلوهم حيث وجدتموهم ولا تتخذوا منهم وليا ولا نصيرا"],[4,"النساء","An-Nisa",90,"الا الذين يصلون الي قوم بينكم وبينهم ميثاق او جاءوكم حصرت صدورهم ان يقاتلوكم او يقاتلوا قومهم ولو شاء الله لسلطهم عليكم فلقاتلوكم فان اعتزلوكم فلم يقاتلوكم والقوا اليكم السلم فما جعل الله لكم عليهم سبيلا"],[4,"النساء","An-Nisa",91,"ستجدون ءاخرين يريدون ان يامنوكم ويامنوا قومهم كل ما ردوا الي الفتنة اركسوا فيها فان لم يعتزلوكم ويلقوا اليكم السلم ويكفوا ايديهم فخذوهم واقتلوهم حيث ثقفتموهم واولائكم جعلنا لكم عليهم سلطانا مبينا"],[4,"النساء","An-Nisa",92,"وما كان لمؤمن ان يقتل مؤمنا الا خطا ومن قتل مؤمنا خطا فتحرير رقبة مؤمنة ودية مسلمة الي اهله الا ان يصدقوا فان كان من قوم عدو لكم وهو مؤمن فتحرير رقبة مؤمنة وان كان من قوم بينكم وبينهم ميثاق فدية مسلمة الي اهله وتحرير رقبة مؤمنة فمن لم يجد فصيام شهرين متتابعين توبة من الله وكان الله عليما حكيما"],[4,"النساء","An-Nisa",93,"ومن يقتل مؤمنا متعمدا فجزاؤه جهنم خالدا فيها وغضب الله عليه ولعنه واعد له عذابا عظيما"],[4,"النساء","An-Nisa",94,"ياايها الذين ءامنوا اذا ضربتم في سبيل الله فتبينوا ولا تقولوا لمن القي اليكم السلام لست مؤمنا تبتغون عرض الحيواة الدنيا فعند الله مغانم كثيرة كذالك كنتم من قبل فمن الله عليكم فتبينوا ان الله كان بما تعملون خبيرا"],[4,"النساء","An-Nisa",95,"لا يستوي القاعدون من المؤمنين غير اولي الضرر والمجاهدون في سبيل الله باموالهم وانفسهم فضل الله المجاهدين باموالهم وانفسهم علي القاعدين درجة وكلا وعد الله الحسني وفضل الله المجاهدين علي القاعدين اجرا عظيما"],[4,"النساء","An-Nisa",96,"درجات منه ومغفرة ورحمة وكان الله غفورا رحيما"],[4,"النساء","An-Nisa",97,"ان الذين توفيهم الملائكة ظالمي انفسهم قالوا فيم كنتم قالوا كنا مستضعفين في الارض قالوا الم تكن ارض الله واسعة فتهاجروا فيها فاولائك ماويهم جهنم وساءت مصيرا"],[4,"النساء","An-Nisa",98,"الا المستضعفين من الرجال والنساء والولدان لا يستطيعون حيلة ولا يهتدون سبيلا"],[4,"النساء","An-Nisa",99,"فاولائك عسي الله ان يعفو عنهم وكان الله عفوا غفورا"],[4,"النساء","An-Nisa",100,"۞ومن يهاجر في سبيل الله يجد في الارض مراغما كثيرا وسعة ومن يخرج من بيته مهاجرا الي الله ورسوله ثم يدركه الموت فقد وقع اجره علي الله وكان الله غفورا رحيما"],[4,"النساء","An-Nisa",101,"واذا ضربتم في الارض فليس عليكم جناح ان تقصروا من الصلواة ان خفتم ان يفتنكم الذين كفروا ان الكافرين كانوا لكم عدوا مبينا"],[4,"النساء","An-Nisa",102,"واذا كنت فيهم فاقمت لهم الصلواة فلتقم طائفة منهم معك ولياخذوا اسلحتهم فاذا سجدوا فليكونوا من ورائكم ولتات طائفة اخري لم يصلوا فليصلوا معك ولياخذوا حذرهم واسلحتهم ود الذين كفروا لو تغفلون عن اسلحتكم وامتعتكم فيميلون عليكم ميلة واحدة ولا جناح عليكم ان كان بكم اذي من مطر او كنتم مرضي ان تضعوا اسلحتكم وخذوا حذركم ان الله اعد للكافرين عذابا مهينا"],[4,"النساء","An-Nisa",103,"فاذا قضيتم الصلواة فاذكروا الله قياما وقعودا وعلي جنوبكم فاذا اطماننتم فاقيموا الصلواة ان الصلواة كانت علي المؤمنين كتابا موقوتا"],[4,"النساء","An-Nisa",104,"ولا تهنوا في ابتغاء القوم ان تكونوا تالمون فانهم يالمون كما تالمون وترجون من الله ما لا يرجون وكان الله عليما حكيما"],[4,"النساء","An-Nisa",105,"انا انزلنا اليك الكتاب بالحق لتحكم بين الناس بما اريك الله ولا تكن للخائنين خصيما"],[4,"النساء","An-Nisa",106,"واستغفر الله ان الله كان غفورا رحيما"],[4,"النساء","An-Nisa",107,"ولا تجادل عن الذين يختانون انفسهم ان الله لا يحب من كان خوانا اثيما"],[4,"النساء","An-Nisa",108,"يستخفون من الناس ولا يستخفون من الله وهو معهم اذ يبيتون ما لا يرضي من القول وكان الله بما يعملون محيطا"],[4,"النساء","An-Nisa",109,"هاانتم هاؤلاء جادلتم عنهم في الحيواة الدنيا فمن يجادل الله عنهم يوم القيامة ام من يكون عليهم وكيلا"],[4,"النساء","An-Nisa",110,"ومن يعمل سوءا او يظلم نفسه ثم يستغفر الله يجد الله غفورا رحيما"],[4,"النساء","An-Nisa",111,"ومن يكسب اثما فانما يكسبه علي نفسه وكان الله عليما حكيما"],[4,"النساء","An-Nisa",112,"ومن يكسب خطية او اثما ثم يرم به بريا فقد احتمل بهتانا واثما مبينا"],[4,"النساء","An-Nisa",113,"ولولا فضل الله عليك ورحمته لهمت طائفة منهم ان يضلوك وما يضلون الا انفسهم وما يضرونك من شيء وانزل الله عليك الكتاب والحكمة وعلمك ما لم تكن تعلم وكان فضل الله عليك عظيما"],[4,"النساء","An-Nisa",114,"۞لا خير في كثير من نجويهم الا من امر بصدقة او معروف او اصلاح بين الناس ومن يفعل ذالك ابتغاء مرضات الله فسوف نؤتيه اجرا عظيما"],[4,"النساء","An-Nisa",115,"ومن يشاقق الرسول من بعد ما تبين له الهدي ويتبع غير سبيل المؤمنين نوله ما تولي ونصله جهنم وساءت مصيرا"],[4,"النساء","An-Nisa",116,"ان الله لا يغفر ان يشرك به ويغفر ما دون ذالك لمن يشاء ومن يشرك بالله فقد ضل ضلالا بعيدا"],[4,"النساء","An-Nisa",117,"ان يدعون من دونه الا اناثا وان يدعون الا شيطانا مريدا"],[4,"النساء","An-Nisa",118,"لعنه الله وقال لاتخذن من عبادك نصيبا مفروضا"],[4,"النساء","An-Nisa",119,"ولاضلنهم ولامنينهم ولامرنهم فليبتكن ءاذان الانعام ولامرنهم فليغيرن خلق الله ومن يتخذ الشيطان وليا من دون الله فقد خسر خسرانا مبينا"],[4,"النساء","An-Nisa",120,"يعدهم ويمنيهم وما يعدهم الشيطان الا غرورا"],[4,"النساء","An-Nisa",121,"اولائك ماويهم جهنم ولا يجدون عنها محيصا"],[4,"النساء","An-Nisa",122,"والذين ءامنوا وعملوا الصالحات سندخلهم جنات تجري من تحتها الانهار خالدين فيها ابدا وعد الله حقا ومن اصدق من الله قيلا"],[4,"النساء","An-Nisa",123,"ليس بامانيكم ولا اماني اهل الكتاب من يعمل سوءا يجز به ولا يجد له من دون الله وليا ولا نصيرا"],[4,"النساء","An-Nisa",124,"ومن يعمل من الصالحات من ذكر او انثي وهو مؤمن فاولائك يدخلون الجنة ولا يظلمون نقيرا"],[4,"النساء","An-Nisa",125,"ومن احسن دينا ممن اسلم وجهه لله وهو محسن واتبع ملة ابراهيم حنيفا واتخذ الله ابراهيم خليلا"],[4,"النساء","An-Nisa",126,"ولله ما في السماوات وما في الارض وكان الله بكل شيء محيطا"],[4,"النساء","An-Nisa",127,"ويستفتونك في النساء قل الله يفتيكم فيهن وما يتلي عليكم في الكتاب في يتامي النساء الاتي لا تؤتونهن ما كتب لهن وترغبون ان تنكحوهن والمستضعفين من الولدان وان تقوموا لليتامي بالقسط وما تفعلوا من خير فان الله كان به عليما"],[4,"النساء","An-Nisa",128,"وان امراة خافت من بعلها نشوزا او اعراضا فلا جناح عليهما ان يصلحا بينهما صلحا والصلح خير واحضرت الانفس الشح وان تحسنوا وتتقوا فان الله كان بما تعملون خبيرا"],[4,"النساء","An-Nisa",129,"ولن تستطيعوا ان تعدلوا بين النساء ولو حرصتم فلا تميلوا كل الميل فتذروها كالمعلقة وان تصلحوا وتتقوا فان الله كان غفورا رحيما"],[4,"النساء","An-Nisa",130,"وان يتفرقا يغن الله كلا من سعته وكان الله واسعا حكيما"],[4,"النساء","An-Nisa",131,"ولله ما في السماوات وما في الارض ولقد وصينا الذين اوتوا الكتاب من قبلكم واياكم ان اتقوا الله وان تكفروا فان لله ما في السماوات وما في الارض وكان الله غنيا حميدا"],[4,"النساء","An-Nisa",132,"ولله ما في السماوات وما في الارض وكفي بالله وكيلا"],[4,"النساء","An-Nisa",133,"ان يشا يذهبكم ايها الناس ويات باخرين وكان الله علي ذالك قديرا"],[4,"النساء","An-Nisa",134,"من كان يريد ثواب الدنيا فعند الله ثواب الدنيا والاخرة وكان الله سميعا بصيرا"],[4,"النساء","An-Nisa",135,"۞ياايها الذين ءامنوا كونوا قوامين بالقسط شهداء لله ولو علي انفسكم او الوالدين والاقربين ان يكن غنيا او فقيرا فالله اولي بهما فلا تتبعوا الهوي ان تعدلوا وان تلوا او تعرضوا فان الله كان بما تعملون خبيرا"],[4,"النساء","An-Nisa",136,"ياايها الذين ءامنوا ءامنوا بالله ورسوله والكتاب الذي نزل علي رسوله والكتاب الذي انزل من قبل ومن يكفر بالله وملائكته وكتبه ورسله واليوم الاخر فقد ضل ضلالا بعيدا"],[4,"النساء","An-Nisa",137,"ان الذين ءامنوا ثم كفروا ثم ءامنوا ثم كفروا ثم ازدادوا كفرا لم يكن الله ليغفر لهم ولا ليهديهم سبيلا"],[4,"النساء","An-Nisa",138,"بشر المنافقين بان لهم عذابا اليما"],[4,"النساء","An-Nisa",139,"الذين يتخذون الكافرين اولياء من دون المؤمنين ايبتغون عندهم العزة فان العزة لله جميعا"],[4,"النساء","An-Nisa",140,"وقد نزل عليكم في الكتاب ان اذا سمعتم ءايات الله يكفر بها ويستهزا بها فلا تقعدوا معهم حتي يخوضوا في حديث غيره انكم اذا مثلهم ان الله جامع المنافقين والكافرين في جهنم جميعا"],[4,"النساء","An-Nisa",141,"الذين يتربصون بكم فان كان لكم فتح من الله قالوا الم نكن معكم وان كان للكافرين نصيب قالوا الم نستحوذ عليكم ونمنعكم من المؤمنين فالله يحكم بينكم يوم القيامة ولن يجعل الله للكافرين علي المؤمنين سبيلا"],[4,"النساء","An-Nisa",142,"ان المنافقين يخادعون الله وهو خادعهم واذا قاموا الي الصلواة قاموا كسالي يراءون الناس ولا يذكرون الله الا قليلا"],[4,"النساء","An-Nisa",143,"مذبذبين بين ذالك لا الي هاؤلاء ولا الي هاؤلاء ومن يضلل الله فلن تجد له سبيلا"],[4,"النساء","An-Nisa",144,"ياايها الذين ءامنوا لا تتخذوا الكافرين اولياء من دون المؤمنين اتريدون ان تجعلوا لله عليكم سلطانا مبينا"],[4,"النساء","An-Nisa",145,"ان المنافقين في الدرك الاسفل من النار ولن تجد لهم نصيرا"],[4,"النساء","An-Nisa",146,"الا الذين تابوا واصلحوا واعتصموا بالله واخلصوا دينهم لله فاولائك مع المؤمنين وسوف يؤت الله المؤمنين اجرا عظيما"],[4,"النساء","An-Nisa",147,"ما يفعل الله بعذابكم ان شكرتم وءامنتم وكان الله شاكرا عليما"],[4,"النساء","An-Nisa",148,"۞لا يحب الله الجهر بالسوء من القول الا من ظلم وكان الله سميعا عليما"],[4,"النساء","An-Nisa",149,"ان تبدوا خيرا او تخفوه او تعفوا عن سوء فان الله كان عفوا قديرا"],[4,"النساء","An-Nisa",150,"ان الذين يكفرون بالله ورسله ويريدون ان يفرقوا بين الله ورسله ويقولون نؤمن ببعض ونكفر ببعض ويريدون ان يتخذوا بين ذالك سبيلا"],[4,"النساء","An-Nisa",151,"اولائك هم الكافرون حقا واعتدنا للكافرين عذابا مهينا"],[4,"النساء","An-Nisa",152,"والذين ءامنوا بالله ورسله ولم يفرقوا بين احد منهم اولائك سوف يؤتيهم اجورهم وكان الله غفورا رحيما"],[4,"النساء","An-Nisa",153,"يسلك اهل الكتاب ان تنزل عليهم كتابا من السماء فقد سالوا موسي اكبر من ذالك فقالوا ارنا الله جهرة فاخذتهم الصاعقة بظلمهم ثم اتخذوا العجل من بعد ما جاءتهم البينات فعفونا عن ذالك وءاتينا موسي سلطانا مبينا"],[4,"النساء","An-Nisa",154,"ورفعنا فوقهم الطور بميثاقهم وقلنا لهم ادخلوا الباب سجدا وقلنا لهم لا تعدوا في السبت واخذنا منهم ميثاقا غليظا"],[4,"النساء","An-Nisa",155,"فبما نقضهم ميثاقهم وكفرهم بايات الله وقتلهم الانبياء بغير حق وقولهم قلوبنا غلف بل طبع الله عليها بكفرهم فلا يؤمنون الا قليلا"],[4,"النساء","An-Nisa",156,"وبكفرهم وقولهم علي مريم بهتانا عظيما"],[4,"النساء","An-Nisa",157,"وقولهم انا قتلنا المسيح عيسي ابن مريم رسول الله وما قتلوه وما صلبوه ولاكن شبه لهم وان الذين اختلفوا فيه لفي شك منه ما لهم به من علم الا اتباع الظن وما قتلوه يقينا"],[4,"النساء","An-Nisa",158,"بل رفعه الله اليه وكان الله عزيزا حكيما"],[4,"النساء","An-Nisa",159,"وان من اهل الكتاب الا ليؤمنن به قبل موته ويوم القيامة يكون عليهم شهيدا"],[4,"النساء","An-Nisa",160,"فبظلم من الذين هادوا حرمنا عليهم طيبات احلت لهم وبصدهم عن سبيل الله كثيرا"],[4,"النساء","An-Nisa",161,"واخذهم الربواا وقد نهوا عنه واكلهم اموال الناس بالباطل واعتدنا للكافرين منهم عذابا اليما"],[4,"النساء","An-Nisa",162,"لاكن الراسخون في العلم منهم والمؤمنون يؤمنون بما انزل اليك وما انزل من قبلك والمقيمين الصلواة والمؤتون الزكواة والمؤمنون بالله واليوم الاخر اولائك سنؤتيهم اجرا عظيما"],[4,"النساء","An-Nisa",163,"۞انا اوحينا اليك كما اوحينا الي نوح والنبين من بعده واوحينا الي ابراهيم واسماعيل واسحاق ويعقوب والاسباط وعيسي وايوب ويونس وهارون وسليمان وءاتينا داود زبورا"],[4,"النساء","An-Nisa",164,"ورسلا قد قصصناهم عليك من قبل ورسلا لم نقصصهم عليك وكلم الله موسي تكليما"],[4,"النساء","An-Nisa",165,"رسلا مبشرين ومنذرين لئلا يكون للناس علي الله حجة بعد الرسل وكان الله عزيزا حكيما"],[4,"النساء","An-Nisa",166,"لاكن الله يشهد بما انزل اليك انزله بعلمه والملائكة يشهدون وكفي بالله شهيدا"],[4,"النساء","An-Nisa",167,"ان الذين كفروا وصدوا عن سبيل الله قد ضلوا ضلالا بعيدا"],[4,"النساء","An-Nisa",168,"ان الذين كفروا وظلموا لم يكن الله ليغفر لهم ولا ليهديهم طريقا"],[4,"النساء","An-Nisa",169,"الا طريق جهنم خالدين فيها ابدا وكان ذالك علي الله يسيرا"],[4,"النساء","An-Nisa",170,"ياايها الناس قد جاءكم الرسول بالحق من ربكم فامنوا خيرا لكم وان تكفروا فان لله ما في السماوات والارض وكان الله عليما حكيما"],[4,"النساء","An-Nisa",171,"يااهل الكتاب لا تغلوا في دينكم ولا تقولوا علي الله الا الحق انما المسيح عيسي ابن مريم رسول الله وكلمته القيها الي مريم وروح منه فامنوا بالله ورسله ولا تقولوا ثلاثة انتهوا خيرا لكم انما الله الاه واحد سبحانه ان يكون له ولد له ما في السماوات وما في الارض وكفي بالله وكيلا"],[4,"النساء","An-Nisa",172,"لن يستنكف المسيح ان يكون عبدا لله ولا الملائكة المقربون ومن يستنكف عن عبادته ويستكبر فسيحشرهم اليه جميعا"],[4,"النساء","An-Nisa",173,"فاما الذين ءامنوا وعملوا الصالحات فيوفيهم اجورهم ويزيدهم من فضله واما الذين استنكفوا واستكبروا فيعذبهم عذابا اليما ولا يجدون لهم من دون الله وليا ولا نصيرا"],[4,"النساء","An-Nisa",174,"ياايها الناس قد جاءكم برهان من ربكم وانزلنا اليكم نورا مبينا"],[4,"النساء","An-Nisa",175,"فاما الذين ءامنوا بالله واعتصموا به فسيدخلهم في رحمة منه وفضل ويهديهم اليه صراطا مستقيما"],[4,"النساء","An-Nisa",176,"يستفتونك قل الله يفتيكم في الكلالة ان امرؤا هلك ليس له ولد وله اخت فلها نصف ما ترك وهو يرثها ان لم يكن لها ولد فان كانتا اثنتين فلهما الثلثان مما ترك وان كانوا اخوة رجالا ونساء فللذكر مثل حظ الانثيين يبين الله لكم ان تضلوا والله بكل شيء عليم"],[5,"المائدة","Al-Ma'idah",1,"ياايها الذين ءامنوا اوفوا بالعقود احلت لكم بهيمة الانعام الا ما يتلي عليكم غير محلي الصيد وانتم حرم ان الله يحكم ما يريد"],[5,"المائدة","Al-Ma'idah",2,"ياايها الذين ءامنوا لا تحلوا شعائر الله ولا الشهر الحرام ولا الهدي ولا القلائد ولا ءامين البيت الحرام يبتغون فضلا من ربهم ورضوانا واذا حللتم فاصطادوا ولا يجرمنكم شنان قوم ان صدوكم عن المسجد الحرام ان تعتدوا وتعاونوا علي البر والتقوي ولا تعاونوا علي الاثم والعدوان واتقوا الله ان الله شديد العقاب"],[5,"المائدة","Al-Ma'idah",3,"حرمت عليكم الميتة والدم ولحم الخنزير وما اهل لغير الله به والمنخنقة والموقوذة والمتردية والنطيحة وما اكل السبع الا ما ذكيتم وما ذبح علي النصب وان تستقسموا بالازلام ذالكم فسق اليوم يئس الذين كفروا من دينكم فلا تخشوهم واخشون اليوم اكملت لكم دينكم واتممت عليكم نعمتي ورضيت لكم الاسلام دينا فمن اضطر في مخمصة غير متجانف لاثم فان الله غفور رحيم"],[5,"المائدة","Al-Ma'idah",4,"يسلونك ماذا احل لهم قل احل لكم الطيبات وما علمتم من الجوارح مكلبين تعلمونهن مما علمكم الله فكلوا مما امسكن عليكم واذكروا اسم الله عليه واتقوا الله ان الله سريع الحساب"],[5,"المائدة","Al-Ma'idah",5,"اليوم احل لكم الطيبات وطعام الذين اوتوا الكتاب حل لكم وطعامكم حل لهم والمحصنات من المؤمنات والمحصنات من الذين اوتوا الكتاب من قبلكم اذا ءاتيتموهن اجورهن محصنين غير مسافحين ولا متخذي اخدان ومن يكفر بالايمان فقد حبط عمله وهو في الاخرة من الخاسرين"],[5,"المائدة","Al-Ma'idah",6,"ياايها الذين ءامنوا اذا قمتم الي الصلواة فاغسلوا وجوهكم وايديكم الي المرافق وامسحوا برءوسكم وارجلكم الي الكعبين وان كنتم جنبا فاطهروا وان كنتم مرضي او علي سفر او جاء احد منكم من الغائط او لامستم النساء فلم تجدوا ماء فتيمموا صعيدا طيبا فامسحوا بوجوهكم وايديكم منه ما يريد الله ليجعل عليكم من حرج ولاكن يريد ليطهركم وليتم نعمته عليكم لعلكم تشكرون"],[5,"المائدة","Al-Ma'idah",7,"واذكروا نعمة الله عليكم وميثاقه الذي واثقكم به اذ قلتم سمعنا واطعنا واتقوا الله ان الله عليم بذات الصدور"],[5,"المائدة","Al-Ma'idah",8,"ياايها الذين ءامنوا كونوا قوامين لله شهداء بالقسط ولا يجرمنكم شنان قوم علي الا تعدلوا اعدلوا هو اقرب للتقوي واتقوا الله ان الله خبير بما تعملون"],[5,"المائدة","Al-Ma'idah",9,"وعد الله الذين ءامنوا وعملوا الصالحات لهم مغفرة واجر عظيم"],[5,"المائدة","Al-Ma'idah",10,"والذين كفروا وكذبوا باياتنا اولائك اصحاب الجحيم"],[5,"المائدة","Al-Ma'idah",11,"ياايها الذين ءامنوا اذكروا نعمت الله عليكم اذ هم قوم ان يبسطوا اليكم ايديهم فكف ايديهم عنكم واتقوا الله وعلي الله فليتوكل المؤمنون"],[5,"المائدة","Al-Ma'idah",12,"۞ولقد اخذ الله ميثاق بني اسراءيل وبعثنا منهم اثني عشر نقيبا وقال الله اني معكم لئن اقمتم الصلواة وءاتيتم الزكواة وءامنتم برسلي وعزرتموهم واقرضتم الله قرضا حسنا لاكفرن عنكم سياتكم ولادخلنكم جنات تجري من تحتها الانهار فمن كفر بعد ذالك منكم فقد ضل سواء السبيل"],[5,"المائدة","Al-Ma'idah",13,"فبما نقضهم ميثاقهم لعناهم وجعلنا قلوبهم قاسية يحرفون الكلم عن مواضعه ونسوا حظا مما ذكروا به ولا تزال تطلع علي خائنة منهم الا قليلا منهم فاعف عنهم واصفح ان الله يحب المحسنين"],[5,"المائدة","Al-Ma'idah",14,"ومن الذين قالوا انا نصاري اخذنا ميثاقهم فنسوا حظا مما ذكروا به فاغرينا بينهم العداوة والبغضاء الي يوم القيامة وسوف ينبئهم الله بما كانوا يصنعون"],[5,"المائدة","Al-Ma'idah",15,"يااهل الكتاب قد جاءكم رسولنا يبين لكم كثيرا مما كنتم تخفون من الكتاب ويعفوا عن كثير قد جاءكم من الله نور وكتاب مبين"],[5,"المائدة","Al-Ma'idah",16,"يهدي به الله من اتبع رضوانه سبل السلام ويخرجهم من الظلمات الي النور باذنه ويهديهم الي صراط مستقيم"],[5,"المائدة","Al-Ma'idah",17,"لقد كفر الذين قالوا ان الله هو المسيح ابن مريم قل فمن يملك من الله شيا ان اراد ان يهلك المسيح ابن مريم وامه ومن في الارض جميعا ولله ملك السماوات والارض وما بينهما يخلق ما يشاء والله علي كل شيء قدير"],[5,"المائدة","Al-Ma'idah",18,"وقالت اليهود والنصاري نحن ابناؤا الله واحباؤه قل فلم يعذبكم بذنوبكم بل انتم بشر ممن خلق يغفر لمن يشاء ويعذب من يشاء ولله ملك السماوات والارض وما بينهما واليه المصير"],[5,"المائدة","Al-Ma'idah",19,"يااهل الكتاب قد جاءكم رسولنا يبين لكم علي فترة من الرسل ان تقولوا ما جاءنا من بشير ولا نذير فقد جاءكم بشير ونذير والله علي كل شيء قدير"],[5,"المائدة","Al-Ma'idah",20,"واذ قال موسي لقومه ياقوم اذكروا نعمة الله عليكم اذ جعل فيكم انبياء وجعلكم ملوكا وءاتيكم ما لم يؤت احدا من العالمين"],[5,"المائدة","Al-Ma'idah",21,"ياقوم ادخلوا الارض المقدسة التي كتب الله لكم ولا ترتدوا علي ادباركم فتنقلبوا خاسرين"],[5,"المائدة","Al-Ma'idah",22,"قالوا ياموسي ان فيها قوما جبارين وانا لن ندخلها حتي يخرجوا منها فان يخرجوا منها فانا داخلون"],[5,"المائدة","Al-Ma'idah",23,"قال رجلان من الذين يخافون انعم الله عليهما ادخلوا عليهم الباب فاذا دخلتموه فانكم غالبون وعلي الله فتوكلوا ان كنتم مؤمنين"],[5,"المائدة","Al-Ma'idah",24,"قالوا ياموسي انا لن ندخلها ابدا ما داموا فيها فاذهب انت وربك فقاتلا انا هاهنا قاعدون"],[5,"المائدة","Al-Ma'idah",25,"قال رب اني لا املك الا نفسي واخي فافرق بيننا وبين القوم الفاسقين"],[5,"المائدة","Al-Ma'idah",26,"قال فانها محرمة عليهم اربعين سنة يتيهون في الارض فلا تاس علي القوم الفاسقين"],[5,"المائدة","Al-Ma'idah",27,"۞واتل عليهم نبا ابني ءادم بالحق اذ قربا قربانا فتقبل من احدهما ولم يتقبل من الاخر قال لاقتلنك قال انما يتقبل الله من المتقين"],[5,"المائدة","Al-Ma'idah",28,"لئن بسطت الي يدك لتقتلني ما انا بباسط يدي اليك لاقتلك اني اخاف الله رب العالمين"],[5,"المائدة","Al-Ma'idah",29,"اني اريد ان تبوا باثمي واثمك فتكون من اصحاب النار وذالك جزاؤا الظالمين"],[5,"المائدة","Al-Ma'idah",30,"فطوعت له نفسه قتل اخيه فقتله فاصبح من الخاسرين"],[5,"المائدة","Al-Ma'idah",31,"فبعث الله غرابا يبحث في الارض ليريه كيف يواري سوءة اخيه قال ياويلتي اعجزت ان اكون مثل هاذا الغراب فاواري سوءة اخي فاصبح من النادمين"],[5,"المائدة","Al-Ma'idah",32,"من اجل ذالك كتبنا علي بني اسراءيل انه من قتل نفسا بغير نفس او فساد في الارض فكانما قتل الناس جميعا ومن احياها فكانما احيا الناس جميعا ولقد جاءتهم رسلنا بالبينات ثم ان كثيرا منهم بعد ذالك في الارض لمسرفون"],[5,"المائدة","Al-Ma'idah",33,"انما جزاؤا الذين يحاربون الله ورسوله ويسعون في الارض فسادا ان يقتلوا او يصلبوا او تقطع ايديهم وارجلهم من خلاف او ينفوا من الارض ذالك لهم خزي في الدنيا ولهم في الاخرة عذاب عظيم"],[5,"المائدة","Al-Ma'idah",34,"الا الذين تابوا من قبل ان تقدروا عليهم فاعلموا ان الله غفور رحيم"],[5,"المائدة","Al-Ma'idah",35,"ياايها الذين ءامنوا اتقوا الله وابتغوا اليه الوسيلة وجاهدوا في سبيله لعلكم تفلحون"],[5,"المائدة","Al-Ma'idah",36,"ان الذين كفروا لو ان لهم ما في الارض جميعا ومثله معه ليفتدوا به من عذاب يوم القيامة ما تقبل منهم ولهم عذاب اليم"],[5,"المائدة","Al-Ma'idah",37,"يريدون ان يخرجوا من النار وما هم بخارجين منها ولهم عذاب مقيم"],[5,"المائدة","Al-Ma'idah",38,"والسارق والسارقة فاقطعوا ايديهما جزاء بما كسبا نكالا من الله والله عزيز حكيم"],[5,"المائدة","Al-Ma'idah",39,"فمن تاب من بعد ظلمه واصلح فان الله يتوب عليه ان الله غفور رحيم"],[5,"المائدة","Al-Ma'idah",40,"الم تعلم ان الله له ملك السماوات والارض يعذب من يشاء ويغفر لمن يشاء والله علي كل شيء قدير"],[5,"المائدة","Al-Ma'idah",41,"۞ياايها الرسول لا يحزنك الذين يسارعون في الكفر من الذين قالوا ءامنا بافواههم ولم تؤمن قلوبهم ومن الذين هادوا سماعون للكذب سماعون لقوم ءاخرين لم ياتوك يحرفون الكلم من بعد مواضعه يقولون ان اوتيتم هاذا فخذوه وان لم تؤتوه فاحذروا ومن يرد الله فتنته فلن تملك له من الله شيا اولائك الذين لم يرد الله ان يطهر قلوبهم لهم في الدنيا خزي ولهم في الاخرة عذاب عظيم"],[5,"المائدة","Al-Ma'idah",42,"سماعون للكذب اكالون للسحت فان جاءوك فاحكم بينهم او اعرض عنهم وان تعرض عنهم فلن يضروك شيا وان حكمت فاحكم بينهم بالقسط ان الله يحب المقسطين"],[5,"المائدة","Al-Ma'idah",43,"وكيف يحكمونك وعندهم التورية فيها حكم الله ثم يتولون من بعد ذالك وما اولائك بالمؤمنين"],[5,"المائدة","Al-Ma'idah",44,"انا انزلنا التورية فيها هدي ونور يحكم بها النبيون الذين اسلموا للذين هادوا والربانيون والاحبار بما استحفظوا من كتاب الله وكانوا عليه شهداء فلا تخشوا الناس واخشون ولا تشتروا باياتي ثمنا قليلا ومن لم يحكم بما انزل الله فاولائك هم الكافرون"],[5,"المائدة","Al-Ma'idah",45,"وكتبنا عليهم فيها ان النفس بالنفس والعين بالعين والانف بالانف والاذن بالاذن والسن بالسن والجروح قصاص فمن تصدق به فهو كفارة له ومن لم يحكم بما انزل الله فاولائك هم الظالمون"],[5,"المائدة","Al-Ma'idah",46,"وقفينا علي ءاثارهم بعيسي ابن مريم مصدقا لما بين يديه من التورية وءاتيناه الانجيل فيه هدي ونور ومصدقا لما بين يديه من التورية وهدي وموعظة للمتقين"],[5,"المائدة","Al-Ma'idah",47,"وليحكم اهل الانجيل بما انزل الله فيه ومن لم يحكم بما انزل الله فاولائك هم الفاسقون"],[5,"المائدة","Al-Ma'idah",48,"وانزلنا اليك الكتاب بالحق مصدقا لما بين يديه من الكتاب ومهيمنا عليه فاحكم بينهم بما انزل الله ولا تتبع اهواءهم عما جاءك من الحق لكل جعلنا منكم شرعة ومنهاجا ولو شاء الله لجعلكم امة واحدة ولاكن ليبلوكم في ما ءاتيكم فاستبقوا الخيرات الي الله مرجعكم جميعا فينبئكم بما كنتم فيه تختلفون"],[5,"المائدة","Al-Ma'idah",49,"وان احكم بينهم بما انزل الله ولا تتبع اهواءهم واحذرهم ان يفتنوك عن بعض ما انزل الله اليك فان تولوا فاعلم انما يريد الله ان يصيبهم ببعض ذنوبهم وان كثيرا من الناس لفاسقون"],[5,"المائدة","Al-Ma'idah",50,"افحكم الجاهلية يبغون ومن احسن من الله حكما لقوم يوقنون"],[5,"المائدة","Al-Ma'idah",51,"۞ياايها الذين ءامنوا لا تتخذوا اليهود والنصاري اولياء بعضهم اولياء بعض ومن يتولهم منكم فانه منهم ان الله لا يهدي القوم الظالمين"],[5,"المائدة","Al-Ma'idah",52,"فتري الذين في قلوبهم مرض يسارعون فيهم يقولون نخشي ان تصيبنا دائرة فعسي الله ان ياتي بالفتح او امر من عنده فيصبحوا علي ما اسروا في انفسهم نادمين"],[5,"المائدة","Al-Ma'idah",53,"ويقول الذين ءامنوا اهاؤلاء الذين اقسموا بالله جهد ايمانهم انهم لمعكم حبطت اعمالهم فاصبحوا خاسرين"],[5,"المائدة","Al-Ma'idah",54,"ياايها الذين ءامنوا من يرتد منكم عن دينه فسوف ياتي الله بقوم يحبهم ويحبونه اذلة علي المؤمنين اعزة علي الكافرين يجاهدون في سبيل الله ولا يخافون لومة لائم ذالك فضل الله يؤتيه من يشاء والله واسع عليم"],[5,"المائدة","Al-Ma'idah",55,"انما وليكم الله ورسوله والذين ءامنوا الذين يقيمون الصلواة ويؤتون الزكواة وهم راكعون"],[5,"المائدة","Al-Ma'idah",56,"ومن يتول الله ورسوله والذين ءامنوا فان حزب الله هم الغالبون"],[5,"المائدة","Al-Ma'idah",57,"ياايها الذين ءامنوا لا تتخذوا الذين اتخذوا دينكم هزوا ولعبا من الذين اوتوا الكتاب من قبلكم والكفار اولياء واتقوا الله ان كنتم مؤمنين"],[5,"المائدة","Al-Ma'idah",58,"واذا ناديتم الي الصلواة اتخذوها هزوا ولعبا ذالك بانهم قوم لا يعقلون"],[5,"المائدة","Al-Ma'idah",59,"قل يااهل الكتاب هل تنقمون منا الا ان ءامنا بالله وما انزل الينا وما انزل من قبل وان اكثركم فاسقون"],[5,"المائدة","Al-Ma'idah",60,"قل هل انبئكم بشر من ذالك مثوبة عند الله من لعنه الله وغضب عليه وجعل منهم القردة والخنازير وعبد الطاغوت اولائك شر مكانا واضل عن سواء السبيل"],[5,"المائدة","Al-Ma'idah",61,"واذا جاءوكم قالوا ءامنا وقد دخلوا بالكفر وهم قد خرجوا به والله اعلم بما كانوا يكتمون"],[5,"المائدة","Al-Ma'idah",62,"وتري كثيرا منهم يسارعون في الاثم والعدوان واكلهم السحت لبئس ما كانوا يعملون"],[5,"المائدة","Al-Ma'idah",63,"لولا ينهيهم الربانيون والاحبار عن قولهم الاثم واكلهم السحت لبئس ما كانوا يصنعون"],[5,"المائدة","Al-Ma'idah",64,"وقالت اليهود يد الله مغلولة غلت ايديهم ولعنوا بما قالوا بل يداه مبسوطتان ينفق كيف يشاء وليزيدن كثيرا منهم ما انزل اليك من ربك طغيانا وكفرا والقينا بينهم العداوة والبغضاء الي يوم القيامة كلما اوقدوا نارا للحرب اطفاها الله ويسعون في الارض فسادا والله لا يحب المفسدين"],[5,"المائدة","Al-Ma'idah",65,"ولو ان اهل الكتاب ءامنوا واتقوا لكفرنا عنهم سياتهم ولادخلناهم جنات النعيم"],[5,"المائدة","Al-Ma'idah",66,"ولو انهم اقاموا التورية والانجيل وما انزل اليهم من ربهم لاكلوا من فوقهم ومن تحت ارجلهم منهم امة مقتصدة وكثير منهم ساء ما يعملون"],[5,"المائدة","Al-Ma'idah",67,"۞ياايها الرسول بلغ ما انزل اليك من ربك وان لم تفعل فما بلغت رسالته والله يعصمك من الناس ان الله لا يهدي القوم الكافرين"],[5,"المائدة","Al-Ma'idah",68,"قل يااهل الكتاب لستم علي شيء حتي تقيموا التورية والانجيل وما انزل اليكم من ربكم وليزيدن كثيرا منهم ما انزل اليك من ربك طغيانا وكفرا فلا تاس علي القوم الكافرين"],[5,"المائدة","Al-Ma'idah",69,"ان الذين ءامنوا والذين هادوا والصابون والنصاري من ءامن بالله واليوم الاخر وعمل صالحا فلا خوف عليهم ولا هم يحزنون"],[5,"المائدة","Al-Ma'idah",70,"لقد اخذنا ميثاق بني اسراءيل وارسلنا اليهم رسلا كلما جاءهم رسول بما لا تهوي انفسهم فريقا كذبوا وفريقا يقتلون"],[5,"المائدة","Al-Ma'idah",71,"وحسبوا الا تكون فتنة فعموا وصموا ثم تاب الله عليهم ثم عموا وصموا كثير منهم والله بصير بما يعملون"],[5,"المائدة","Al-Ma'idah",72,"لقد كفر الذين قالوا ان الله هو المسيح ابن مريم وقال المسيح يابني اسراءيل اعبدوا الله ربي وربكم انه من يشرك بالله فقد حرم الله عليه الجنة وماويه النار وما للظالمين من انصار"],[5,"المائدة","Al-Ma'idah",73,"لقد كفر الذين قالوا ان الله ثالث ثلاثة وما من الاه الا الاه واحد وان لم ينتهوا عما يقولون ليمسن الذين كفروا منهم عذاب اليم"],[5,"المائدة","Al-Ma'idah",74,"افلا يتوبون الي الله ويستغفرونه والله غفور رحيم"],[5,"المائدة","Al-Ma'idah",75,"ما المسيح ابن مريم الا رسول قد خلت من قبله الرسل وامه صديقة كانا ياكلان الطعام انظر كيف نبين لهم الايات ثم انظر اني يؤفكون"],[5,"المائدة","Al-Ma'idah",76,"قل اتعبدون من دون الله ما لا يملك لكم ضرا ولا نفعا والله هو السميع العليم"],[5,"المائدة","Al-Ma'idah",77,"قل يااهل الكتاب لا تغلوا في دينكم غير الحق ولا تتبعوا اهواء قوم قد ضلوا من قبل واضلوا كثيرا وضلوا عن سواء السبيل"],[5,"المائدة","Al-Ma'idah",78,"لعن الذين كفروا من بني اسراءيل علي لسان داود وعيسي ابن مريم ذالك بما عصوا وكانوا يعتدون"],[5,"المائدة","Al-Ma'idah",79,"كانوا لا يتناهون عن منكر فعلوه لبئس ما كانوا يفعلون"],[5,"المائدة","Al-Ma'idah",80,"تري كثيرا منهم يتولون الذين كفروا لبئس ما قدمت لهم انفسهم ان سخط الله عليهم وفي العذاب هم خالدون"],[5,"المائدة","Al-Ma'idah",81,"ولو كانوا يؤمنون بالله والنبي وما انزل اليه ما اتخذوهم اولياء ولاكن كثيرا منهم فاسقون"],[5,"المائدة","Al-Ma'idah",82,"۞لتجدن اشد الناس عداوة للذين ءامنوا اليهود والذين اشركوا ولتجدن اقربهم مودة للذين ءامنوا الذين قالوا انا نصاري ذالك بان منهم قسيسين ورهبانا وانهم لا يستكبرون"],[5,"المائدة","Al-Ma'idah",83,"واذا سمعوا ما انزل الي الرسول تري اعينهم تفيض من الدمع مما عرفوا من الحق يقولون ربنا ءامنا فاكتبنا مع الشاهدين"],[5,"المائدة","Al-Ma'idah",84,"وما لنا لا نؤمن بالله وما جاءنا من الحق ونطمع ان يدخلنا ربنا مع القوم الصالحين"],[5,"المائدة","Al-Ma'idah",85,"فاثابهم الله بما قالوا جنات تجري من تحتها الانهار خالدين فيها وذالك جزاء المحسنين"],[5,"المائدة","Al-Ma'idah",86,"والذين كفروا وكذبوا باياتنا اولائك اصحاب الجحيم"],[5,"المائدة","Al-Ma'idah",87,"ياايها الذين ءامنوا لا تحرموا طيبات ما احل الله لكم ولا تعتدوا ان الله لا يحب المعتدين"],[5,"المائدة","Al-Ma'idah",88,"وكلوا مما رزقكم الله حلالا طيبا واتقوا الله الذي انتم به مؤمنون"],[5,"المائدة","Al-Ma'idah",89,"لا يؤاخذكم الله باللغو في ايمانكم ولاكن يؤاخذكم بما عقدتم الايمان فكفارته اطعام عشرة مساكين من اوسط ما تطعمون اهليكم او كسوتهم او تحرير رقبة فمن لم يجد فصيام ثلاثة ايام ذالك كفارة ايمانكم اذا حلفتم واحفظوا ايمانكم كذالك يبين الله لكم ءاياته لعلكم تشكرون"],[5,"المائدة","Al-Ma'idah",90,"ياايها الذين ءامنوا انما الخمر والميسر والانصاب والازلام رجس من عمل الشيطان فاجتنبوه لعلكم تفلحون"],[5,"المائدة","Al-Ma'idah",91,"انما يريد الشيطان ان يوقع بينكم العداوة والبغضاء في الخمر والميسر ويصدكم عن ذكر الله وعن الصلواة فهل انتم منتهون"],[5,"المائدة","Al-Ma'idah",92,"واطيعوا الله واطيعوا الرسول واحذروا فان توليتم فاعلموا انما علي رسولنا البلاغ المبين"],[5,"المائدة","Al-Ma'idah",93,"ليس علي الذين ءامنوا وعملوا الصالحات جناح فيما طعموا اذا ما اتقوا وءامنوا وعملوا الصالحات ثم اتقوا وءامنوا ثم اتقوا واحسنوا والله يحب المحسنين"],[5,"المائدة","Al-Ma'idah",94,"ياايها الذين ءامنوا ليبلونكم الله بشيء من الصيد تناله ايديكم ورماحكم ليعلم الله من يخافه بالغيب فمن اعتدي بعد ذالك فله عذاب اليم"],[5,"المائدة","Al-Ma'idah",95,"ياايها الذين ءامنوا لا تقتلوا الصيد وانتم حرم ومن قتله منكم متعمدا فجزاء مثل ما قتل من النعم يحكم به ذوا عدل منكم هديا بالغ الكعبة او كفارة طعام مساكين او عدل ذالك صياما ليذوق وبال امره عفا الله عما سلف ومن عاد فينتقم الله منه والله عزيز ذو انتقام"],[5,"المائدة","Al-Ma'idah",96,"احل لكم صيد البحر وطعامه متاعا لكم وللسيارة وحرم عليكم صيد البر ما دمتم حرما واتقوا الله الذي اليه تحشرون"],[5,"المائدة","Al-Ma'idah",97,"۞جعل الله الكعبة البيت الحرام قياما للناس والشهر الحرام والهدي والقلائد ذالك لتعلموا ان الله يعلم ما في السماوات وما في الارض وان الله بكل شيء عليم"],[5,"المائدة","Al-Ma'idah",98,"اعلموا ان الله شديد العقاب وان الله غفور رحيم"],[5,"المائدة","Al-Ma'idah",99,"ما علي الرسول الا البلاغ والله يعلم ما تبدون وما تكتمون"],[5,"المائدة","Al-Ma'idah",100,"قل لا يستوي الخبيث والطيب ولو اعجبك كثرة الخبيث فاتقوا الله يااولي الالباب لعلكم تفلحون"],[5,"المائدة","Al-Ma'idah",101,"ياايها الذين ءامنوا لا تسلوا عن اشياء ان تبد لكم تسؤكم وان تسلوا عنها حين ينزل القرءان تبد لكم عفا الله عنها والله غفور حليم"],[5,"المائدة","Al-Ma'idah",102,"قد سالها قوم من قبلكم ثم اصبحوا بها كافرين"],[5,"المائدة","Al-Ma'idah",103,"ما جعل الله من بحيرة ولا سائبة ولا وصيلة ولا حام ولاكن الذين كفروا يفترون علي الله الكذب واكثرهم لا يعقلون"],[5,"المائدة","Al-Ma'idah",104,"واذا قيل لهم تعالوا الي ما انزل الله والي الرسول قالوا حسبنا ما وجدنا عليه ءاباءنا اولو كان ءاباؤهم لا يعلمون شيا ولا يهتدون"],[5,"المائدة","Al-Ma'idah",105,"ياايها الذين ءامنوا عليكم انفسكم لا يضركم من ضل اذا اهتديتم الي الله مرجعكم جميعا فينبئكم بما كنتم تعملون"],[5,"المائدة","Al-Ma'idah",106,"ياايها الذين ءامنوا شهادة بينكم اذا حضر احدكم الموت حين الوصية اثنان ذوا عدل منكم او ءاخران من غيركم ان انتم ضربتم في الارض فاصابتكم مصيبة الموت تحبسونهما من بعد الصلواة فيقسمان بالله ان ارتبتم لا نشتري به ثمنا ولو كان ذا قربي ولا نكتم شهادة الله انا اذا لمن الاثمين"],[5,"المائدة","Al-Ma'idah",107,"فان عثر علي انهما استحقا اثما فاخران يقومان مقامهما من الذين استحق عليهم الاوليان فيقسمان بالله لشهادتنا احق من شهادتهما وما اعتدينا انا اذا لمن الظالمين"],[5,"المائدة","Al-Ma'idah",108,"ذالك ادني ان ياتوا بالشهادة علي وجهها او يخافوا ان ترد ايمان بعد ايمانهم واتقوا الله واسمعوا والله لا يهدي القوم الفاسقين"],[5,"المائدة","Al-Ma'idah",109,"۞يوم يجمع الله الرسل فيقول ماذا اجبتم قالوا لا علم لنا انك انت علام الغيوب"],[5,"المائدة","Al-Ma'idah",110,"اذ قال الله ياعيسي ابن مريم اذكر نعمتي عليك وعلي والدتك اذ ايدتك بروح القدس تكلم الناس في المهد وكهلا واذ علمتك الكتاب والحكمة والتورية والانجيل واذ تخلق من الطين كهية الطير باذني فتنفخ فيها فتكون طيرا باذني وتبرئ الاكمه والابرص باذني واذ تخرج الموتي باذني واذ كففت بني اسراءيل عنك اذ جئتهم بالبينات فقال الذين كفروا منهم ان هاذا الا سحر مبين"],[5,"المائدة","Al-Ma'idah",111,"واذ اوحيت الي الحوارين ان ءامنوا بي وبرسولي قالوا ءامنا واشهد باننا مسلمون"],[5,"المائدة","Al-Ma'idah",112,"اذ قال الحواريون ياعيسي ابن مريم هل يستطيع ربك ان ينزل علينا مائدة من السماء قال اتقوا الله ان كنتم مؤمنين"],[5,"المائدة","Al-Ma'idah",113,"قالوا نريد ان ناكل منها وتطمئن قلوبنا ونعلم ان قد صدقتنا ونكون عليها من الشاهدين"],[5,"المائدة","Al-Ma'idah",114,"قال عيسي ابن مريم اللهم ربنا انزل علينا مائدة من السماء تكون لنا عيدا لاولنا وءاخرنا وءاية منك وارزقنا وانت خير الرازقين"],[5,"المائدة","Al-Ma'idah",115,"قال الله اني منزلها عليكم فمن يكفر بعد منكم فاني اعذبه عذابا لا اعذبه احدا من العالمين"],[5,"المائدة","Al-Ma'idah",116,"واذ قال الله ياعيسي ابن مريم ءانت قلت للناس اتخذوني وامي الاهين من دون الله قال سبحانك ما يكون لي ان اقول ما ليس لي بحق ان كنت قلته فقد علمته تعلم ما في نفسي ولا اعلم ما في نفسك انك انت علام الغيوب"],[5,"المائدة","Al-Ma'idah",117,"ما قلت لهم الا ما امرتني به ان اعبدوا الله ربي وربكم وكنت عليهم شهيدا ما دمت فيهم فلما توفيتني كنت انت الرقيب عليهم وانت علي كل شيء شهيد"],[5,"المائدة","Al-Ma'idah",118,"ان تعذبهم فانهم عبادك وان تغفر لهم فانك انت العزيز الحكيم"],[5,"المائدة","Al-Ma'idah",119,"قال الله هاذا يوم ينفع الصادقين صدقهم لهم جنات تجري من تحتها الانهار خالدين فيها ابدا رضي الله عنهم ورضوا عنه ذالك الفوز العظيم"],[5,"المائدة","Al-Ma'idah",120,"لله ملك السماوات والارض وما فيهن وهو علي كل شيء قدير"],[6,"الأنعام","Al-An'am",1,"الحمد لله الذي خلق السماوات والارض وجعل الظلمات والنور ثم الذين كفروا بربهم يعدلون"],[6,"الأنعام","Al-An'am",2,"هو الذي خلقكم من طين ثم قضي اجلا واجل مسمي عنده ثم انتم تمترون"],[6,"الأنعام","Al-An'am",3,"وهو الله في السماوات وفي الارض يعلم سركم وجهركم ويعلم ما تكسبون"],[6,"الأنعام","Al-An'am",4,"وما تاتيهم من ءاية من ءايات ربهم الا كانوا عنها معرضين"],[6,"الأنعام","Al-An'am",5,"فقد كذبوا بالحق لما جاءهم فسوف ياتيهم انباؤا ما كانوا به يستهزءون"],[6,"الأنعام","Al-An'am",6,"الم يروا كم اهلكنا من قبلهم من قرن مكناهم في الارض ما لم نمكن لكم وارسلنا السماء عليهم مدرارا وجعلنا الانهار تجري من تحتهم فاهلكناهم بذنوبهم وانشانا من بعدهم قرنا ءاخرين"],[6,"الأنعام","Al-An'am",7,"ولو نزلنا عليك كتابا في قرطاس فلمسوه بايديهم لقال الذين كفروا ان هاذا الا سحر مبين"],[6,"الأنعام","Al-An'am",8,"وقالوا لولا انزل عليه ملك ولو انزلنا ملكا لقضي الامر ثم لا ينظرون"],[6,"الأنعام","Al-An'am",9,"ولو جعلناه ملكا لجعلناه رجلا وللبسنا عليهم ما يلبسون"],[6,"الأنعام","Al-An'am",10,"ولقد استهزئ برسل من قبلك فحاق بالذين سخروا منهم ما كانوا به يستهزءون"],[6,"الأنعام","Al-An'am",11,"قل سيروا في الارض ثم انظروا كيف كان عاقبة المكذبين"],[6,"الأنعام","Al-An'am",12,"قل لمن ما في السماوات والارض قل لله كتب علي نفسه الرحمة ليجمعنكم الي يوم القيامة لا ريب فيه الذين خسروا انفسهم فهم لا يؤمنون"],[6,"الأنعام","Al-An'am",13,"۞وله ما سكن في اليل والنهار وهو السميع العليم"],[6,"الأنعام","Al-An'am",14,"قل اغير الله اتخذ وليا فاطر السماوات والارض وهو يطعم ولا يطعم قل اني امرت ان اكون اول من اسلم ولا تكونن من المشركين"],[6,"الأنعام","Al-An'am",15,"قل اني اخاف ان عصيت ربي عذاب يوم عظيم"],[6,"الأنعام","Al-An'am",16,"من يصرف عنه يومئذ فقد رحمه وذالك الفوز المبين"],[6,"الأنعام","Al-An'am",17,"وان يمسسك الله بضر فلا كاشف له الا هو وان يمسسك بخير فهو علي كل شيء قدير"],[6,"الأنعام","Al-An'am",18,"وهو القاهر فوق عباده وهو الحكيم الخبير"],[6,"الأنعام","Al-An'am",19,"قل اي شيء اكبر شهادة قل الله شهيد بيني وبينكم واوحي الي هاذا القرءان لانذركم به ومن بلغ ائنكم لتشهدون ان مع الله ءالهة اخري قل لا اشهد قل انما هو الاه واحد وانني بريء مما تشركون"],[6,"الأنعام","Al-An'am",20,"الذين ءاتيناهم الكتاب يعرفونه كما يعرفون ابناءهم الذين خسروا انفسهم فهم لا يؤمنون"],[6,"الأنعام","Al-An'am",21,"ومن اظلم ممن افتري علي الله كذبا او كذب باياته انه لا يفلح الظالمون"],[6,"الأنعام","Al-An'am",22,"ويوم نحشرهم جميعا ثم نقول للذين اشركوا اين شركاؤكم الذين كنتم تزعمون"],[6,"الأنعام","Al-An'am",23,"ثم لم تكن فتنتهم الا ان قالوا والله ربنا ما كنا مشركين"],[6,"الأنعام","Al-An'am",24,"انظر كيف كذبوا علي انفسهم وضل عنهم ما كانوا يفترون"],[6,"الأنعام","Al-An'am",25,"ومنهم من يستمع اليك وجعلنا علي قلوبهم اكنة ان يفقهوه وفي ءاذانهم وقرا وان يروا كل ءاية لا يؤمنوا بها حتي اذا جاءوك يجادلونك يقول الذين كفروا ان هاذا الا اساطير الاولين"],[6,"الأنعام","Al-An'am",26,"وهم ينهون عنه وينون عنه وان يهلكون الا انفسهم وما يشعرون"],[6,"الأنعام","Al-An'am",27,"ولو تري اذ وقفوا علي النار فقالوا ياليتنا نرد ولا نكذب بايات ربنا ونكون من المؤمنين"],[6,"الأنعام","Al-An'am",28,"بل بدا لهم ما كانوا يخفون من قبل ولو ردوا لعادوا لما نهوا عنه وانهم لكاذبون"],[6,"الأنعام","Al-An'am",29,"وقالوا ان هي الا حياتنا الدنيا وما نحن بمبعوثين"],[6,"الأنعام","Al-An'am",30,"ولو تري اذ وقفوا علي ربهم قال اليس هاذا بالحق قالوا بلي وربنا قال فذوقوا العذاب بما كنتم تكفرون"],[6,"الأنعام","Al-An'am",31,"قد خسر الذين كذبوا بلقاء الله حتي اذا جاءتهم الساعة بغتة قالوا ياحسرتنا علي ما فرطنا فيها وهم يحملون اوزارهم علي ظهورهم الا ساء ما يزرون"],[6,"الأنعام","Al-An'am",32,"وما الحيواة الدنيا الا لعب ولهو وللدار الاخرة خير للذين يتقون افلا تعقلون"],[6,"الأنعام","Al-An'am",33,"قد نعلم انه ليحزنك الذي يقولون فانهم لا يكذبونك ولاكن الظالمين بايات الله يجحدون"],[6,"الأنعام","Al-An'am",34,"ولقد كذبت رسل من قبلك فصبروا علي ما كذبوا واوذوا حتي اتيهم نصرنا ولا مبدل لكلمات الله ولقد جاءك من نباي المرسلين"],[6,"الأنعام","Al-An'am",35,"وان كان كبر عليك اعراضهم فان استطعت ان تبتغي نفقا في الارض او سلما في السماء فتاتيهم باية ولو شاء الله لجمعهم علي الهدي فلا تكونن من الجاهلين"],[6,"الأنعام","Al-An'am",36,"۞انما يستجيب الذين يسمعون والموتي يبعثهم الله ثم اليه يرجعون"],[6,"الأنعام","Al-An'am",37,"وقالوا لولا نزل عليه ءاية من ربه قل ان الله قادر علي ان ينزل ءاية ولاكن اكثرهم لا يعلمون"],[6,"الأنعام","Al-An'am",38,"وما من دابة في الارض ولا طائر يطير بجناحيه الا امم امثالكم ما فرطنا في الكتاب من شيء ثم الي ربهم يحشرون"],[6,"الأنعام","Al-An'am",39,"والذين كذبوا باياتنا صم وبكم في الظلمات من يشا الله يضلله ومن يشا يجعله علي صراط مستقيم"],[6,"الأنعام","Al-An'am",40,"قل ارءيتكم ان اتيكم عذاب الله او اتتكم الساعة اغير الله تدعون ان كنتم صادقين"],[6,"الأنعام","Al-An'am",41,"بل اياه تدعون فيكشف ما تدعون اليه ان شاء وتنسون ما تشركون"],[6,"الأنعام","Al-An'am",42,"ولقد ارسلنا الي امم من قبلك فاخذناهم بالباساء والضراء لعلهم يتضرعون"],[6,"الأنعام","Al-An'am",43,"فلولا اذ جاءهم باسنا تضرعوا ولاكن قست قلوبهم وزين لهم الشيطان ما كانوا يعملون"],[6,"الأنعام","Al-An'am",44,"فلما نسوا ما ذكروا به فتحنا عليهم ابواب كل شيء حتي اذا فرحوا بما اوتوا اخذناهم بغتة فاذا هم مبلسون"],[6,"الأنعام","Al-An'am",45,"فقطع دابر القوم الذين ظلموا والحمد لله رب العالمين"],[6,"الأنعام","Al-An'am",46,"قل ارءيتم ان اخذ الله سمعكم وابصاركم وختم علي قلوبكم من الاه غير الله ياتيكم به انظر كيف نصرف الايات ثم هم يصدفون"],[6,"الأنعام","Al-An'am",47,"قل ارءيتكم ان اتيكم عذاب الله بغتة او جهرة هل يهلك الا القوم الظالمون"],[6,"الأنعام","Al-An'am",48,"وما نرسل المرسلين الا مبشرين ومنذرين فمن ءامن واصلح فلا خوف عليهم ولا هم يحزنون"],[6,"الأنعام","Al-An'am",49,"والذين كذبوا باياتنا يمسهم العذاب بما كانوا يفسقون"],[6,"الأنعام","Al-An'am",50,"قل لا اقول لكم عندي خزائن الله ولا اعلم الغيب ولا اقول لكم اني ملك ان اتبع الا ما يوحي الي قل هل يستوي الاعمي والبصير افلا تتفكرون"],[6,"الأنعام","Al-An'am",51,"وانذر به الذين يخافون ان يحشروا الي ربهم ليس لهم من دونه ولي ولا شفيع لعلهم يتقون"],[6,"الأنعام","Al-An'am",52,"ولا تطرد الذين يدعون ربهم بالغدواة والعشي يريدون وجهه ما عليك من حسابهم من شيء وما من حسابك عليهم من شيء فتطردهم فتكون من الظالمين"],[6,"الأنعام","Al-An'am",53,"وكذالك فتنا بعضهم ببعض ليقولوا اهاؤلاء من الله عليهم من بيننا اليس الله باعلم بالشاكرين"],[6,"الأنعام","Al-An'am",54,"واذا جاءك الذين يؤمنون باياتنا فقل سلام عليكم كتب ربكم علي نفسه الرحمة انه من عمل منكم سوءا بجهالة ثم تاب من بعده واصلح فانه غفور رحيم"],[6,"الأنعام","Al-An'am",55,"وكذالك نفصل الايات ولتستبين سبيل المجرمين"],[6,"الأنعام","Al-An'am",56,"قل اني نهيت ان اعبد الذين تدعون من دون الله قل لا اتبع اهواءكم قد ضللت اذا وما انا من المهتدين"],[6,"الأنعام","Al-An'am",57,"قل اني علي بينة من ربي وكذبتم به ما عندي ما تستعجلون به ان الحكم الا لله يقص الحق وهو خير الفاصلين"],[6,"الأنعام","Al-An'am",58,"قل لو ان عندي ما تستعجلون به لقضي الامر بيني وبينكم والله اعلم بالظالمين"],[6,"الأنعام","Al-An'am",59,"۞وعنده مفاتح الغيب لا يعلمها الا هو ويعلم ما في البر والبحر وما تسقط من ورقة الا يعلمها ولا حبة في ظلمات الارض ولا رطب ولا يابس الا في كتاب مبين"],[6,"الأنعام","Al-An'am",60,"وهو الذي يتوفيكم باليل ويعلم ما جرحتم بالنهار ثم يبعثكم فيه ليقضي اجل مسمي ثم اليه مرجعكم ثم ينبئكم بما كنتم تعملون"],[6,"الأنعام","Al-An'am",61,"وهو القاهر فوق عباده ويرسل عليكم حفظة حتي اذا جاء احدكم الموت توفته رسلنا وهم لا يفرطون"],[6,"الأنعام","Al-An'am",62,"ثم ردوا الي الله موليهم الحق الا له الحكم وهو اسرع الحاسبين"],[6,"الأنعام","Al-An'am",63,"قل من ينجيكم من ظلمات البر والبحر تدعونه تضرعا وخفية لئن انجينا من هاذه لنكونن من الشاكرين"],[6,"الأنعام","Al-An'am",64,"قل الله ينجيكم منها ومن كل كرب ثم انتم تشركون"],[6,"الأنعام","Al-An'am",65,"قل هو القادر علي ان يبعث عليكم عذابا من فوقكم او من تحت ارجلكم او يلبسكم شيعا ويذيق بعضكم باس بعض انظر كيف نصرف الايات لعلهم يفقهون"],[6,"الأنعام","Al-An'am",66,"وكذب به قومك وهو الحق قل لست عليكم بوكيل"],[6,"الأنعام","Al-An'am",67,"لكل نبا مستقر وسوف تعلمون"],[6,"الأنعام","Al-An'am",68,"واذا رايت الذين يخوضون في ءاياتنا فاعرض عنهم حتي يخوضوا في حديث غيره واما ينسينك الشيطان فلا تقعد بعد الذكري مع القوم الظالمين"],[6,"الأنعام","Al-An'am",69,"وما علي الذين يتقون من حسابهم من شيء ولاكن ذكري لعلهم يتقون"],[6,"الأنعام","Al-An'am",70,"وذر الذين اتخذوا دينهم لعبا ولهوا وغرتهم الحيواة الدنيا وذكر به ان تبسل نفس بما كسبت ليس لها من دون الله ولي ولا شفيع وان تعدل كل عدل لا يؤخذ منها اولائك الذين ابسلوا بما كسبوا لهم شراب من حميم وعذاب اليم بما كانوا يكفرون"],[6,"الأنعام","Al-An'am",71,"قل اندعوا من دون الله ما لا ينفعنا ولا يضرنا ونرد علي اعقابنا بعد اذ هدينا الله كالذي استهوته الشياطين في الارض حيران له اصحاب يدعونه الي الهدي ائتنا قل ان هدي الله هو الهدي وامرنا لنسلم لرب العالمين"],[6,"الأنعام","Al-An'am",72,"وان اقيموا الصلواة واتقوه وهو الذي اليه تحشرون"],[6,"الأنعام","Al-An'am",73,"وهو الذي خلق السماوات والارض بالحق ويوم يقول كن فيكون قوله الحق وله الملك يوم ينفخ في الصور عالم الغيب والشهادة وهو الحكيم الخبير"],[6,"الأنعام","Al-An'am",74,"۞واذ قال ابراهيم لابيه ءازر اتتخذ اصناما ءالهة اني اريك وقومك في ضلال مبين"],[6,"الأنعام","Al-An'am",75,"وكذالك نري ابراهيم ملكوت السماوات والارض وليكون من الموقنين"],[6,"الأنعام","Al-An'am",76,"فلما جن عليه اليل رءا كوكبا قال هاذا ربي فلما افل قال لا احب الافلين"],[6,"الأنعام","Al-An'am",77,"فلما رءا القمر بازغا قال هاذا ربي فلما افل قال لئن لم يهدني ربي لاكونن من القوم الضالين"],[6,"الأنعام","Al-An'am",78,"فلما رءا الشمس بازغة قال هاذا ربي هاذا اكبر فلما افلت قال ياقوم اني بريء مما تشركون"],[6,"الأنعام","Al-An'am",79,"اني وجهت وجهي للذي فطر السماوات والارض حنيفا وما انا من المشركين"],[6,"الأنعام","Al-An'am",80,"وحاجه قومه قال اتحاجوني في الله وقد هدين ولا اخاف ما تشركون به الا ان يشاء ربي شيا وسع ربي كل شيء علما افلا تتذكرون"],[6,"الأنعام","Al-An'am",81,"وكيف اخاف ما اشركتم ولا تخافون انكم اشركتم بالله ما لم ينزل به عليكم سلطانا فاي الفريقين احق بالامن ان كنتم تعلمون"],[6,"الأنعام","Al-An'am",82,"الذين ءامنوا ولم يلبسوا ايمانهم بظلم اولائك لهم الامن وهم مهتدون"],[6,"الأنعام","Al-An'am",83,"وتلك حجتنا ءاتيناها ابراهيم علي قومه نرفع درجات من نشاء ان ربك حكيم عليم"],[6,"الأنعام","Al-An'am",84,"ووهبنا له اسحاق ويعقوب كلا هدينا ونوحا هدينا من قبل ومن ذريته داود وسليمان وايوب ويوسف وموسي وهارون وكذالك نجزي المحسنين"],[6,"الأنعام","Al-An'am",85,"وزكريا ويحيي وعيسي والياس كل من الصالحين"],[6,"الأنعام","Al-An'am",86,"واسماعيل واليسع ويونس ولوطا وكلا فضلنا علي العالمين"],[6,"الأنعام","Al-An'am",87,"ومن ءابائهم وذرياتهم واخوانهم واجتبيناهم وهديناهم الي صراط مستقيم"],[6,"الأنعام","Al-An'am",88,"ذالك هدي الله يهدي به من يشاء من عباده ولو اشركوا لحبط عنهم ما كانوا يعملون"],[6,"الأنعام","Al-An'am",89,"اولائك الذين ءاتيناهم الكتاب والحكم والنبوة فان يكفر بها هاؤلاء فقد وكلنا بها قوما ليسوا بها بكافرين"],[6,"الأنعام","Al-An'am",90,"اولائك الذين هدي الله فبهديهم اقتده قل لا اسلكم عليه اجرا ان هو الا ذكري للعالمين"],[6,"الأنعام","Al-An'am",91,"وما قدروا الله حق قدره اذ قالوا ما انزل الله علي بشر من شيء قل من انزل الكتاب الذي جاء به موسي نورا وهدي للناس تجعلونه قراطيس تبدونها وتخفون كثيرا وعلمتم ما لم تعلموا انتم ولا ءاباؤكم قل الله ثم ذرهم في خوضهم يلعبون"],[6,"الأنعام","Al-An'am",92,"وهاذا كتاب انزلناه مبارك مصدق الذي بين يديه ولتنذر ام القري ومن حولها والذين يؤمنون بالاخرة يؤمنون به وهم علي صلاتهم يحافظون"],[6,"الأنعام","Al-An'am",93,"ومن اظلم ممن افتري علي الله كذبا او قال اوحي الي ولم يوح اليه شيء ومن قال سانزل مثل ما انزل الله ولو تري اذ الظالمون في غمرات الموت والملائكة باسطوا ايديهم اخرجوا انفسكم اليوم تجزون عذاب الهون بما كنتم تقولون علي الله غير الحق وكنتم عن ءاياته تستكبرون"],[6,"الأنعام","Al-An'am",94,"ولقد جئتمونا فرادي كما خلقناكم اول مرة وتركتم ما خولناكم وراء ظهوركم وما نري معكم شفعاءكم الذين زعمتم انهم فيكم شركاؤا لقد تقطع بينكم وضل عنكم ما كنتم تزعمون"],[6,"الأنعام","Al-An'am",95,"۞ان الله فالق الحب والنوي يخرج الحي من الميت ومخرج الميت من الحي ذالكم الله فاني تؤفكون"],[6,"الأنعام","Al-An'am",96,"فالق الاصباح وجعل اليل سكنا والشمس والقمر حسبانا ذالك تقدير العزيز العليم"],[6,"الأنعام","Al-An'am",97,"وهو الذي جعل لكم النجوم لتهتدوا بها في ظلمات البر والبحر قد فصلنا الايات لقوم يعلمون"],[6,"الأنعام","Al-An'am",98,"وهو الذي انشاكم من نفس واحدة فمستقر ومستودع قد فصلنا الايات لقوم يفقهون"],[6,"الأنعام","Al-An'am",99,"وهو الذي انزل من السماء ماء فاخرجنا به نبات كل شيء فاخرجنا منه خضرا نخرج منه حبا متراكبا ومن النخل من طلعها قنوان دانية وجنات من اعناب والزيتون والرمان مشتبها وغير متشابه انظروا الي ثمره اذا اثمر وينعه ان في ذالكم لايات لقوم يؤمنون"],[6,"الأنعام","Al-An'am",100,"وجعلوا لله شركاء الجن وخلقهم وخرقوا له بنين وبنات بغير علم سبحانه وتعالي عما يصفون"],[6,"الأنعام","Al-An'am",101,"بديع السماوات والارض اني يكون له ولد ولم تكن له صاحبة وخلق كل شيء وهو بكل شيء عليم"],[6,"الأنعام","Al-An'am",102,"ذالكم الله ربكم لا الاه الا هو خالق كل شيء فاعبدوه وهو علي كل شيء وكيل"],[6,"الأنعام","Al-An'am",103,"لا تدركه الابصار وهو يدرك الابصار وهو اللطيف الخبير"],[6,"الأنعام","Al-An'am",104,"قد جاءكم بصائر من ربكم فمن ابصر فلنفسه ومن عمي فعليها وما انا عليكم بحفيظ"],[6,"الأنعام","Al-An'am",105,"وكذالك نصرف الايات وليقولوا درست ولنبينه لقوم يعلمون"],[6,"الأنعام","Al-An'am",106,"اتبع ما اوحي اليك من ربك لا الاه الا هو واعرض عن المشركين"],[6,"الأنعام","Al-An'am",107,"ولو شاء الله ما اشركوا وما جعلناك عليهم حفيظا وما انت عليهم بوكيل"],[6,"الأنعام","Al-An'am",108,"ولا تسبوا الذين يدعون من دون الله فيسبوا الله عدوا بغير علم كذالك زينا لكل امة عملهم ثم الي ربهم مرجعهم فينبئهم بما كانوا يعملون"],[6,"الأنعام","Al-An'am",109,"واقسموا بالله جهد ايمانهم لئن جاءتهم ءاية ليؤمنن بها قل انما الايات عند الله وما يشعركم انها اذا جاءت لا يؤمنون"],[6,"الأنعام","Al-An'am",110,"ونقلب افدتهم وابصارهم كما لم يؤمنوا به اول مرة ونذرهم في طغيانهم يعمهون"],[6,"الأنعام","Al-An'am",111,"۞ولو اننا نزلنا اليهم الملائكة وكلمهم الموتي وحشرنا عليهم كل شيء قبلا ما كانوا ليؤمنوا الا ان يشاء الله ولاكن اكثرهم يجهلون"],[6,"الأنعام","Al-An'am",112,"وكذالك جعلنا لكل نبي عدوا شياطين الانس والجن يوحي بعضهم الي بعض زخرف القول غرورا ولو شاء ربك ما فعلوه فذرهم وما يفترون"],[6,"الأنعام","Al-An'am",113,"ولتصغي اليه افدة الذين لا يؤمنون بالاخرة وليرضوه وليقترفوا ما هم مقترفون"],[6,"الأنعام","Al-An'am",114,"افغير الله ابتغي حكما وهو الذي انزل اليكم الكتاب مفصلا والذين ءاتيناهم الكتاب يعلمون انه منزل من ربك بالحق فلا تكونن من الممترين"],[6,"الأنعام","Al-An'am",115,"وتمت كلمت ربك صدقا وعدلا لا مبدل لكلماته وهو السميع العليم"],[6,"الأنعام","Al-An'am",116,"وان تطع اكثر من في الارض يضلوك عن سبيل الله ان يتبعون الا الظن وان هم الا يخرصون"],[6,"الأنعام","Al-An'am",117,"ان ربك هو اعلم من يضل عن سبيله وهو اعلم بالمهتدين"],[6,"الأنعام","Al-An'am",118,"فكلوا مما ذكر اسم الله عليه ان كنتم باياته مؤمنين"],[6,"الأنعام","Al-An'am",119,"وما لكم الا تاكلوا مما ذكر اسم الله عليه وقد فصل لكم ما حرم عليكم الا ما اضطررتم اليه وان كثيرا ليضلون باهوائهم بغير علم ان ربك هو اعلم بالمعتدين"],[6,"الأنعام","Al-An'am",120,"وذروا ظاهر الاثم وباطنه ان الذين يكسبون الاثم سيجزون بما كانوا يقترفون"],[6,"الأنعام","Al-An'am",121,"ولا تاكلوا مما لم يذكر اسم الله عليه وانه لفسق وان الشياطين ليوحون الي اوليائهم ليجادلوكم وان اطعتموهم انكم لمشركون"],[6,"الأنعام","Al-An'am",122,"اومن كان ميتا فاحييناه وجعلنا له نورا يمشي به في الناس كمن مثله في الظلمات ليس بخارج منها كذالك زين للكافرين ما كانوا يعملون"],[6,"الأنعام","Al-An'am",123,"وكذالك جعلنا في كل قرية اكابر مجرميها ليمكروا فيها وما يمكرون الا بانفسهم وما يشعرون"],[6,"الأنعام","Al-An'am",124,"واذا جاءتهم ءاية قالوا لن نؤمن حتي نؤتي مثل ما اوتي رسل الله الله اعلم حيث يجعل رسالته سيصيب الذين اجرموا صغار عند الله وعذاب شديد بما كانوا يمكرون"],[6,"الأنعام","Al-An'am",125,"فمن يرد الله ان يهديه يشرح صدره للاسلام ومن يرد ان يضله يجعل صدره ضيقا حرجا كانما يصعد في السماء كذالك يجعل الله الرجس علي الذين لا يؤمنون"],[6,"الأنعام","Al-An'am",126,"وهاذا صراط ربك مستقيما قد فصلنا الايات لقوم يذكرون"],[6,"الأنعام","Al-An'am",127,"۞لهم دار السلام عند ربهم وهو وليهم بما كانوا يعملون"],[6,"الأنعام","Al-An'am",128,"ويوم يحشرهم جميعا يامعشر الجن قد استكثرتم من الانس وقال اولياؤهم من الانس ربنا استمتع بعضنا ببعض وبلغنا اجلنا الذي اجلت لنا قال النار مثويكم خالدين فيها الا ما شاء الله ان ربك حكيم عليم"],[6,"الأنعام","Al-An'am",129,"وكذالك نولي بعض الظالمين بعضا بما كانوا يكسبون"],[6,"الأنعام","Al-An'am",130,"يامعشر الجن والانس الم ياتكم رسل منكم يقصون عليكم ءاياتي وينذرونكم لقاء يومكم هاذا قالوا شهدنا علي انفسنا وغرتهم الحيواة الدنيا وشهدوا علي انفسهم انهم كانوا كافرين"],[6,"الأنعام","Al-An'am",131,"ذالك ان لم يكن ربك مهلك القري بظلم واهلها غافلون"],[6,"الأنعام","Al-An'am",132,"ولكل درجات مما عملوا وما ربك بغافل عما يعملون"],[6,"الأنعام","Al-An'am",133,"وربك الغني ذو الرحمة ان يشا يذهبكم ويستخلف من بعدكم ما يشاء كما انشاكم من ذرية قوم ءاخرين"],[6,"الأنعام","Al-An'am",134,"ان ما توعدون لات وما انتم بمعجزين"],[6,"الأنعام","Al-An'am",135,"قل ياقوم اعملوا علي مكانتكم اني عامل فسوف تعلمون من تكون له عاقبة الدار انه لا يفلح الظالمون"],[6,"الأنعام","Al-An'am",136,"وجعلوا لله مما ذرا من الحرث والانعام نصيبا فقالوا هاذا لله بزعمهم وهاذا لشركائنا فما كان لشركائهم فلا يصل الي الله وما كان لله فهو يصل الي شركائهم ساء ما يحكمون"],[6,"الأنعام","Al-An'am",137,"وكذالك زين لكثير من المشركين قتل اولادهم شركاؤهم ليردوهم وليلبسوا عليهم دينهم ولو شاء الله ما فعلوه فذرهم وما يفترون"],[6,"الأنعام","Al-An'am",138,"وقالوا هاذه انعام وحرث حجر لا يطعمها الا من نشاء بزعمهم وانعام حرمت ظهورها وانعام لا يذكرون اسم الله عليها افتراء عليه سيجزيهم بما كانوا يفترون"],[6,"الأنعام","Al-An'am",139,"وقالوا ما في بطون هاذه الانعام خالصة لذكورنا ومحرم علي ازواجنا وان يكن ميتة فهم فيه شركاء سيجزيهم وصفهم انه حكيم عليم"],[6,"الأنعام","Al-An'am",140,"قد خسر الذين قتلوا اولادهم سفها بغير علم وحرموا ما رزقهم الله افتراء علي الله قد ضلوا وما كانوا مهتدين"],[6,"الأنعام","Al-An'am",141,"۞وهو الذي انشا جنات معروشات وغير معروشات والنخل والزرع مختلفا اكله والزيتون والرمان متشابها وغير متشابه كلوا من ثمره اذا اثمر وءاتوا حقه يوم حصاده ولا تسرفوا انه لا يحب المسرفين"],[6,"الأنعام","Al-An'am",142,"ومن الانعام حمولة وفرشا كلوا مما رزقكم الله ولا تتبعوا خطوات الشيطان انه لكم عدو مبين"],[6,"الأنعام","Al-An'am",143,"ثمانية ازواج من الضان اثنين ومن المعز اثنين قل ءالذكرين حرم ام الانثيين اما اشتملت عليه ارحام الانثيين نبوني بعلم ان كنتم صادقين"],[6,"الأنعام","Al-An'am",144,"ومن الابل اثنين ومن البقر اثنين قل ءالذكرين حرم ام الانثيين اما اشتملت عليه ارحام الانثيين ام كنتم شهداء اذ وصيكم الله بهاذا فمن اظلم ممن افتري علي الله كذبا ليضل الناس بغير علم ان الله لا يهدي القوم الظالمين"],[6,"الأنعام","Al-An'am",145,"قل لا اجد في ما اوحي الي محرما علي طاعم يطعمه الا ان يكون ميتة او دما مسفوحا او لحم خنزير فانه رجس او فسقا اهل لغير الله به فمن اضطر غير باغ ولا عاد فان ربك غفور رحيم"],[6,"الأنعام","Al-An'am",146,"وعلي الذين هادوا حرمنا كل ذي ظفر ومن البقر والغنم حرمنا عليهم شحومهما الا ما حملت ظهورهما او الحوايا او ما اختلط بعظم ذالك جزيناهم ببغيهم وانا لصادقون"],[6,"الأنعام","Al-An'am",147,"فان كذبوك فقل ربكم ذو رحمة واسعة ولا يرد باسه عن القوم المجرمين"],[6,"الأنعام","Al-An'am",148,"سيقول الذين اشركوا لو شاء الله ما اشركنا ولا ءاباؤنا ولا حرمنا من شيء كذالك كذب الذين من قبلهم حتي ذاقوا باسنا قل هل عندكم من علم فتخرجوه لنا ان تتبعون الا الظن وان انتم الا تخرصون"],[6,"الأنعام","Al-An'am",149,"قل فلله الحجة البالغة فلو شاء لهديكم اجمعين"],[6,"الأنعام","Al-An'am",150,"قل هلم شهداءكم الذين يشهدون ان الله حرم هاذا فان شهدوا فلا تشهد معهم ولا تتبع اهواء الذين كذبوا باياتنا والذين لا يؤمنون بالاخرة وهم بربهم يعدلون"],[6,"الأنعام","Al-An'am",151,"۞قل تعالوا اتل ما حرم ربكم عليكم الا تشركوا به شيا وبالوالدين احسانا ولا تقتلوا اولادكم من املاق نحن نرزقكم واياهم ولا تقربوا الفواحش ما ظهر منها وما بطن ولا تقتلوا النفس التي حرم الله الا بالحق ذالكم وصيكم به لعلكم تعقلون"],[6,"الأنعام","Al-An'am",152,"ولا تقربوا مال اليتيم الا بالتي هي احسن حتي يبلغ اشده واوفوا الكيل والميزان بالقسط لا نكلف نفسا الا وسعها واذا قلتم فاعدلوا ولو كان ذا قربي وبعهد الله اوفوا ذالكم وصيكم به لعلكم تذكرون"],[6,"الأنعام","Al-An'am",153,"وان هاذا صراطي مستقيما فاتبعوه ولا تتبعوا السبل فتفرق بكم عن سبيله ذالكم وصيكم به لعلكم تتقون"],[6,"الأنعام","Al-An'am",154,"ثم ءاتينا موسي الكتاب تماما علي الذي احسن وتفصيلا لكل شيء وهدي ورحمة لعلهم بلقاء ربهم يؤمنون"],[6,"الأنعام","Al-An'am",155,"وهاذا كتاب انزلناه مبارك فاتبعوه واتقوا لعلكم ترحمون"],[6,"الأنعام","Al-An'am",156,"ان تقولوا انما انزل الكتاب علي طائفتين من قبلنا وان كنا عن دراستهم لغافلين"],[6,"الأنعام","Al-An'am",157,"او تقولوا لو انا انزل علينا الكتاب لكنا اهدي منهم فقد جاءكم بينة من ربكم وهدي ورحمة فمن اظلم ممن كذب بايات الله وصدف عنها سنجزي الذين يصدفون عن ءاياتنا سوء العذاب بما كانوا يصدفون"],[6,"الأنعام","Al-An'am",158,"هل ينظرون الا ان تاتيهم الملائكة او ياتي ربك او ياتي بعض ءايات ربك يوم ياتي بعض ءايات ربك لا ينفع نفسا ايمانها لم تكن ءامنت من قبل او كسبت في ايمانها خيرا قل انتظروا انا منتظرون"],[6,"الأنعام","Al-An'am",159,"ان الذين فرقوا دينهم وكانوا شيعا لست منهم في شيء انما امرهم الي الله ثم ينبئهم بما كانوا يفعلون"],[6,"الأنعام","Al-An'am",160,"من جاء بالحسنة فله عشر امثالها ومن جاء بالسيئة فلا يجزي الا مثلها وهم لا يظلمون"],[6,"الأنعام","Al-An'am",161,"قل انني هديني ربي الي صراط مستقيم دينا قيما ملة ابراهيم حنيفا وما كان من المشركين"],[6,"الأنعام","Al-An'am",162,"قل ان صلاتي ونسكي ومحياي ومماتي لله رب العالمين"],[6,"الأنعام","Al-An'am",163,"لا شريك له وبذالك امرت وانا اول المسلمين"],[6,"الأنعام","Al-An'am",164,"قل اغير الله ابغي ربا وهو رب كل شيء ولا تكسب كل نفس الا عليها ولا تزر وازرة وزر اخري ثم الي ربكم مرجعكم فينبئكم بما كنتم فيه تختلفون"],[6,"الأنعام","Al-An'am",165,"وهو الذي جعلكم خلائف الارض ورفع بعضكم فوق بعض درجات ليبلوكم في ما ءاتيكم ان ربك سريع العقاب وانه لغفور رحيم"],[7,"الأعراف","Al-A'raf",1,"المص"],[7,"الأعراف","Al-A'raf",2,"كتاب انزل اليك فلا يكن في صدرك حرج منه لتنذر به وذكري للمؤمنين"],[7,"الأعراف","Al-A'raf",3,"اتبعوا ما انزل اليكم من ربكم ولا تتبعوا من دونه اولياء قليلا ما تذكرون"],[7,"الأعراف","Al-A'raf",4,"وكم من قرية اهلكناها فجاءها باسنا بياتا او هم قائلون"],[7,"الأعراف","Al-A'raf",5,"فما كان دعويهم اذ جاءهم باسنا الا ان قالوا انا كنا ظالمين"],[7,"الأعراف","Al-A'raf",6,"فلنسلن الذين ارسل اليهم ولنسلن المرسلين"],[7,"الأعراف","Al-A'raf",7,"فلنقصن عليهم بعلم وما كنا غائبين"],[7,"الأعراف","Al-A'raf",8,"والوزن يومئذ الحق فمن ثقلت موازينه فاولائك هم المفلحون"],[7,"الأعراف","Al-A'raf",9,"ومن خفت موازينه فاولائك الذين خسروا انفسهم بما كانوا باياتنا يظلمون"],[7,"الأعراف","Al-A'raf",10,"ولقد مكناكم في الارض وجعلنا لكم فيها معايش قليلا ما تشكرون"],[7,"الأعراف","Al-A'raf",11,"ولقد خلقناكم ثم صورناكم ثم قلنا للملائكة اسجدوا لادم فسجدوا الا ابليس لم يكن من الساجدين"],[7,"الأعراف","Al-A'raf",12,"قال ما منعك الا تسجد اذ امرتك قال انا خير منه خلقتني من نار وخلقته من طين"],[7,"الأعراف","Al-A'raf",13,"قال فاهبط منها فما يكون لك ان تتكبر فيها فاخرج انك من الصاغرين"],[7,"الأعراف","Al-A'raf",14,"قال انظرني الي يوم يبعثون"],[7,"الأعراف","Al-A'raf",15,"قال انك من المنظرين"],[7,"الأعراف","Al-A'raf",16,"قال فبما اغويتني لاقعدن لهم صراطك المستقيم"],[7,"الأعراف","Al-A'raf",17,"ثم لاتينهم من بين ايديهم ومن خلفهم وعن ايمانهم وعن شمائلهم ولا تجد اكثرهم شاكرين"],[7,"الأعراف","Al-A'raf",18,"قال اخرج منها مذءوما مدحورا لمن تبعك منهم لاملان جهنم منكم اجمعين"],[7,"الأعراف","Al-A'raf",19,"وياادم اسكن انت وزوجك الجنة فكلا من حيث شئتما ولا تقربا هاذه الشجرة فتكونا من الظالمين"],[7,"الأعراف","Al-A'raf",20,"فوسوس لهما الشيطان ليبدي لهما ما وري عنهما من سوءاتهما وقال ما نهيكما ربكما عن هاذه الشجرة الا ان تكونا ملكين او تكونا من الخالدين"],[7,"الأعراف","Al-A'raf",21,"وقاسمهما اني لكما لمن الناصحين"],[7,"الأعراف","Al-A'raf",22,"فدليهما بغرور فلما ذاقا الشجرة بدت لهما سوءاتهما وطفقا يخصفان عليهما من ورق الجنة وناديهما ربهما الم انهكما عن تلكما الشجرة واقل لكما ان الشيطان لكما عدو مبين"],[7,"الأعراف","Al-A'raf",23,"قالا ربنا ظلمنا انفسنا وان لم تغفر لنا وترحمنا لنكونن من الخاسرين"],[7,"الأعراف","Al-A'raf",24,"قال اهبطوا بعضكم لبعض عدو ولكم في الارض مستقر ومتاع الي حين"],[7,"الأعراف","Al-A'raf",25,"قال فيها تحيون وفيها تموتون ومنها تخرجون"],[7,"الأعراف","Al-A'raf",26,"يابني ءادم قد انزلنا عليكم لباسا يواري سوءاتكم وريشا ولباس التقوي ذالك خير ذالك من ءايات الله لعلهم يذكرون"],[7,"الأعراف","Al-A'raf",27,"يابني ءادم لا يفتننكم الشيطان كما اخرج ابويكم من الجنة ينزع عنهما لباسهما ليريهما سوءاتهما انه يريكم هو وقبيله من حيث لا ترونهم انا جعلنا الشياطين اولياء للذين لا يؤمنون"],[7,"الأعراف","Al-A'raf",28,"واذا فعلوا فاحشة قالوا وجدنا عليها ءاباءنا والله امرنا بها قل ان الله لا يامر بالفحشاء اتقولون علي الله ما لا تعلمون"],[7,"الأعراف","Al-A'raf",29,"قل امر ربي بالقسط واقيموا وجوهكم عند كل مسجد وادعوه مخلصين له الدين كما بداكم تعودون"],[7,"الأعراف","Al-A'raf",30,"فريقا هدي وفريقا حق عليهم الضلالة انهم اتخذوا الشياطين اولياء من دون الله ويحسبون انهم مهتدون"],[7,"الأعراف","Al-A'raf",31,"۞يابني ءادم خذوا زينتكم عند كل مسجد وكلوا واشربوا ولا تسرفوا انه لا يحب المسرفين"],[7,"الأعراف","Al-A'raf",32,"قل من حرم زينة الله التي اخرج لعباده والطيبات من الرزق قل هي للذين ءامنوا في الحيواة الدنيا خالصة يوم القيامة كذالك نفصل الايات لقوم يعلمون"],[7,"الأعراف","Al-A'raf",33,"قل انما حرم ربي الفواحش ما ظهر منها وما بطن والاثم والبغي بغير الحق وان تشركوا بالله ما لم ينزل به سلطانا وان تقولوا علي الله ما لا تعلمون"],[7,"الأعراف","Al-A'raf",34,"ولكل امة اجل فاذا جاء اجلهم لا يستاخرون ساعة ولا يستقدمون"],[7,"الأعراف","Al-A'raf",35,"يابني ءادم اما ياتينكم رسل منكم يقصون عليكم ءاياتي فمن اتقي واصلح فلا خوف عليهم ولا هم يحزنون"],[7,"الأعراف","Al-A'raf",36,"والذين كذبوا باياتنا واستكبروا عنها اولائك اصحاب النار هم فيها خالدون"],[7,"الأعراف","Al-A'raf",37,"فمن اظلم ممن افتري علي الله كذبا او كذب باياته اولائك ينالهم نصيبهم من الكتاب حتي اذا جاءتهم رسلنا يتوفونهم قالوا اين ما كنتم تدعون من دون الله قالوا ضلوا عنا وشهدوا علي انفسهم انهم كانوا كافرين"],[7,"الأعراف","Al-A'raf",38,"قال ادخلوا في امم قد خلت من قبلكم من الجن والانس في النار كلما دخلت امة لعنت اختها حتي اذا اداركوا فيها جميعا قالت اخريهم لاوليهم ربنا هاؤلاء اضلونا فاتهم عذابا ضعفا من النار قال لكل ضعف ولاكن لا تعلمون"],[7,"الأعراف","Al-A'raf",39,"وقالت اوليهم لاخريهم فما كان لكم علينا من فضل فذوقوا العذاب بما كنتم تكسبون"],[7,"الأعراف","Al-A'raf",40,"ان الذين كذبوا باياتنا واستكبروا عنها لا تفتح لهم ابواب السماء ولا يدخلون الجنة حتي يلج الجمل في سم الخياط وكذالك نجزي المجرمين"],[7,"الأعراف","Al-A'raf",41,"لهم من جهنم مهاد ومن فوقهم غواش وكذالك نجزي الظالمين"],[7,"الأعراف","Al-A'raf",42,"والذين ءامنوا وعملوا الصالحات لا نكلف نفسا الا وسعها اولائك اصحاب الجنة هم فيها خالدون"],[7,"الأعراف","Al-A'raf",43,"ونزعنا ما في صدورهم من غل تجري من تحتهم الانهار وقالوا الحمد لله الذي هدينا لهاذا وما كنا لنهتدي لولا ان هدينا الله لقد جاءت رسل ربنا بالحق ونودوا ان تلكم الجنة اورثتموها بما كنتم تعملون"],[7,"الأعراف","Al-A'raf",44,"ونادي اصحاب الجنة اصحاب النار ان قد وجدنا ما وعدنا ربنا حقا فهل وجدتم ما وعد ربكم حقا قالوا نعم فاذن مؤذن بينهم ان لعنة الله علي الظالمين"],[7,"الأعراف","Al-A'raf",45,"الذين يصدون عن سبيل الله ويبغونها عوجا وهم بالاخرة كافرون"],[7,"الأعراف","Al-A'raf",46,"وبينهما حجاب وعلي الاعراف رجال يعرفون كلا بسيميهم ونادوا اصحاب الجنة ان سلام عليكم لم يدخلوها وهم يطمعون"],[7,"الأعراف","Al-A'raf",47,"۞واذا صرفت ابصارهم تلقاء اصحاب النار قالوا ربنا لا تجعلنا مع القوم الظالمين"],[7,"الأعراف","Al-A'raf",48,"ونادي اصحاب الاعراف رجالا يعرفونهم بسيميهم قالوا ما اغني عنكم جمعكم وما كنتم تستكبرون"],[7,"الأعراف","Al-A'raf",49,"اهاؤلاء الذين اقسمتم لا ينالهم الله برحمة ادخلوا الجنة لا خوف عليكم ولا انتم تحزنون"],[7,"الأعراف","Al-A'raf",50,"ونادي اصحاب النار اصحاب الجنة ان افيضوا علينا من الماء او مما رزقكم الله قالوا ان الله حرمهما علي الكافرين"],[7,"الأعراف","Al-A'raf",51,"الذين اتخذوا دينهم لهوا ولعبا وغرتهم الحيواة الدنيا فاليوم ننسيهم كما نسوا لقاء يومهم هاذا وما كانوا باياتنا يجحدون"],[7,"الأعراف","Al-A'raf",52,"ولقد جئناهم بكتاب فصلناه علي علم هدي ورحمة لقوم يؤمنون"],[7,"الأعراف","Al-A'raf",53,"هل ينظرون الا تاويله يوم ياتي تاويله يقول الذين نسوه من قبل قد جاءت رسل ربنا بالحق فهل لنا من شفعاء فيشفعوا لنا او نرد فنعمل غير الذي كنا نعمل قد خسروا انفسهم وضل عنهم ما كانوا يفترون"],[7,"الأعراف","Al-A'raf",54,"ان ربكم الله الذي خلق السماوات والارض في ستة ايام ثم استوي علي العرش يغشي اليل النهار يطلبه حثيثا والشمس والقمر والنجوم مسخرات بامره الا له الخلق والامر تبارك الله رب العالمين"],[7,"الأعراف","Al-A'raf",55,"ادعوا ربكم تضرعا وخفية انه لا يحب المعتدين"],[7,"الأعراف","Al-A'raf",56,"ولا تفسدوا في الارض بعد اصلاحها وادعوه خوفا وطمعا ان رحمت الله قريب من المحسنين"],[7,"الأعراف","Al-A'raf",57,"وهو الذي يرسل الرياح بشرا بين يدي رحمته حتي اذا اقلت سحابا ثقالا سقناه لبلد ميت فانزلنا به الماء فاخرجنا به من كل الثمرات كذالك نخرج الموتي لعلكم تذكرون"],[7,"الأعراف","Al-A'raf",58,"والبلد الطيب يخرج نباته باذن ربه والذي خبث لا يخرج الا نكدا كذالك نصرف الايات لقوم يشكرون"],[7,"الأعراف","Al-A'raf",59,"لقد ارسلنا نوحا الي قومه فقال ياقوم اعبدوا الله ما لكم من الاه غيره اني اخاف عليكم عذاب يوم عظيم"],[7,"الأعراف","Al-A'raf",60,"قال الملا من قومه انا لنريك في ضلال مبين"],[7,"الأعراف","Al-A'raf",61,"قال ياقوم ليس بي ضلالة ولاكني رسول من رب العالمين"],[7,"الأعراف","Al-A'raf",62,"ابلغكم رسالات ربي وانصح لكم واعلم من الله ما لا تعلمون"],[7,"الأعراف","Al-A'raf",63,"اوعجبتم ان جاءكم ذكر من ربكم علي رجل منكم لينذركم ولتتقوا ولعلكم ترحمون"],[7,"الأعراف","Al-A'raf",64,"فكذبوه فانجيناه والذين معه في الفلك واغرقنا الذين كذبوا باياتنا انهم كانوا قوما عمين"],[7,"الأعراف","Al-A'raf",65,"۞والي عاد اخاهم هودا قال ياقوم اعبدوا الله ما لكم من الاه غيره افلا تتقون"],[7,"الأعراف","Al-A'raf",66,"قال الملا الذين كفروا من قومه انا لنريك في سفاهة وانا لنظنك من الكاذبين"],[7,"الأعراف","Al-A'raf",67,"قال ياقوم ليس بي سفاهة ولاكني رسول من رب العالمين"],[7,"الأعراف","Al-A'raf",68,"ابلغكم رسالات ربي وانا لكم ناصح امين"],[7,"الأعراف","Al-A'raf",69,"اوعجبتم ان جاءكم ذكر من ربكم علي رجل منكم لينذركم واذكروا اذ جعلكم خلفاء من بعد قوم نوح وزادكم في الخلق بصطة فاذكروا ءالاء الله لعلكم تفلحون"],[7,"الأعراف","Al-A'raf",70,"قالوا اجئتنا لنعبد الله وحده ونذر ما كان يعبد ءاباؤنا فاتنا بما تعدنا ان كنت من الصادقين"],[7,"الأعراف","Al-A'raf",71,"قال قد وقع عليكم من ربكم رجس وغضب اتجادلونني في اسماء سميتموها انتم وءاباؤكم ما نزل الله بها من سلطان فانتظروا اني معكم من المنتظرين"],[7,"الأعراف","Al-A'raf",72,"فانجيناه والذين معه برحمة منا وقطعنا دابر الذين كذبوا باياتنا وما كانوا مؤمنين"],[7,"الأعراف","Al-A'raf",73,"والي ثمود اخاهم صالحا قال ياقوم اعبدوا الله ما لكم من الاه غيره قد جاءتكم بينة من ربكم هاذه ناقة الله لكم ءاية فذروها تاكل في ارض الله ولا تمسوها بسوء فياخذكم عذاب اليم"],[7,"الأعراف","Al-A'raf",74,"واذكروا اذ جعلكم خلفاء من بعد عاد وبواكم في الارض تتخذون من سهولها قصورا وتنحتون الجبال بيوتا فاذكروا ءالاء الله ولا تعثوا في الارض مفسدين"],[7,"الأعراف","Al-A'raf",75,"قال الملا الذين استكبروا من قومه للذين استضعفوا لمن ءامن منهم اتعلمون ان صالحا مرسل من ربه قالوا انا بما ارسل به مؤمنون"],[7,"الأعراف","Al-A'raf",76,"قال الذين استكبروا انا بالذي ءامنتم به كافرون"],[7,"الأعراف","Al-A'raf",77,"فعقروا الناقة وعتوا عن امر ربهم وقالوا ياصالح ائتنا بما تعدنا ان كنت من المرسلين"],[7,"الأعراف","Al-A'raf",78,"فاخذتهم الرجفة فاصبحوا في دارهم جاثمين"],[7,"الأعراف","Al-A'raf",79,"فتولي عنهم وقال ياقوم لقد ابلغتكم رسالة ربي ونصحت لكم ولاكن لا تحبون الناصحين"],[7,"الأعراف","Al-A'raf",80,"ولوطا اذ قال لقومه اتاتون الفاحشة ما سبقكم بها من احد من العالمين"],[7,"الأعراف","Al-A'raf",81,"انكم لتاتون الرجال شهوة من دون النساء بل انتم قوم مسرفون"],[7,"الأعراف","Al-A'raf",82,"وما كان جواب قومه الا ان قالوا اخرجوهم من قريتكم انهم اناس يتطهرون"],[7,"الأعراف","Al-A'raf",83,"فانجيناه واهله الا امراته كانت من الغابرين"],[7,"الأعراف","Al-A'raf",84,"وامطرنا عليهم مطرا فانظر كيف كان عاقبة المجرمين"],[7,"الأعراف","Al-A'raf",85,"والي مدين اخاهم شعيبا قال ياقوم اعبدوا الله ما لكم من الاه غيره قد جاءتكم بينة من ربكم فاوفوا الكيل والميزان ولا تبخسوا الناس اشياءهم ولا تفسدوا في الارض بعد اصلاحها ذالكم خير لكم ان كنتم مؤمنين"],[7,"الأعراف","Al-A'raf",86,"ولا تقعدوا بكل صراط توعدون وتصدون عن سبيل الله من ءامن به وتبغونها عوجا واذكروا اذ كنتم قليلا فكثركم وانظروا كيف كان عاقبة المفسدين"],[7,"الأعراف","Al-A'raf",87,"وان كان طائفة منكم ءامنوا بالذي ارسلت به وطائفة لم يؤمنوا فاصبروا حتي يحكم الله بيننا وهو خير الحاكمين"],[7,"الأعراف","Al-A'raf",88,"۞قال الملا الذين استكبروا من قومه لنخرجنك ياشعيب والذين ءامنوا معك من قريتنا او لتعودن في ملتنا قال اولو كنا كارهين"],[7,"الأعراف","Al-A'raf",89,"قد افترينا علي الله كذبا ان عدنا في ملتكم بعد اذ نجينا الله منها وما يكون لنا ان نعود فيها الا ان يشاء الله ربنا وسع ربنا كل شيء علما علي الله توكلنا ربنا افتح بيننا وبين قومنا بالحق وانت خير الفاتحين"],[7,"الأعراف","Al-A'raf",90,"وقال الملا الذين كفروا من قومه لئن اتبعتم شعيبا انكم اذا لخاسرون"],[7,"الأعراف","Al-A'raf",91,"فاخذتهم الرجفة فاصبحوا في دارهم جاثمين"],[7,"الأعراف","Al-A'raf",92,"الذين كذبوا شعيبا كان لم يغنوا فيها الذين كذبوا شعيبا كانوا هم الخاسرين"],[7,"الأعراف","Al-A'raf",93,"فتولي عنهم وقال ياقوم لقد ابلغتكم رسالات ربي ونصحت لكم فكيف ءاسي علي قوم كافرين"],[7,"الأعراف","Al-A'raf",94,"وما ارسلنا في قرية من نبي الا اخذنا اهلها بالباساء والضراء لعلهم يضرعون"],[7,"الأعراف","Al-A'raf",95,"ثم بدلنا مكان السيئة الحسنة حتي عفوا وقالوا قد مس ءاباءنا الضراء والسراء فاخذناهم بغتة وهم لا يشعرون"],[7,"الأعراف","Al-A'raf",96,"ولو ان اهل القري ءامنوا واتقوا لفتحنا عليهم بركات من السماء والارض ولاكن كذبوا فاخذناهم بما كانوا يكسبون"],[7,"الأعراف","Al-A'raf",97,"افامن اهل القري ان ياتيهم باسنا بياتا وهم نائمون"],[7,"الأعراف","Al-A'raf",98,"اوامن اهل القري ان ياتيهم باسنا ضحي وهم يلعبون"],[7,"الأعراف","Al-A'raf",99,"افامنوا مكر الله فلا يامن مكر الله الا القوم الخاسرون"],[7,"الأعراف","Al-A'raf",100,"اولم يهد للذين يرثون الارض من بعد اهلها ان لو نشاء اصبناهم بذنوبهم ونطبع علي قلوبهم فهم لا يسمعون"],[7,"الأعراف","Al-A'raf",101,"تلك القري نقص عليك من انبائها ولقد جاءتهم رسلهم بالبينات فما كانوا ليؤمنوا بما كذبوا من قبل كذالك يطبع الله علي قلوب الكافرين"],[7,"الأعراف","Al-A'raf",102,"وما وجدنا لاكثرهم من عهد وان وجدنا اكثرهم لفاسقين"],[7,"الأعراف","Al-A'raf",103,"ثم بعثنا من بعدهم موسي باياتنا الي فرعون وملايه فظلموا بها فانظر كيف كان عاقبة المفسدين"],[7,"الأعراف","Al-A'raf",104,"وقال موسي يافرعون اني رسول من رب العالمين"],[7,"الأعراف","Al-A'raf",105,"حقيق علي ان لا اقول علي الله الا الحق قد جئتكم ببينة من ربكم فارسل معي بني اسراءيل"],[7,"الأعراف","Al-A'raf",106,"قال ان كنت جئت باية فات بها ان كنت من الصادقين"],[7,"الأعراف","Al-A'raf",107,"فالقي عصاه فاذا هي ثعبان مبين"],[7,"الأعراف","Al-A'raf",108,"ونزع يده فاذا هي بيضاء للناظرين"],[7,"الأعراف","Al-A'raf",109,"قال الملا من قوم فرعون ان هاذا لساحر عليم"],[7,"الأعراف","Al-A'raf",110,"يريد ان يخرجكم من ارضكم فماذا تامرون"],[7,"الأعراف","Al-A'raf",111,"قالوا ارجه واخاه وارسل في المدائن حاشرين"],[7,"الأعراف","Al-A'raf",112,"ياتوك بكل ساحر عليم"],[7,"الأعراف","Al-A'raf",113,"وجاء السحرة فرعون قالوا ان لنا لاجرا ان كنا نحن الغالبين"],[7,"الأعراف","Al-A'raf",114,"قال نعم وانكم لمن المقربين"],[7,"الأعراف","Al-A'raf",115,"قالوا ياموسي اما ان تلقي واما ان نكون نحن الملقين"],[7,"الأعراف","Al-A'raf",116,"قال القوا فلما القوا سحروا اعين الناس واسترهبوهم وجاءو بسحر عظيم"],[7,"الأعراف","Al-A'raf",117,"۞واوحينا الي موسي ان الق عصاك فاذا هي تلقف ما يافكون"],[7,"الأعراف","Al-A'raf",118,"فوقع الحق وبطل ما كانوا يعملون"],[7,"الأعراف","Al-A'raf",119,"فغلبوا هنالك وانقلبوا صاغرين"],[7,"الأعراف","Al-A'raf",120,"والقي السحرة ساجدين"],[7,"الأعراف","Al-A'raf",121,"قالوا ءامنا برب العالمين"],[7,"الأعراف","Al-A'raf",122,"رب موسي وهارون"],[7,"الأعراف","Al-A'raf",123,"قال فرعون ءامنتم به قبل ان ءاذن لكم ان هاذا لمكر مكرتموه في المدينة لتخرجوا منها اهلها فسوف تعلمون"],[7,"الأعراف","Al-A'raf",124,"لاقطعن ايديكم وارجلكم من خلاف ثم لاصلبنكم اجمعين"],[7,"الأعراف","Al-A'raf",125,"قالوا انا الي ربنا منقلبون"],[7,"الأعراف","Al-A'raf",126,"وما تنقم منا الا ان ءامنا بايات ربنا لما جاءتنا ربنا افرغ علينا صبرا وتوفنا مسلمين"],[7,"الأعراف","Al-A'raf",127,"وقال الملا من قوم فرعون اتذر موسي وقومه ليفسدوا في الارض ويذرك وءالهتك قال سنقتل ابناءهم ونستحي نساءهم وانا فوقهم قاهرون"],[7,"الأعراف","Al-A'raf",128,"قال موسي لقومه استعينوا بالله واصبروا ان الارض لله يورثها من يشاء من عباده والعاقبة للمتقين"],[7,"الأعراف","Al-A'raf",129,"قالوا اوذينا من قبل ان تاتينا ومن بعد ما جئتنا قال عسي ربكم ان يهلك عدوكم ويستخلفكم في الارض فينظر كيف تعملون"],[7,"الأعراف","Al-A'raf",130,"ولقد اخذنا ءال فرعون بالسنين ونقص من الثمرات لعلهم يذكرون"],[7,"الأعراف","Al-A'raf",131,"فاذا جاءتهم الحسنة قالوا لنا هاذه وان تصبهم سيئة يطيروا بموسي ومن معه الا انما طائرهم عند الله ولاكن اكثرهم لا يعلمون"],[7,"الأعراف","Al-A'raf",132,"وقالوا مهما تاتنا به من ءاية لتسحرنا بها فما نحن لك بمؤمنين"],[7,"الأعراف","Al-A'raf",133,"فارسلنا عليهم الطوفان والجراد والقمل والضفادع والدم ءايات مفصلات فاستكبروا وكانوا قوما مجرمين"],[7,"الأعراف","Al-A'raf",134,"ولما وقع عليهم الرجز قالوا ياموسي ادع لنا ربك بما عهد عندك لئن كشفت عنا الرجز لنؤمنن لك ولنرسلن معك بني اسراءيل"],[7,"الأعراف","Al-A'raf",135,"فلما كشفنا عنهم الرجز الي اجل هم بالغوه اذا هم ينكثون"],[7,"الأعراف","Al-A'raf",136,"فانتقمنا منهم فاغرقناهم في اليم بانهم كذبوا باياتنا وكانوا عنها غافلين"],[7,"الأعراف","Al-A'raf",137,"واورثنا القوم الذين كانوا يستضعفون مشارق الارض ومغاربها التي باركنا فيها وتمت كلمت ربك الحسني علي بني اسراءيل بما صبروا ودمرنا ما كان يصنع فرعون وقومه وما كانوا يعرشون"],[7,"الأعراف","Al-A'raf",138,"وجاوزنا ببني اسراءيل البحر فاتوا علي قوم يعكفون علي اصنام لهم قالوا ياموسي اجعل لنا الاها كما لهم ءالهة قال انكم قوم تجهلون"],[7,"الأعراف","Al-A'raf",139,"ان هاؤلاء متبر ما هم فيه وباطل ما كانوا يعملون"],[7,"الأعراف","Al-A'raf",140,"قال اغير الله ابغيكم الاها وهو فضلكم علي العالمين"],[7,"الأعراف","Al-A'raf",141,"واذ انجيناكم من ءال فرعون يسومونكم سوء العذاب يقتلون ابناءكم ويستحيون نساءكم وفي ذالكم بلاء من ربكم عظيم"],[7,"الأعراف","Al-A'raf",142,"۞وواعدنا موسي ثلاثين ليلة واتممناها بعشر فتم ميقات ربه اربعين ليلة وقال موسي لاخيه هارون اخلفني في قومي واصلح ولا تتبع سبيل المفسدين"],[7,"الأعراف","Al-A'raf",143,"ولما جاء موسي لميقاتنا وكلمه ربه قال رب ارني انظر اليك قال لن تريني ولاكن انظر الي الجبل فان استقر مكانه فسوف تريني فلما تجلي ربه للجبل جعله دكا وخر موسي صعقا فلما افاق قال سبحانك تبت اليك وانا اول المؤمنين"],[7,"الأعراف","Al-A'raf",144,"قال ياموسي اني اصطفيتك علي الناس برسالاتي وبكلامي فخذ ما ءاتيتك وكن من الشاكرين"],[7,"الأعراف","Al-A'raf",145,"وكتبنا له في الالواح من كل شيء موعظة وتفصيلا لكل شيء فخذها بقوة وامر قومك ياخذوا باحسنها ساوريكم دار الفاسقين"],[7,"الأعراف","Al-A'raf",146,"ساصرف عن ءاياتي الذين يتكبرون في الارض بغير الحق وان يروا كل ءاية لا يؤمنوا بها وان يروا سبيل الرشد لا يتخذوه سبيلا وان يروا سبيل الغي يتخذوه سبيلا ذالك بانهم كذبوا باياتنا وكانوا عنها غافلين"],[7,"الأعراف","Al-A'raf",147,"والذين كذبوا باياتنا ولقاء الاخرة حبطت اعمالهم هل يجزون الا ما كانوا يعملون"],[7,"الأعراف","Al-A'raf",148,"واتخذ قوم موسي من بعده من حليهم عجلا جسدا له خوار الم يروا انه لا يكلمهم ولا يهديهم سبيلا اتخذوه وكانوا ظالمين"],[7,"الأعراف","Al-A'raf",149,"ولما سقط في ايديهم وراوا انهم قد ضلوا قالوا لئن لم يرحمنا ربنا ويغفر لنا لنكونن من الخاسرين"],[7,"الأعراف","Al-A'raf",150,"ولما رجع موسي الي قومه غضبان اسفا قال بئسما خلفتموني من بعدي اعجلتم امر ربكم والقي الالواح واخذ براس اخيه يجره اليه قال ابن ام ان القوم استضعفوني وكادوا يقتلونني فلا تشمت بي الاعداء ولا تجعلني مع القوم الظالمين"],[7,"الأعراف","Al-A'raf",151,"قال رب اغفر لي ولاخي وادخلنا في رحمتك وانت ارحم الراحمين"],[7,"الأعراف","Al-A'raf",152,"ان الذين اتخذوا العجل سينالهم غضب من ربهم وذلة في الحيواة الدنيا وكذالك نجزي المفترين"],[7,"الأعراف","Al-A'raf",153,"والذين عملوا السيات ثم تابوا من بعدها وءامنوا ان ربك من بعدها لغفور رحيم"],[7,"الأعراف","Al-A'raf",154,"ولما سكت عن موسي الغضب اخذ الالواح وفي نسختها هدي ورحمة للذين هم لربهم يرهبون"],[7,"الأعراف","Al-A'raf",155,"واختار موسي قومه سبعين رجلا لميقاتنا فلما اخذتهم الرجفة قال رب لو شئت اهلكتهم من قبل واياي اتهلكنا بما فعل السفهاء منا ان هي الا فتنتك تضل بها من تشاء وتهدي من تشاء انت ولينا فاغفر لنا وارحمنا وانت خير الغافرين"],[7,"الأعراف","Al-A'raf",156,"۞واكتب لنا في هاذه الدنيا حسنة وفي الاخرة انا هدنا اليك قال عذابي اصيب به من اشاء ورحمتي وسعت كل شيء فساكتبها للذين يتقون ويؤتون الزكواة والذين هم باياتنا يؤمنون"],[7,"الأعراف","Al-A'raf",157,"الذين يتبعون الرسول النبي الامي الذي يجدونه مكتوبا عندهم في التورية والانجيل يامرهم بالمعروف وينهيهم عن المنكر ويحل لهم الطيبات ويحرم عليهم الخبائث ويضع عنهم اصرهم والاغلال التي كانت عليهم فالذين ءامنوا به وعزروه ونصروه واتبعوا النور الذي انزل معه اولائك هم المفلحون"],[7,"الأعراف","Al-A'raf",158,"قل ياايها الناس اني رسول الله اليكم جميعا الذي له ملك السماوات والارض لا الاه الا هو يحي ويميت فامنوا بالله ورسوله النبي الامي الذي يؤمن بالله وكلماته واتبعوه لعلكم تهتدون"],[7,"الأعراف","Al-A'raf",159,"ومن قوم موسي امة يهدون بالحق وبه يعدلون"],[7,"الأعراف","Al-A'raf",160,"وقطعناهم اثنتي عشرة اسباطا امما واوحينا الي موسي اذ استسقيه قومه ان اضرب بعصاك الحجر فانبجست منه اثنتا عشرة عينا قد علم كل اناس مشربهم وظللنا عليهم الغمام وانزلنا عليهم المن والسلوي كلوا من طيبات ما رزقناكم وما ظلمونا ولاكن كانوا انفسهم يظلمون"],[7,"الأعراف","Al-A'raf",161,"واذ قيل لهم اسكنوا هاذه القرية وكلوا منها حيث شئتم وقولوا حطة وادخلوا الباب سجدا نغفر لكم خطياتكم سنزيد المحسنين"],[7,"الأعراف","Al-A'raf",162,"فبدل الذين ظلموا منهم قولا غير الذي قيل لهم فارسلنا عليهم رجزا من السماء بما كانوا يظلمون"],[7,"الأعراف","Al-A'raf",163,"وسلهم عن القرية التي كانت حاضرة البحر اذ يعدون في السبت اذ تاتيهم حيتانهم يوم سبتهم شرعا ويوم لا يسبتون لا تاتيهم كذالك نبلوهم بما كانوا يفسقون"],[7,"الأعراف","Al-A'raf",164,"واذ قالت امة منهم لم تعظون قوما الله مهلكهم او معذبهم عذابا شديدا قالوا معذرة الي ربكم ولعلهم يتقون"],[7,"الأعراف","Al-A'raf",165,"فلما نسوا ما ذكروا به انجينا الذين ينهون عن السوء واخذنا الذين ظلموا بعذاب بيس بما كانوا يفسقون"],[7,"الأعراف","Al-A'raf",166,"فلما عتوا عن ما نهوا عنه قلنا لهم كونوا قردة خاسين"],[7,"الأعراف","Al-A'raf",167,"واذ تاذن ربك ليبعثن عليهم الي يوم القيامة من يسومهم سوء العذاب ان ربك لسريع ا
