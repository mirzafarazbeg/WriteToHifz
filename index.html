لعقاب وانه لغفور رحيم"],[7,"الأعراف","Al-A'raf",168,"وقطعناهم في الارض امما منهم الصالحون ومنهم دون ذالك وبلوناهم بالحسنات والسيات لعلهم يرجعون"],[7,"الأعراف","Al-A'raf",169,"فخلف من بعدهم خلف ورثوا الكتاب ياخذون عرض هاذا الادني ويقولون سيغفر لنا وان ياتهم عرض مثله ياخذوه الم يؤخذ عليهم ميثاق الكتاب ان لا يقولوا علي الله الا الحق ودرسوا ما فيه والدار الاخرة خير للذين يتقون افلا تعقلون"],[7,"الأعراف","Al-A'raf",170,"والذين يمسكون بالكتاب واقاموا الصلواة انا لا نضيع اجر المصلحين"],[7,"الأعراف","Al-A'raf",171,"۞واذ نتقنا الجبل فوقهم كانه ظلة وظنوا انه واقع بهم خذوا ما ءاتيناكم بقوة واذكروا ما فيه لعلكم تتقون"],[7,"الأعراف","Al-A'raf",172,"واذ اخذ ربك من بني ءادم من ظهورهم ذريتهم واشهدهم علي انفسهم الست بربكم قالوا بلي شهدنا ان تقولوا يوم القيامة انا كنا عن هاذا غافلين"],[7,"الأعراف","Al-A'raf",173,"او تقولوا انما اشرك ءاباؤنا من قبل وكنا ذرية من بعدهم افتهلكنا بما فعل المبطلون"],[7,"الأعراف","Al-A'raf",174,"وكذالك نفصل الايات ولعلهم يرجعون"],[7,"الأعراف","Al-A'raf",175,"واتل عليهم نبا الذي ءاتيناه ءاياتنا فانسلخ منها فاتبعه الشيطان فكان من الغاوين"],[7,"الأعراف","Al-A'raf",176,"ولو شئنا لرفعناه بها ولاكنه اخلد الي الارض واتبع هويه فمثله كمثل الكلب ان تحمل عليه يلهث او تتركه يلهث ذالك مثل القوم الذين كذبوا باياتنا فاقصص القصص لعلهم يتفكرون"],[7,"الأعراف","Al-A'raf",177,"ساء مثلا القوم الذين كذبوا باياتنا وانفسهم كانوا يظلمون"],[7,"الأعراف","Al-A'raf",178,"من يهد الله فهو المهتدي ومن يضلل فاولائك هم الخاسرون"],[7,"الأعراف","Al-A'raf",179,"ولقد ذرانا لجهنم كثيرا من الجن والانس لهم قلوب لا يفقهون بها ولهم اعين لا يبصرون بها ولهم ءاذان لا يسمعون بها اولائك كالانعام بل هم اضل اولائك هم الغافلون"],[7,"الأعراف","Al-A'raf",180,"ولله الاسماء الحسني فادعوه بها وذروا الذين يلحدون في اسمائه سيجزون ما كانوا يعملون"],[7,"الأعراف","Al-A'raf",181,"وممن خلقنا امة يهدون بالحق وبه يعدلون"],[7,"الأعراف","Al-A'raf",182,"والذين كذبوا باياتنا سنستدرجهم من حيث لا يعلمون"],[7,"الأعراف","Al-A'raf",183,"واملي لهم ان كيدي متين"],[7,"الأعراف","Al-A'raf",184,"اولم يتفكروا ما بصاحبهم من جنة ان هو الا نذير مبين"],[7,"الأعراف","Al-A'raf",185,"اولم ينظروا في ملكوت السماوات والارض وما خلق الله من شيء وان عسي ان يكون قد اقترب اجلهم فباي حديث بعده يؤمنون"],[7,"الأعراف","Al-A'raf",186,"من يضلل الله فلا هادي له ويذرهم في طغيانهم يعمهون"],[7,"الأعراف","Al-A'raf",187,"يسلونك عن الساعة ايان مرسيها قل انما علمها عند ربي لا يجليها لوقتها الا هو ثقلت في السماوات والارض لا تاتيكم الا بغتة يسلونك كانك حفي عنها قل انما علمها عند الله ولاكن اكثر الناس لا يعلمون"],[7,"الأعراف","Al-A'raf",188,"قل لا املك لنفسي نفعا ولا ضرا الا ما شاء الله ولو كنت اعلم الغيب لاستكثرت من الخير وما مسني السوء ان انا الا نذير وبشير لقوم يؤمنون"],[7,"الأعراف","Al-A'raf",189,"۞هو الذي خلقكم من نفس واحدة وجعل منها زوجها ليسكن اليها فلما تغشيها حملت حملا خفيفا فمرت به فلما اثقلت دعوا الله ربهما لئن ءاتيتنا صالحا لنكونن من الشاكرين"],[7,"الأعراف","Al-A'raf",190,"فلما ءاتيهما صالحا جعلا له شركاء فيما ءاتيهما فتعالي الله عما يشركون"],[7,"الأعراف","Al-A'raf",191,"ايشركون ما لا يخلق شيا وهم يخلقون"],[7,"الأعراف","Al-A'raf",192,"ولا يستطيعون لهم نصرا ولا انفسهم ينصرون"],[7,"الأعراف","Al-A'raf",193,"وان تدعوهم الي الهدي لا يتبعوكم سواء عليكم ادعوتموهم ام انتم صامتون"],[7,"الأعراف","Al-A'raf",194,"ان الذين تدعون من دون الله عباد امثالكم فادعوهم فليستجيبوا لكم ان كنتم صادقين"],[7,"الأعراف","Al-A'raf",195,"الهم ارجل يمشون بها ام لهم ايد يبطشون بها ام لهم اعين يبصرون بها ام لهم ءاذان يسمعون بها قل ادعوا شركاءكم ثم كيدون فلا تنظرون"],[7,"الأعراف","Al-A'raf",196,"ان ولي الله الذي نزل الكتاب وهو يتولي الصالحين"],[7,"الأعراف","Al-A'raf",197,"والذين تدعون من دونه لا يستطيعون نصركم ولا انفسهم ينصرون"],[7,"الأعراف","Al-A'raf",198,"وان تدعوهم الي الهدي لا يسمعوا وتريهم ينظرون اليك وهم لا يبصرون"],[7,"الأعراف","Al-A'raf",199,"خذ العفو وامر بالعرف واعرض عن الجاهلين"],[7,"الأعراف","Al-A'raf",200,"واما ينزغنك من الشيطان نزغ فاستعذ بالله انه سميع عليم"],[7,"الأعراف","Al-A'raf",201,"ان الذين اتقوا اذا مسهم طائف من الشيطان تذكروا فاذا هم مبصرون"],[7,"الأعراف","Al-A'raf",202,"واخوانهم يمدونهم في الغي ثم لا يقصرون"],[7,"الأعراف","Al-A'raf",203,"واذا لم تاتهم باية قالوا لولا اجتبيتها قل انما اتبع ما يوحي الي من ربي هاذا بصائر من ربكم وهدي ورحمة لقوم يؤمنون"],[7,"الأعراف","Al-A'raf",204,"واذا قرئ القرءان فاستمعوا له وانصتوا لعلكم ترحمون"],[7,"الأعراف","Al-A'raf",205,"واذكر ربك في نفسك تضرعا وخيفة ودون الجهر من القول بالغدو والاصال ولا تكن من الغافلين"],[7,"الأعراف","Al-A'raf",206,"ان الذين عند ربك لا يستكبرون عن عبادته ويسبحونه وله يسجدون۩"],[8,"الأنفال","Al-Anfal",1,"يسلونك عن الانفال قل الانفال لله والرسول فاتقوا الله واصلحوا ذات بينكم واطيعوا الله ورسوله ان كنتم مؤمنين"],[8,"الأنفال","Al-Anfal",2,"انما المؤمنون الذين اذا ذكر الله وجلت قلوبهم واذا تليت عليهم ءاياته زادتهم ايمانا وعلي ربهم يتوكلون"],[8,"الأنفال","Al-Anfal",3,"الذين يقيمون الصلواة ومما رزقناهم ينفقون"],[8,"الأنفال","Al-Anfal",4,"اولائك هم المؤمنون حقا لهم درجات عند ربهم ومغفرة ورزق كريم"],[8,"الأنفال","Al-Anfal",5,"كما اخرجك ربك من بيتك بالحق وان فريقا من المؤمنين لكارهون"],[8,"الأنفال","Al-Anfal",6,"يجادلونك في الحق بعد ما تبين كانما يساقون الي الموت وهم ينظرون"],[8,"الأنفال","Al-Anfal",7,"واذ يعدكم الله احدي الطائفتين انها لكم وتودون ان غير ذات الشوكة تكون لكم ويريد الله ان يحق الحق بكلماته ويقطع دابر الكافرين"],[8,"الأنفال","Al-Anfal",8,"ليحق الحق ويبطل الباطل ولو كره المجرمون"],[8,"الأنفال","Al-Anfal",9,"اذ تستغيثون ربكم فاستجاب لكم اني ممدكم بالف من الملائكة مردفين"],[8,"الأنفال","Al-Anfal",10,"وما جعله الله الا بشري ولتطمئن به قلوبكم وما النصر الا من عند الله ان الله عزيز حكيم"],[8,"الأنفال","Al-Anfal",11,"اذ يغشيكم النعاس امنة منه وينزل عليكم من السماء ماء ليطهركم به ويذهب عنكم رجز الشيطان وليربط علي قلوبكم ويثبت به الاقدام"],[8,"الأنفال","Al-Anfal",12,"اذ يوحي ربك الي الملائكة اني معكم فثبتوا الذين ءامنوا سالقي في قلوب الذين كفروا الرعب فاضربوا فوق الاعناق واضربوا منهم كل بنان"],[8,"الأنفال","Al-Anfal",13,"ذالك بانهم شاقوا الله ورسوله ومن يشاقق الله ورسوله فان الله شديد العقاب"],[8,"الأنفال","Al-Anfal",14,"ذالكم فذوقوه وان للكافرين عذاب النار"],[8,"الأنفال","Al-Anfal",15,"ياايها الذين ءامنوا اذا لقيتم الذين كفروا زحفا فلا تولوهم الادبار"],[8,"الأنفال","Al-Anfal",16,"ومن يولهم يومئذ دبره الا متحرفا لقتال او متحيزا الي فئة فقد باء بغضب من الله وماويه جهنم وبئس المصير"],[8,"الأنفال","Al-Anfal",17,"فلم تقتلوهم ولاكن الله قتلهم وما رميت اذ رميت ولاكن الله رمي وليبلي المؤمنين منه بلاء حسنا ان الله سميع عليم"],[8,"الأنفال","Al-Anfal",18,"ذالكم وان الله موهن كيد الكافرين"],[8,"الأنفال","Al-Anfal",19,"ان تستفتحوا فقد جاءكم الفتح وان تنتهوا فهو خير لكم وان تعودوا نعد ولن تغني عنكم فئتكم شيا ولو كثرت وان الله مع المؤمنين"],[8,"الأنفال","Al-Anfal",20,"ياايها الذين ءامنوا اطيعوا الله ورسوله ولا تولوا عنه وانتم تسمعون"],[8,"الأنفال","Al-Anfal",21,"ولا تكونوا كالذين قالوا سمعنا وهم لا يسمعون"],[8,"الأنفال","Al-Anfal",22,"۞ان شر الدواب عند الله الصم البكم الذين لا يعقلون"],[8,"الأنفال","Al-Anfal",23,"ولو علم الله فيهم خيرا لاسمعهم ولو اسمعهم لتولوا وهم معرضون"],[8,"الأنفال","Al-Anfal",24,"ياايها الذين ءامنوا استجيبوا لله وللرسول اذا دعاكم لما يحييكم واعلموا ان الله يحول بين المرء وقلبه وانه اليه تحشرون"],[8,"الأنفال","Al-Anfal",25,"واتقوا فتنة لا تصيبن الذين ظلموا منكم خاصة واعلموا ان الله شديد العقاب"],[8,"الأنفال","Al-Anfal",26,"واذكروا اذ انتم قليل مستضعفون في الارض تخافون ان يتخطفكم الناس فاويكم وايدكم بنصره ورزقكم من الطيبات لعلكم تشكرون"],[8,"الأنفال","Al-Anfal",27,"ياايها الذين ءامنوا لا تخونوا الله والرسول وتخونوا اماناتكم وانتم تعلمون"],[8,"الأنفال","Al-Anfal",28,"واعلموا انما اموالكم واولادكم فتنة وان الله عنده اجر عظيم"],[8,"الأنفال","Al-Anfal",29,"ياايها الذين ءامنوا ان تتقوا الله يجعل لكم فرقانا ويكفر عنكم سياتكم ويغفر لكم والله ذو الفضل العظيم"],[8,"الأنفال","Al-Anfal",30,"واذ يمكر بك الذين كفروا ليثبتوك او يقتلوك او يخرجوك ويمكرون ويمكر الله والله خير الماكرين"],[8,"الأنفال","Al-Anfal",31,"واذا تتلي عليهم ءاياتنا قالوا قد سمعنا لو نشاء لقلنا مثل هاذا ان هاذا الا اساطير الاولين"],[8,"الأنفال","Al-Anfal",32,"واذ قالوا اللهم ان كان هاذا هو الحق من عندك فامطر علينا حجارة من السماء او ائتنا بعذاب اليم"],[8,"الأنفال","Al-Anfal",33,"وما كان الله ليعذبهم وانت فيهم وما كان الله معذبهم وهم يستغفرون"],[8,"الأنفال","Al-Anfal",34,"وما لهم الا يعذبهم الله وهم يصدون عن المسجد الحرام وما كانوا اولياءه ان اولياؤه الا المتقون ولاكن اكثرهم لا يعلمون"],[8,"الأنفال","Al-Anfal",35,"وما كان صلاتهم عند البيت الا مكاء وتصدية فذوقوا العذاب بما كنتم تكفرون"],[8,"الأنفال","Al-Anfal",36,"ان الذين كفروا ينفقون اموالهم ليصدوا عن سبيل الله فسينفقونها ثم تكون عليهم حسرة ثم يغلبون والذين كفروا الي جهنم يحشرون"],[8,"الأنفال","Al-Anfal",37,"ليميز الله الخبيث من الطيب ويجعل الخبيث بعضه علي بعض فيركمه جميعا فيجعله في جهنم اولائك هم الخاسرون"],[8,"الأنفال","Al-Anfal",38,"قل للذين كفروا ان ينتهوا يغفر لهم ما قد سلف وان يعودوا فقد مضت سنت الاولين"],[8,"الأنفال","Al-Anfal",39,"وقاتلوهم حتي لا تكون فتنة ويكون الدين كله لله فان انتهوا فان الله بما يعملون بصير"],[8,"الأنفال","Al-Anfal",40,"وان تولوا فاعلموا ان الله موليكم نعم المولي ونعم النصير"],[8,"الأنفال","Al-Anfal",41,"۞واعلموا انما غنمتم من شيء فان لله خمسه وللرسول ولذي القربي واليتامي والمساكين وابن السبيل ان كنتم ءامنتم بالله وما انزلنا علي عبدنا يوم الفرقان يوم التقي الجمعان والله علي كل شيء قدير"],[8,"الأنفال","Al-Anfal",42,"اذ انتم بالعدوة الدنيا وهم بالعدوة القصوي والركب اسفل منكم ولو تواعدتم لاختلفتم في الميعاد ولاكن ليقضي الله امرا كان مفعولا ليهلك من هلك عن بينة ويحيي من حي عن بينة وان الله لسميع عليم"],[8,"الأنفال","Al-Anfal",43,"اذ يريكهم الله في منامك قليلا ولو اريكهم كثيرا لفشلتم ولتنازعتم في الامر ولاكن الله سلم انه عليم بذات الصدور"],[8,"الأنفال","Al-Anfal",44,"واذ يريكموهم اذ التقيتم في اعينكم قليلا ويقللكم في اعينهم ليقضي الله امرا كان مفعولا والي الله ترجع الامور"],[8,"الأنفال","Al-Anfal",45,"ياايها الذين ءامنوا اذا لقيتم فئة فاثبتوا واذكروا الله كثيرا لعلكم تفلحون"],[8,"الأنفال","Al-Anfal",46,"واطيعوا الله ورسوله ولا تنازعوا فتفشلوا وتذهب ريحكم واصبروا ان الله مع الصابرين"],[8,"الأنفال","Al-Anfal",47,"ولا تكونوا كالذين خرجوا من ديارهم بطرا ورئاء الناس ويصدون عن سبيل الله والله بما يعملون محيط"],[8,"الأنفال","Al-Anfal",48,"واذ زين لهم الشيطان اعمالهم وقال لا غالب لكم اليوم من الناس واني جار لكم فلما تراءت الفئتان نكص علي عقبيه وقال اني بريء منكم اني اري ما لا ترون اني اخاف الله والله شديد العقاب"],[8,"الأنفال","Al-Anfal",49,"اذ يقول المنافقون والذين في قلوبهم مرض غر هاؤلاء دينهم ومن يتوكل علي الله فان الله عزيز حكيم"],[8,"الأنفال","Al-Anfal",50,"ولو تري اذ يتوفي الذين كفروا الملائكة يضربون وجوههم وادبارهم وذوقوا عذاب الحريق"],[8,"الأنفال","Al-Anfal",51,"ذالك بما قدمت ايديكم وان الله ليس بظلام للعبيد"],[8,"الأنفال","Al-Anfal",52,"كداب ءال فرعون والذين من قبلهم كفروا بايات الله فاخذهم الله بذنوبهم ان الله قوي شديد العقاب"],[8,"الأنفال","Al-Anfal",53,"ذالك بان الله لم يك مغيرا نعمة انعمها علي قوم حتي يغيروا ما بانفسهم وان الله سميع عليم"],[8,"الأنفال","Al-Anfal",54,"كداب ءال فرعون والذين من قبلهم كذبوا بايات ربهم فاهلكناهم بذنوبهم واغرقنا ءال فرعون وكل كانوا ظالمين"],[8,"الأنفال","Al-Anfal",55,"ان شر الدواب عند الله الذين كفروا فهم لا يؤمنون"],[8,"الأنفال","Al-Anfal",56,"الذين عاهدت منهم ثم ينقضون عهدهم في كل مرة وهم لا يتقون"],[8,"الأنفال","Al-Anfal",57,"فاما تثقفنهم في الحرب فشرد بهم من خلفهم لعلهم يذكرون"],[8,"الأنفال","Al-Anfal",58,"واما تخافن من قوم خيانة فانبذ اليهم علي سواء ان الله لا يحب الخائنين"],[8,"الأنفال","Al-Anfal",59,"ولا يحسبن الذين كفروا سبقوا انهم لا يعجزون"],[8,"الأنفال","Al-Anfal",60,"واعدوا لهم ما استطعتم من قوة ومن رباط الخيل ترهبون به عدو الله وعدوكم وءاخرين من دونهم لا تعلمونهم الله يعلمهم وما تنفقوا من شيء في سبيل الله يوف اليكم وانتم لا تظلمون"],[8,"الأنفال","Al-Anfal",61,"۞وان جنحوا للسلم فاجنح لها وتوكل علي الله انه هو السميع العليم"],[8,"الأنفال","Al-Anfal",62,"وان يريدوا ان يخدعوك فان حسبك الله هو الذي ايدك بنصره وبالمؤمنين"],[8,"الأنفال","Al-Anfal",63,"والف بين قلوبهم لو انفقت ما في الارض جميعا ما الفت بين قلوبهم ولاكن الله الف بينهم انه عزيز حكيم"],[8,"الأنفال","Al-Anfal",64,"ياايها النبي حسبك الله ومن اتبعك من المؤمنين"],[8,"الأنفال","Al-Anfal",65,"ياايها النبي حرض المؤمنين علي القتال ان يكن منكم عشرون صابرون يغلبوا مائتين وان يكن منكم مائة يغلبوا الفا من الذين كفروا بانهم قوم لا يفقهون"],[8,"الأنفال","Al-Anfal",66,"الان خفف الله عنكم وعلم ان فيكم ضعفا فان يكن منكم مائة صابرة يغلبوا مائتين وان يكن منكم الف يغلبوا الفين باذن الله والله مع الصابرين"],[8,"الأنفال","Al-Anfal",67,"ما كان لنبي ان يكون له اسري حتي يثخن في الارض تريدون عرض الدنيا والله يريد الاخرة والله عزيز حكيم"],[8,"الأنفال","Al-Anfal",68,"لولا كتاب من الله سبق لمسكم فيما اخذتم عذاب عظيم"],[8,"الأنفال","Al-Anfal",69,"فكلوا مما غنمتم حلالا طيبا واتقوا الله ان الله غفور رحيم"],[8,"الأنفال","Al-Anfal",70,"ياايها النبي قل لمن في ايديكم من الاسري ان يعلم الله في قلوبكم خيرا يؤتكم خيرا مما اخذ منكم ويغفر لكم والله غفور رحيم"],[8,"الأنفال","Al-Anfal",71,"وان يريدوا خيانتك فقد خانوا الله من قبل فامكن منهم والله عليم حكيم"],[8,"الأنفال","Al-Anfal",72,"ان الذين ءامنوا وهاجروا وجاهدوا باموالهم وانفسهم في سبيل الله والذين ءاووا ونصروا اولائك بعضهم اولياء بعض والذين ءامنوا ولم يهاجروا ما لكم من ولايتهم من شيء حتي يهاجروا وان استنصروكم في الدين فعليكم النصر الا علي قوم بينكم وبينهم ميثاق والله بما تعملون بصير"],[8,"الأنفال","Al-Anfal",73,"والذين كفروا بعضهم اولياء بعض الا تفعلوه تكن فتنة في الارض وفساد كبير"],[8,"الأنفال","Al-Anfal",74,"والذين ءامنوا وهاجروا وجاهدوا في سبيل الله والذين ءاووا ونصروا اولائك هم المؤمنون حقا لهم مغفرة ورزق كريم"],[8,"الأنفال","Al-Anfal",75,"والذين ءامنوا من بعد وهاجروا وجاهدوا معكم فاولائك منكم واولوا الارحام بعضهم اولي ببعض في كتاب الله ان الله بكل شيء عليم"],[9,"التوبة","At-Tawbah",1,"براءة من الله ورسوله الي الذين عاهدتم من المشركين"],[9,"التوبة","At-Tawbah",2,"فسيحوا في الارض اربعة اشهر واعلموا انكم غير معجزي الله وان الله مخزي الكافرين"],[9,"التوبة","At-Tawbah",3,"واذان من الله ورسوله الي الناس يوم الحج الاكبر ان الله بريء من المشركين ورسوله فان تبتم فهو خير لكم وان توليتم فاعلموا انكم غير معجزي الله وبشر الذين كفروا بعذاب اليم"],[9,"التوبة","At-Tawbah",4,"الا الذين عاهدتم من المشركين ثم لم ينقصوكم شيا ولم يظاهروا عليكم احدا فاتموا اليهم عهدهم الي مدتهم ان الله يحب المتقين"],[9,"التوبة","At-Tawbah",5,"فاذا انسلخ الاشهر الحرم فاقتلوا المشركين حيث وجدتموهم وخذوهم واحصروهم واقعدوا لهم كل مرصد فان تابوا واقاموا الصلواة وءاتوا الزكواة فخلوا سبيلهم ان الله غفور رحيم"],[9,"التوبة","At-Tawbah",6,"وان احد من المشركين استجارك فاجره حتي يسمع كلام الله ثم ابلغه مامنه ذالك بانهم قوم لا يعلمون"],[9,"التوبة","At-Tawbah",7,"كيف يكون للمشركين عهد عند الله وعند رسوله الا الذين عاهدتم عند المسجد الحرام فما استقاموا لكم فاستقيموا لهم ان الله يحب المتقين"],[9,"التوبة","At-Tawbah",8,"كيف وان يظهروا عليكم لا يرقبوا فيكم الا ولا ذمة يرضونكم بافواههم وتابي قلوبهم واكثرهم فاسقون"],[9,"التوبة","At-Tawbah",9,"اشتروا بايات الله ثمنا قليلا فصدوا عن سبيله انهم ساء ما كانوا يعملون"],[9,"التوبة","At-Tawbah",10,"لا يرقبون في مؤمن الا ولا ذمة واولائك هم المعتدون"],[9,"التوبة","At-Tawbah",11,"فان تابوا واقاموا الصلواة وءاتوا الزكواة فاخوانكم في الدين ونفصل الايات لقوم يعلمون"],[9,"التوبة","At-Tawbah",12,"وان نكثوا ايمانهم من بعد عهدهم وطعنوا في دينكم فقاتلوا ائمة الكفر انهم لا ايمان لهم لعلهم ينتهون"],[9,"التوبة","At-Tawbah",13,"الا تقاتلون قوما نكثوا ايمانهم وهموا باخراج الرسول وهم بدءوكم اول مرة اتخشونهم فالله احق ان تخشوه ان كنتم مؤمنين"],[9,"التوبة","At-Tawbah",14,"قاتلوهم يعذبهم الله بايديكم ويخزهم وينصركم عليهم ويشف صدور قوم مؤمنين"],[9,"التوبة","At-Tawbah",15,"ويذهب غيظ قلوبهم ويتوب الله علي من يشاء والله عليم حكيم"],[9,"التوبة","At-Tawbah",16,"ام حسبتم ان تتركوا ولما يعلم الله الذين جاهدوا منكم ولم يتخذوا من دون الله ولا رسوله ولا المؤمنين وليجة والله خبير بما تعملون"],[9,"التوبة","At-Tawbah",17,"ما كان للمشركين ان يعمروا مساجد الله شاهدين علي انفسهم بالكفر اولائك حبطت اعمالهم وفي النار هم خالدون"],[9,"التوبة","At-Tawbah",18,"انما يعمر مساجد الله من ءامن بالله واليوم الاخر واقام الصلواة وءاتي الزكواة ولم يخش الا الله فعسي اولائك ان يكونوا من المهتدين"],[9,"التوبة","At-Tawbah",19,"۞اجعلتم سقاية الحاج وعمارة المسجد الحرام كمن ءامن بالله واليوم الاخر وجاهد في سبيل الله لا يستون عند الله والله لا يهدي القوم الظالمين"],[9,"التوبة","At-Tawbah",20,"الذين ءامنوا وهاجروا وجاهدوا في سبيل الله باموالهم وانفسهم اعظم درجة عند الله واولائك هم الفائزون"],[9,"التوبة","At-Tawbah",21,"يبشرهم ربهم برحمة منه ورضوان وجنات لهم فيها نعيم مقيم"],[9,"التوبة","At-Tawbah",22,"خالدين فيها ابدا ان الله عنده اجر عظيم"],[9,"التوبة","At-Tawbah",23,"ياايها الذين ءامنوا لا تتخذوا ءاباءكم واخوانكم اولياء ان استحبوا الكفر علي الايمان ومن يتولهم منكم فاولائك هم الظالمون"],[9,"التوبة","At-Tawbah",24,"قل ان كان ءاباؤكم وابناؤكم واخوانكم وازواجكم وعشيرتكم واموال اقترفتموها وتجارة تخشون كسادها ومساكن ترضونها احب اليكم من الله ورسوله وجهاد في سبيله فتربصوا حتي ياتي الله بامره والله لا يهدي القوم الفاسقين"],[9,"التوبة","At-Tawbah",25,"لقد نصركم الله في مواطن كثيرة ويوم حنين اذ اعجبتكم كثرتكم فلم تغن عنكم شيا وضاقت عليكم الارض بما رحبت ثم وليتم مدبرين"],[9,"التوبة","At-Tawbah",26,"ثم انزل الله سكينته علي رسوله وعلي المؤمنين وانزل جنودا لم تروها وعذب الذين كفروا وذالك جزاء الكافرين"],[9,"التوبة","At-Tawbah",27,"ثم يتوب الله من بعد ذالك علي من يشاء والله غفور رحيم"],[9,"التوبة","At-Tawbah",28,"ياايها الذين ءامنوا انما المشركون نجس فلا يقربوا المسجد الحرام بعد عامهم هاذا وان خفتم عيلة فسوف يغنيكم الله من فضله ان شاء ان الله عليم حكيم"],[9,"التوبة","At-Tawbah",29,"قاتلوا الذين لا يؤمنون بالله ولا باليوم الاخر ولا يحرمون ما حرم الله ورسوله ولا يدينون دين الحق من الذين اوتوا الكتاب حتي يعطوا الجزية عن يد وهم صاغرون"],[9,"التوبة","At-Tawbah",30,"وقالت اليهود عزير ابن الله وقالت النصاري المسيح ابن الله ذالك قولهم بافواههم يضاهون قول الذين كفروا من قبل قاتلهم الله اني يؤفكون"],[9,"التوبة","At-Tawbah",31,"اتخذوا احبارهم ورهبانهم اربابا من دون الله والمسيح ابن مريم وما امروا الا ليعبدوا الاها واحدا لا الاه الا هو سبحانه عما يشركون"],[9,"التوبة","At-Tawbah",32,"يريدون ان يطفوا نور الله بافواههم ويابي الله الا ان يتم نوره ولو كره الكافرون"],[9,"التوبة","At-Tawbah",33,"هو الذي ارسل رسوله بالهدي ودين الحق ليظهره علي الدين كله ولو كره المشركون"],[9,"التوبة","At-Tawbah",34,"۞ياايها الذين ءامنوا ان كثيرا من الاحبار والرهبان لياكلون اموال الناس بالباطل ويصدون عن سبيل الله والذين يكنزون الذهب والفضة ولا ينفقونها في سبيل الله فبشرهم بعذاب اليم"],[9,"التوبة","At-Tawbah",35,"يوم يحمي عليها في نار جهنم فتكوي بها جباههم وجنوبهم وظهورهم هاذا ما كنزتم لانفسكم فذوقوا ما كنتم تكنزون"],[9,"التوبة","At-Tawbah",36,"ان عدة الشهور عند الله اثنا عشر شهرا في كتاب الله يوم خلق السماوات والارض منها اربعة حرم ذالك الدين القيم فلا تظلموا فيهن انفسكم وقاتلوا المشركين كافة كما يقاتلونكم كافة واعلموا ان الله مع المتقين"],[9,"التوبة","At-Tawbah",37,"انما النسيء زيادة في الكفر يضل به الذين كفروا يحلونه عاما ويحرمونه عاما ليواطوا عدة ما حرم الله فيحلوا ما حرم الله زين لهم سوء اعمالهم والله لا يهدي القوم الكافرين"],[9,"التوبة","At-Tawbah",38,"ياايها الذين ءامنوا ما لكم اذا قيل لكم انفروا في سبيل الله اثاقلتم الي الارض ارضيتم بالحيواة الدنيا من الاخرة فما متاع الحيواة الدنيا في الاخرة الا قليل"],[9,"التوبة","At-Tawbah",39,"الا تنفروا يعذبكم عذابا اليما ويستبدل قوما غيركم ولا تضروه شيا والله علي كل شيء قدير"],[9,"التوبة","At-Tawbah",40,"الا تنصروه فقد نصره الله اذ اخرجه الذين كفروا ثاني اثنين اذ هما في الغار اذ يقول لصاحبه لا تحزن ان الله معنا فانزل الله سكينته عليه وايده بجنود لم تروها وجعل كلمة الذين كفروا السفلي وكلمة الله هي العليا والله عزيز حكيم"],[9,"التوبة","At-Tawbah",41,"انفروا خفافا وثقالا وجاهدوا باموالكم وانفسكم في سبيل الله ذالكم خير لكم ان كنتم تعلمون"],[9,"التوبة","At-Tawbah",42,"لو كان عرضا قريبا وسفرا قاصدا لاتبعوك ولاكن بعدت عليهم الشقة وسيحلفون بالله لو استطعنا لخرجنا معكم يهلكون انفسهم والله يعلم انهم لكاذبون"],[9,"التوبة","At-Tawbah",43,"عفا الله عنك لم اذنت لهم حتي يتبين لك الذين صدقوا وتعلم الكاذبين"],[9,"التوبة","At-Tawbah",44,"لا يستذنك الذين يؤمنون بالله واليوم الاخر ان يجاهدوا باموالهم وانفسهم والله عليم بالمتقين"],[9,"التوبة","At-Tawbah",45,"انما يستذنك الذين لا يؤمنون بالله واليوم الاخر وارتابت قلوبهم فهم في ريبهم يترددون"],[9,"التوبة","At-Tawbah",46,"۞ولو ارادوا الخروج لاعدوا له عدة ولاكن كره الله انبعاثهم فثبطهم وقيل اقعدوا مع القاعدين"],[9,"التوبة","At-Tawbah",47,"لو خرجوا فيكم ما زادوكم الا خبالا ولاوضعوا خلالكم يبغونكم الفتنة وفيكم سماعون لهم والله عليم بالظالمين"],[9,"التوبة","At-Tawbah",48,"لقد ابتغوا الفتنة من قبل وقلبوا لك الامور حتي جاء الحق وظهر امر الله وهم كارهون"],[9,"التوبة","At-Tawbah",49,"ومنهم من يقول ائذن لي ولا تفتني الا في الفتنة سقطوا وان جهنم لمحيطة بالكافرين"],[9,"التوبة","At-Tawbah",50,"ان تصبك حسنة تسؤهم وان تصبك مصيبة يقولوا قد اخذنا امرنا من قبل ويتولوا وهم فرحون"],[9,"التوبة","At-Tawbah",51,"قل لن يصيبنا الا ما كتب الله لنا هو مولينا وعلي الله فليتوكل المؤمنون"],[9,"التوبة","At-Tawbah",52,"قل هل تربصون بنا الا احدي الحسنيين ونحن نتربص بكم ان يصيبكم الله بعذاب من عنده او بايدينا فتربصوا انا معكم متربصون"],[9,"التوبة","At-Tawbah",53,"قل انفقوا طوعا او كرها لن يتقبل منكم انكم كنتم قوما فاسقين"],[9,"التوبة","At-Tawbah",54,"وما منعهم ان تقبل منهم نفقاتهم الا انهم كفروا بالله وبرسوله ولا ياتون الصلواة الا وهم كسالي ولا ينفقون الا وهم كارهون"],[9,"التوبة","At-Tawbah",55,"فلا تعجبك اموالهم ولا اولادهم انما يريد الله ليعذبهم بها في الحيواة الدنيا وتزهق انفسهم وهم كافرون"],[9,"التوبة","At-Tawbah",56,"ويحلفون بالله انهم لمنكم وما هم منكم ولاكنهم قوم يفرقون"],[9,"التوبة","At-Tawbah",57,"لو يجدون ملجا او مغارات او مدخلا لولوا اليه وهم يجمحون"],[9,"التوبة","At-Tawbah",58,"ومنهم من يلمزك في الصدقات فان اعطوا منها رضوا وان لم يعطوا منها اذا هم يسخطون"],[9,"التوبة","At-Tawbah",59,"ولو انهم رضوا ما ءاتيهم الله ورسوله وقالوا حسبنا الله سيؤتينا الله من فضله ورسوله انا الي الله راغبون"],[9,"التوبة","At-Tawbah",60,"۞انما الصدقات للفقراء والمساكين والعاملين عليها والمؤلفة قلوبهم وفي الرقاب والغارمين وفي سبيل الله وابن السبيل فريضة من الله والله عليم حكيم"],[9,"التوبة","At-Tawbah",61,"ومنهم الذين يؤذون النبي ويقولون هو اذن قل اذن خير لكم يؤمن بالله ويؤمن للمؤمنين ورحمة للذين ءامنوا منكم والذين يؤذون رسول الله لهم عذاب اليم"],[9,"التوبة","At-Tawbah",62,"يحلفون بالله لكم ليرضوكم والله ورسوله احق ان يرضوه ان كانوا مؤمنين"],[9,"التوبة","At-Tawbah",63,"الم يعلموا انه من يحادد الله ورسوله فان له نار جهنم خالدا فيها ذالك الخزي العظيم"],[9,"التوبة","At-Tawbah",64,"يحذر المنافقون ان تنزل عليهم سورة تنبئهم بما في قلوبهم قل استهزءوا ان الله مخرج ما تحذرون"],[9,"التوبة","At-Tawbah",65,"ولئن سالتهم ليقولن انما كنا نخوض ونلعب قل ابالله وءاياته ورسوله كنتم تستهزءون"],[9,"التوبة","At-Tawbah",66,"لا تعتذروا قد كفرتم بعد ايمانكم ان نعف عن طائفة منكم نعذب طائفة بانهم كانوا مجرمين"],[9,"التوبة","At-Tawbah",67,"المنافقون والمنافقات بعضهم من بعض يامرون بالمنكر وينهون عن المعروف ويقبضون ايديهم نسوا الله فنسيهم ان المنافقين هم الفاسقون"],[9,"التوبة","At-Tawbah",68,"وعد الله المنافقين والمنافقات والكفار نار جهنم خالدين فيها هي حسبهم ولعنهم الله ولهم عذاب مقيم"],[9,"التوبة","At-Tawbah",69,"كالذين من قبلكم كانوا اشد منكم قوة واكثر اموالا واولادا فاستمتعوا بخلاقهم فاستمتعتم بخلاقكم كما استمتع الذين من قبلكم بخلاقهم وخضتم كالذي خاضوا اولائك حبطت اعمالهم في الدنيا والاخرة واولائك هم الخاسرون"],[9,"التوبة","At-Tawbah",70,"الم ياتهم نبا الذين من قبلهم قوم نوح وعاد وثمود وقوم ابراهيم واصحاب مدين والمؤتفكات اتتهم رسلهم بالبينات فما كان الله ليظلمهم ولاكن كانوا انفسهم يظلمون"],[9,"التوبة","At-Tawbah",71,"والمؤمنون والمؤمنات بعضهم اولياء بعض يامرون بالمعروف وينهون عن المنكر ويقيمون الصلواة ويؤتون الزكواة ويطيعون الله ورسوله اولائك سيرحمهم الله ان الله عزيز حكيم"],[9,"التوبة","At-Tawbah",72,"وعد الله المؤمنين والمؤمنات جنات تجري من تحتها الانهار خالدين فيها ومساكن طيبة في جنات عدن ورضوان من الله اكبر ذالك هو الفوز العظيم"],[9,"التوبة","At-Tawbah",73,"ياايها النبي جاهد الكفار والمنافقين واغلظ عليهم وماويهم جهنم وبئس المصير"],[9,"التوبة","At-Tawbah",74,"يحلفون بالله ما قالوا ولقد قالوا كلمة الكفر وكفروا بعد اسلامهم وهموا بما لم ينالوا وما نقموا الا ان اغنيهم الله ورسوله من فضله فان يتوبوا يك خيرا لهم وان يتولوا يعذبهم الله عذابا اليما في الدنيا والاخرة وما لهم في الارض من ولي ولا نصير"],[9,"التوبة","At-Tawbah",75,"۞ومنهم من عاهد الله لئن ءاتينا من فضله لنصدقن ولنكونن من الصالحين"],[9,"التوبة","At-Tawbah",76,"فلما ءاتيهم من فضله بخلوا به وتولوا وهم معرضون"],[9,"التوبة","At-Tawbah",77,"فاعقبهم نفاقا في قلوبهم الي يوم يلقونه بما اخلفوا الله ما وعدوه وبما كانوا يكذبون"],[9,"التوبة","At-Tawbah",78,"الم يعلموا ان الله يعلم سرهم ونجويهم وان الله علام الغيوب"],[9,"التوبة","At-Tawbah",79,"الذين يلمزون المطوعين من المؤمنين في الصدقات والذين لا يجدون الا جهدهم فيسخرون منهم سخر الله منهم ولهم عذاب اليم"],[9,"التوبة","At-Tawbah",80,"استغفر لهم او لا تستغفر لهم ان تستغفر لهم سبعين مرة فلن يغفر الله لهم ذالك بانهم كفروا بالله ورسوله والله لا يهدي القوم الفاسقين"],[9,"التوبة","At-Tawbah",81,"فرح المخلفون بمقعدهم خلاف رسول الله وكرهوا ان يجاهدوا باموالهم وانفسهم في سبيل الله وقالوا لا تنفروا في الحر قل نار جهنم اشد حرا لو كانوا يفقهون"],[9,"التوبة","At-Tawbah",82,"فليضحكوا قليلا وليبكوا كثيرا جزاء بما كانوا يكسبون"],[9,"التوبة","At-Tawbah",83,"فان رجعك الله الي طائفة منهم فاستذنوك للخروج فقل لن تخرجوا معي ابدا ولن تقاتلوا معي عدوا انكم رضيتم بالقعود اول مرة فاقعدوا مع الخالفين"],[9,"التوبة","At-Tawbah",84,"ولا تصل علي احد منهم مات ابدا ولا تقم علي قبره انهم كفروا بالله ورسوله وماتوا وهم فاسقون"],[9,"التوبة","At-Tawbah",85,"ولا تعجبك اموالهم واولادهم انما يريد الله ان يعذبهم بها في الدنيا وتزهق انفسهم وهم كافرون"],[9,"التوبة","At-Tawbah",86,"واذا انزلت سورة ان ءامنوا بالله وجاهدوا مع رسوله استذنك اولوا الطول منهم وقالوا ذرنا نكن مع القاعدين"],[9,"التوبة","At-Tawbah",87,"رضوا بان يكونوا مع الخوالف وطبع علي قلوبهم فهم لا يفقهون"],[9,"التوبة","At-Tawbah",88,"لاكن الرسول والذين ءامنوا معه جاهدوا باموالهم وانفسهم واولائك لهم الخيرات واولائك هم المفلحون"],[9,"التوبة","At-Tawbah",89,"اعد الله لهم جنات تجري من تحتها الانهار خالدين فيها ذالك الفوز العظيم"],[9,"التوبة","At-Tawbah",90,"وجاء المعذرون من الاعراب ليؤذن لهم وقعد الذين كذبوا الله ورسوله سيصيب الذين كفروا منهم عذاب اليم"],[9,"التوبة","At-Tawbah",91,"ليس علي الضعفاء ولا علي المرضي ولا علي الذين لا يجدون ما ينفقون حرج اذا نصحوا لله ورسوله ما علي المحسنين من سبيل والله غفور رحيم"],[9,"التوبة","At-Tawbah",92,"ولا علي الذين اذا ما اتوك لتحملهم قلت لا اجد ما احملكم عليه تولوا واعينهم تفيض من الدمع حزنا الا يجدوا ما ينفقون"],[9,"التوبة","At-Tawbah",93,"۞انما السبيل علي الذين يستذنونك وهم اغنياء رضوا بان يكونوا مع الخوالف وطبع الله علي قلوبهم فهم لا يعلمون"],[9,"التوبة","At-Tawbah",94,"يعتذرون اليكم اذا رجعتم اليهم قل لا تعتذروا لن نؤمن لكم قد نبانا الله من اخباركم وسيري الله عملكم ورسوله ثم تردون الي عالم الغيب والشهادة فينبئكم بما كنتم تعملون"],[9,"التوبة","At-Tawbah",95,"سيحلفون بالله لكم اذا انقلبتم اليهم لتعرضوا عنهم فاعرضوا عنهم انهم رجس وماويهم جهنم جزاء بما كانوا يكسبون"],[9,"التوبة","At-Tawbah",96,"يحلفون لكم لترضوا عنهم فان ترضوا عنهم فان الله لا يرضي عن القوم الفاسقين"],[9,"التوبة","At-Tawbah",97,"الاعراب اشد كفرا ونفاقا واجدر الا يعلموا حدود ما انزل الله علي رسوله والله عليم حكيم"],[9,"التوبة","At-Tawbah",98,"ومن الاعراب من يتخذ ما ينفق مغرما ويتربص بكم الدوائر عليهم دائرة السوء والله سميع عليم"],[9,"التوبة","At-Tawbah",99,"ومن الاعراب من يؤمن بالله واليوم الاخر ويتخذ ما ينفق قربات عند الله وصلوات الرسول الا انها قربة لهم سيدخلهم الله في رحمته ان الله غفور رحيم"],[9,"التوبة","At-Tawbah",100,"والسابقون الاولون من المهاجرين والانصار والذين اتبعوهم باحسان رضي الله عنهم ورضوا عنه واعد لهم جنات تجري تحتها الانهار خالدين فيها ابدا ذالك الفوز العظيم"],[9,"التوبة","At-Tawbah",101,"وممن حولكم من الاعراب منافقون ومن اهل المدينة مردوا علي النفاق لا تعلمهم نحن نعلمهم سنعذبهم مرتين ثم يردون الي عذاب عظيم"],[9,"التوبة","At-Tawbah",102,"وءاخرون اعترفوا بذنوبهم خلطوا عملا صالحا وءاخر سيئا عسي الله ان يتوب عليهم ان الله غفور رحيم"],[9,"التوبة","At-Tawbah",103,"خذ من اموالهم صدقة تطهرهم وتزكيهم بها وصل عليهم ان صلواتك سكن لهم والله سميع عليم"],[9,"التوبة","At-Tawbah",104,"الم يعلموا ان الله هو يقبل التوبة عن عباده وياخذ الصدقات وان الله هو التواب الرحيم"],[9,"التوبة","At-Tawbah",105,"وقل اعملوا فسيري الله عملكم ورسوله والمؤمنون وستردون الي عالم الغيب والشهادة فينبئكم بما كنتم تعملون"],[9,"التوبة","At-Tawbah",106,"وءاخرون مرجون لامر الله اما يعذبهم واما يتوب عليهم والله عليم حكيم"],[9,"التوبة","At-Tawbah",107,"والذين اتخذوا مسجدا ضرارا وكفرا وتفريقا بين المؤمنين وارصادا لمن حارب الله ورسوله من قبل وليحلفن ان اردنا الا الحسني والله يشهد انهم لكاذبون"],[9,"التوبة","At-Tawbah",108,"لا تقم فيه ابدا لمسجد اسس علي التقوي من اول يوم احق ان تقوم فيه فيه رجال يحبون ان يتطهروا والله يحب المطهرين"],[9,"التوبة","At-Tawbah",109,"افمن اسس بنيانه علي تقوي من الله ورضوان خير ام من اسس بنيانه علي شفا جرف هار فانهار به في نار جهنم والله لا يهدي القوم الظالمين"],[9,"التوبة","At-Tawbah",110,"لا يزال بنيانهم الذي بنوا ريبة في قلوبهم الا ان تقطع قلوبهم والله عليم حكيم"],[9,"التوبة","At-Tawbah",111,"۞ان الله اشتري من المؤمنين انفسهم واموالهم بان لهم الجنة يقاتلون في سبيل الله فيقتلون ويقتلون وعدا عليه حقا في التورية والانجيل والقرءان ومن اوفي بعهده من الله فاستبشروا ببيعكم الذي بايعتم به وذالك هو الفوز العظيم"],[9,"التوبة","At-Tawbah",112,"التائبون العابدون الحامدون السائحون الراكعون الساجدون الامرون بالمعروف والناهون عن المنكر والحافظون لحدود الله وبشر المؤمنين"],[9,"التوبة","At-Tawbah",113,"ما كان للنبي والذين ءامنوا ان يستغفروا للمشركين ولو كانوا اولي قربي من بعد ما تبين لهم انهم اصحاب الجحيم"],[9,"التوبة","At-Tawbah",114,"وما كان استغفار ابراهيم لابيه الا عن موعدة وعدها اياه فلما تبين له انه عدو لله تبرا منه ان ابراهيم لاواه حليم"],[9,"التوبة","At-Tawbah",115,"وما كان الله ليضل قوما بعد اذ هديهم حتي يبين لهم ما يتقون ان الله بكل شيء عليم"],[9,"التوبة","At-Tawbah",116,"ان الله له ملك السماوات والارض يحي ويميت وما لكم من دون الله من ولي ولا نصير"],[9,"التوبة","At-Tawbah",117,"لقد تاب الله علي النبي والمهاجرين والانصار الذين اتبعوه في ساعة العسرة من بعد ما كاد يزيغ قلوب فريق منهم ثم تاب عليهم انه بهم رءوف رحيم"],[9,"التوبة","At-Tawbah",118,"وعلي الثلاثة الذين خلفوا حتي اذا ضاقت عليهم الارض بما رحبت وضاقت عليهم انفسهم وظنوا ان لا ملجا من الله الا اليه ثم تاب عليهم ليتوبوا ان الله هو التواب الرحيم"],[9,"التوبة","At-Tawbah",119,"ياايها الذين ءامنوا اتقوا الله وكونوا مع الصادقين"],[9,"التوبة","At-Tawbah",120,"ما كان لاهل المدينة ومن حولهم من الاعراب ان يتخلفوا عن رسول الله ولا يرغبوا بانفسهم عن نفسه ذالك بانهم لا يصيبهم ظما ولا نصب ولا مخمصة في سبيل الله ولا يطون موطئا يغيظ الكفار ولا ينالون من عدو نيلا الا كتب لهم به عمل صالح ان الله لا يضيع اجر المحسنين"],[9,"التوبة","At-Tawbah",121,"ولا ينفقون نفقة صغيرة ولا كبيرة ولا يقطعون واديا الا كتب لهم ليجزيهم الله احسن ما كانوا يعملون"],[9,"التوبة","At-Tawbah",122,"۞وما كان المؤمنون لينفروا كافة فلولا نفر من كل فرقة منهم طائفة ليتفقهوا في الدين ولينذروا قومهم اذا رجعوا اليهم لعلهم يحذرون"],[9,"التوبة","At-Tawbah",123,"ياايها الذين ءامنوا قاتلوا الذين يلونكم من الكفار وليجدوا فيكم غلظة واعلموا ان الله مع المتقين"],[9,"التوبة","At-Tawbah",124,"واذا ما انزلت سورة فمنهم من يقول ايكم زادته هاذه ايمانا فاما الذين ءامنوا فزادتهم ايمانا وهم يستبشرون"],[9,"التوبة","At-Tawbah",125,"واما الذين في قلوبهم مرض فزادتهم رجسا الي رجسهم وماتوا وهم كافرون"],[9,"التوبة","At-Tawbah",126,"اولا يرون انهم يفتنون في كل عام مرة او مرتين ثم لا يتوبون ولا هم يذكرون"],[9,"التوبة","At-Tawbah",127,"واذا ما انزلت سورة نظر بعضهم الي بعض هل يريكم من احد ثم انصرفوا صرف الله قلوبهم بانهم قوم لا يفقهون"],[9,"التوبة","At-Tawbah",128,"لقد جاءكم رسول من انفسكم عزيز عليه ما عنتم حريص عليكم بالمؤمنين رءوف رحيم"],[9,"التوبة","At-Tawbah",129,"فان تولوا فقل حسبي الله لا الاه الا هو عليه توكلت وهو رب العرش العظيم"],[10,"يونس","Yunus",1,"الر تلك ءايات الكتاب الحكيم"],[10,"يونس","Yunus",2,"اكان للناس عجبا ان اوحينا الي رجل منهم ان انذر الناس وبشر الذين ءامنوا ان لهم قدم صدق عند ربهم قال الكافرون ان هاذا لساحر مبين"],[10,"يونس","Yunus",3,"ان ربكم الله الذي خلق السماوات والارض في ستة ايام ثم استوي علي العرش يدبر الامر ما من شفيع الا من بعد اذنه ذالكم الله ربكم فاعبدوه افلا تذكرون"],[10,"يونس","Yunus",4,"اليه مرجعكم جميعا وعد الله حقا انه يبدؤا الخلق ثم يعيده ليجزي الذين ءامنوا وعملوا الصالحات بالقسط والذين كفروا لهم شراب من حميم وعذاب اليم بما كانوا يكفرون"],[10,"يونس","Yunus",5,"هو الذي جعل الشمس ضياء والقمر نورا وقدره منازل لتعلموا عدد السنين والحساب ما خلق الله ذالك الا بالحق يفصل الايات لقوم يعلمون"],[10,"يونس","Yunus",6,"ان في اختلاف اليل والنهار وما خلق الله في السماوات والارض لايات لقوم يتقون"],[10,"يونس","Yunus",7,"ان الذين لا يرجون لقاءنا ورضوا بالحيواة الدنيا واطمانوا بها والذين هم عن ءاياتنا غافلون"],[10,"يونس","Yunus",8,"اولائك ماويهم النار بما كانوا يكسبون"],[10,"يونس","Yunus",9,"ان الذين ءامنوا وعملوا الصالحات يهديهم ربهم بايمانهم تجري من تحتهم الانهار في جنات النعيم"],[10,"يونس","Yunus",10,"دعويهم فيها سبحانك اللهم وتحيتهم فيها سلام وءاخر دعويهم ان الحمد لله رب العالمين"],[10,"يونس","Yunus",11,"۞ولو يعجل الله للناس الشر استعجالهم بالخير لقضي اليهم اجلهم فنذر الذين لا يرجون لقاءنا في طغيانهم يعمهون"],[10,"يونس","Yunus",12,"واذا مس الانسان الضر دعانا لجنبه او قاعدا او قائما فلما كشفنا عنه ضره مر كان لم يدعنا الي ضر مسه كذالك زين للمسرفين ما كانوا يعملون"],[10,"يونس","Yunus",13,"ولقد اهلكنا القرون من قبلكم لما ظلموا وجاءتهم رسلهم بالبينات وما كانوا ليؤمنوا كذالك نجزي القوم المجرمين"],[10,"يونس","Yunus",14,"ثم جعلناكم خلائف في الارض من بعدهم لننظر كيف تعملون"],[10,"يونس","Yunus",15,"واذا تتلي عليهم ءاياتنا بينات قال الذين لا يرجون لقاءنا ائت بقرءان غير هاذا او بدله قل ما يكون لي ان ابدله من تلقاي نفسي ان اتبع الا ما يوحي الي اني اخاف ان عصيت ربي عذاب يوم عظيم"],[10,"يونس","Yunus",16,"قل لو شاء الله ما تلوته عليكم ولا ادريكم به فقد لبثت فيكم عمرا من قبله افلا تعقلون"],[10,"يونس","Yunus",17,"فمن اظلم ممن افتري علي الله كذبا او كذب باياته انه لا يفلح المجرمون"],[10,"يونس","Yunus",18,"ويعبدون من دون الله ما لا يضرهم ولا ينفعهم ويقولون هاؤلاء شفعاؤنا عند الله قل اتنبون الله بما لا يعلم في السماوات ولا في الارض سبحانه وتعالي عما يشركون"],[10,"يونس","Yunus",19,"وما كان الناس الا امة واحدة فاختلفوا ولولا كلمة سبقت من ربك لقضي بينهم فيما فيه يختلفون"],[10,"يونس","Yunus",20,"ويقولون لولا انزل عليه ءاية من ربه فقل انما الغيب لله فانتظروا اني معكم من المنتظرين"],[10,"يونس","Yunus",21,"واذا اذقنا الناس رحمة من بعد ضراء مستهم اذا لهم مكر في ءاياتنا قل الله اسرع مكرا ان رسلنا يكتبون ما تمكرون"],[10,"يونس","Yunus",22,"هو الذي يسيركم في البر والبحر حتي اذا كنتم في الفلك وجرين بهم بريح طيبة وفرحوا بها جاءتها ريح عاصف وجاءهم الموج من كل مكان وظنوا انهم احيط بهم دعوا الله مخلصين له الدين لئن انجيتنا من هاذه لنكونن من الشاكرين"],[10,"يونس","Yunus",23,"فلما انجيهم اذا هم يبغون في الارض بغير الحق ياايها الناس انما بغيكم علي انفسكم متاع الحيواة الدنيا ثم الينا مرجعكم فننبئكم بما كنتم تعملون"],[10,"يونس","Yunus",24,"انما مثل الحيواة الدنيا كماء انزلناه من السماء فاختلط به نبات الارض مما ياكل الناس والانعام حتي اذا اخذت الارض زخرفها وازينت وظن اهلها انهم قادرون عليها اتيها امرنا ليلا او نهارا فجعلناها حصيدا كان لم تغن بالامس كذالك نفصل الايات لقوم يتفكرون"],[10,"يونس","Yunus",25,"والله يدعوا الي دار السلام ويهدي من يشاء الي صراط مستقيم"],[10,"يونس","Yunus",26,"۞للذين احسنوا الحسني وزيادة ولا يرهق وجوههم قتر ولا ذلة اولائك اصحاب الجنة هم فيها خالدون"],[10,"يونس","Yunus",27,"والذين كسبوا السيات جزاء سيئة بمثلها وترهقهم ذلة ما لهم من الله من عاصم كانما اغشيت وجوههم قطعا من اليل مظلما اولائك اصحاب النار هم فيها خالدون"],[10,"يونس","Yunus",28,"ويوم نحشرهم جميعا ثم نقول للذين اشركوا مكانكم انتم وشركاؤكم فزيلنا بينهم وقال شركاؤهم ما كنتم ايانا تعبدون"],[10,"يونس","Yunus",29,"فكفي بالله شهيدا بيننا وبينكم ان كنا عن عبادتكم لغافلين"],[10,"يونس","Yunus",30,"هنالك تبلوا كل نفس ما اسلفت وردوا الي الله موليهم الحق وضل عنهم ما كانوا يفترون"],[10,"يونس","Yunus",31,"قل من يرزقكم من السماء والارض امن يملك السمع والابصار ومن يخرج الحي من الميت ويخرج الميت من الحي ومن يدبر الامر فسيقولون الله فقل افلا تتقون"],[10,"يونس","Yunus",32,"فذالكم الله ربكم الحق فماذا بعد الحق الا الضلال فاني تصرفون"],[10,"يونس","Yunus",33,"كذالك حقت كلمت ربك علي الذين فسقوا انهم لا يؤمنون"],[10,"يونس","Yunus",34,"قل هل من شركائكم من يبدؤا الخلق ثم يعيده قل الله يبدؤا الخلق ثم يعيده فاني تؤفكون"],[10,"يونس","Yunus",35,"قل هل من شركائكم من يهدي الي الحق قل الله يهدي للحق افمن يهدي الي الحق احق ان يتبع امن لا يهدي الا ان يهدي فما لكم كيف تحكمون"],[10,"يونس","Yunus",36,"وما يتبع اكثرهم الا ظنا ان الظن لا يغني من الحق شيا ان الله عليم بما يفعلون"],[10,"يونس","Yunus",37,"وما كان هاذا القرءان ان يفتري من دون الله ولاكن تصديق الذي بين يديه وتفصيل الكتاب لا ريب فيه من رب العالمين"],[10,"يونس","Yunus",38,"ام يقولون افتريه قل فاتوا بسورة مثله وادعوا من استطعتم من دون الله ان كنتم صادقين"],[10,"يونس","Yunus",39,"بل كذبوا بما لم يحيطوا بعلمه ولما ياتهم تاويله كذالك كذب الذين من قبلهم فانظر كيف كان عاقبة الظالمين"],[10,"يونس","Yunus",40,"ومنهم من يؤمن به ومنهم من لا يؤمن به وربك اعلم بالمفسدين"],[10,"يونس","Yunus",41,"وان كذبوك فقل لي عملي ولكم عملكم انتم بريون مما اعمل وانا بريء مما تعملون"],[10,"يونس","Yunus",42,"ومنهم من يستمعون اليك افانت تسمع الصم ولو كانوا لا يعقلون"],[10,"يونس","Yunus",43,"ومنهم من ينظر اليك افانت تهدي العمي ولو كانوا لا يبصرون"],[10,"يونس","Yunus",44,"ان الله لا يظلم الناس شيا ولاكن الناس انفسهم يظلمون"],[10,"يونس","Yunus",45,"ويوم يحشرهم كان لم يلبثوا الا ساعة من النهار يتعارفون بينهم قد خسر الذين كذبوا بلقاء الله وما كانوا مهتدين"],[10,"يونس","Yunus",46,"واما نرينك بعض الذي نعدهم او نتوفينك فالينا مرجعهم ثم الله شهيد علي ما يفعلون"],[10,"يونس","Yunus",47,"ولكل امة رسول فاذا جاء رسولهم قضي بينهم بالقسط وهم لا يظلمون"],[10,"يونس","Yunus",48,"ويقولون متي هاذا الوعد ان كنتم صادقين"],[10,"يونس","Yunus",49,"قل لا املك لنفسي ضرا ولا نفعا الا ما شاء الله لكل امة اجل اذا جاء اجلهم فلا يستخرون ساعة ولا يستقدمون"],[10,"يونس","Yunus",50,"قل ارءيتم ان اتيكم عذابه بياتا او نهارا ماذا يستعجل منه المجرمون"],[10,"يونس","Yunus",51,"اثم اذا ما وقع ءامنتم به ءالان وقد كنتم به تستعجلون"],[10,"يونس","Yunus",52,"ثم قيل للذين ظلموا ذوقوا عذاب الخلد هل تجزون الا بما كنتم تكسبون"],[10,"يونس","Yunus",53,"۞ويستنبونك احق هو قل اي وربي انه لحق وما انتم بمعجزين"],[10,"يونس","Yunus",54,"ولو ان لكل نفس ظلمت ما في الارض لافتدت به واسروا الندامة لما راوا العذاب وقضي بينهم بالقسط وهم لا يظلمون"],[10,"يونس","Yunus",55,"الا ان لله ما في السماوات والارض الا ان وعد الله حق ولاكن اكثرهم لا يعلمون"],[10,"يونس","Yunus",56,"هو يحي ويميت واليه ترجعون"],[10,"يونس","Yunus",57,"ياايها الناس قد جاءتكم موعظة من ربكم وشفاء لما في الصدور وهدي ورحمة للمؤمنين"],[10,"يونس","Yunus",58,"قل بفضل الله وبرحمته فبذالك فليفرحوا هو خير مما يجمعون"],[10,"يونس","Yunus",59,"قل ارءيتم ما انزل الله لكم من رزق فجعلتم منه حراما وحلالا قل ءالله اذن لكم ام علي الله تفترون"],[10,"يونس","Yunus",60,"وما ظن الذين يفترون علي الله الكذب يوم القيامة ان الله لذو فضل علي الناس ولاكن اكثرهم لا يشكرون"],[10,"يونس","Yunus",61,"وما تكون في شان وما تتلوا منه من قرءان ولا تعملون من عمل الا كنا عليكم شهودا اذ تفيضون فيه وما يعزب عن ربك من مثقال ذرة في الارض ولا في السماء ولا اصغر من ذالك ولا اكبر الا في كتاب مبين"],[10,"يونس","Yunus",62,"الا ان اولياء الله لا خوف عليهم ولا هم يحزنون"],[10,"يونس","Yunus",63,"الذين ءامنوا وكانوا يتقون"],[10,"يونس","Yunus",64,"لهم البشري في الحيواة الدنيا وفي الاخرة لا تبديل لكلمات الله ذالك هو الفوز العظيم"],[10,"يونس","Yunus",65,"ولا يحزنك قولهم ان العزة لله جميعا هو السميع العليم"],[10,"يونس","Yunus",66,"الا ان لله من في السماوات ومن في الارض وما يتبع الذين يدعون من دون الله شركاء ان يتبعون الا الظن وان هم الا يخرصون"],[10,"يونس","Yunus",67,"هو الذي جعل لكم اليل لتسكنوا فيه والنهار مبصرا ان في ذالك لايات لقوم يسمعون"],[10,"يونس","Yunus",68,"قالوا اتخذ الله ولدا سبحانه هو الغني له ما في السماوات وما في الارض ان عندكم من سلطان بهاذا اتقولون علي الله ما لا تعلمون"],[10,"يونس","Yunus",69,"قل ان الذين يفترون علي الله الكذب لا يفلحون"],[10,"يونس","Yunus",70,"متاع في الدنيا ثم الينا مرجعهم ثم نذيقهم العذاب الشديد بما كانوا يكفرون"],[10,"يونس","Yunus",71,"۞واتل عليهم نبا نوح اذ قال لقومه ياقوم ان كان كبر عليكم مقامي وتذكيري بايات الله فعلي الله توكلت فاجمعوا امركم وشركاءكم ثم لا يكن امركم عليكم غمة ثم اقضوا الي ولا تنظرون"],[10,"يونس","Yunus",72,"فان توليتم فما سالتكم من اجر ان اجري الا علي الله وامرت ان اكون من المسلمين"],[10,"يونس","Yunus",73,"فكذبوه فنجيناه ومن معه في الفلك وجعلناهم خلائف واغرقنا الذين كذبوا باياتنا فانظر كيف كان عاقبة المنذرين"],[10,"يونس","Yunus",74,"ثم بعثنا من بعده رسلا الي قومهم فجاءوهم بالبينات فما كانوا ليؤمنوا بما كذبوا به من قبل كذالك نطبع علي قلوب المعتدين"],[10,"يونس","Yunus",75,"ثم بعثنا من بعدهم موسي وهارون الي فرعون وملايه باياتنا فاستكبروا وكانوا قوما مجرمين"],[10,"يونس","Yunus",76,"فلما جاءهم الحق من عندنا قالوا ان هاذا لسحر مبين"],[10,"يونس","Yunus",77,"قال موسي اتقولون للحق لما جاءكم اسحر هاذا ولا يفلح الساحرون"],[10,"يونس","Yunus",78,"قالوا اجئتنا لتلفتنا عما وجدنا عليه ءاباءنا وتكون لكما الكبرياء في الارض وما نحن لكما بمؤمنين"],[10,"يونس","Yunus",79,"وقال فرعون ائتوني بكل ساحر عليم"],[10,"يونس","Yunus",80,"فلما جاء السحرة قال لهم موسي القوا ما انتم ملقون"],[10,"يونس","Yunus",81,"فلما القوا قال موسي ما جئتم به السحر ان الله سيبطله ان الله لا يصلح عمل المفسدين"],[10,"يونس","Yunus",82,"ويحق الله الحق بكلماته ولو كره المجرمون"],[10,"يونس","Yunus",83,"فما ءامن لموسي الا ذرية من قومه علي خوف من فرعون وملايهم ان يفتنهم وان فرعون لعال في الارض وانه لمن المسرفين"],[10,"يونس","Yunus",84,"وقال موسي ياقوم ان كنتم ءامنتم بالله فعليه توكلوا ان كنتم مسلمين"],[10,"يونس","Yunus",85,"فقالوا علي الله توكلنا ربنا لا تجعلنا فتنة للقوم الظالمين"],[10,"يونس","Yunus",86,"ونجنا برحمتك من القوم الكافرين"],[10,"يونس","Yunus",87,"واوحينا الي موسي واخيه ان تبوءا لقومكما بمصر بيوتا واجعلوا بيوتكم قبلة واقيموا الصلواة وبشر المؤمنين"],[10,"يونس","Yunus",88,"وقال موسي ربنا انك ءاتيت فرعون وملاه زينة واموالا في الحيواة الدنيا ربنا ليضلوا عن سبيلك ربنا اطمس علي اموالهم واشدد علي قلوبهم فلا يؤمنوا حتي يروا العذاب الاليم"],[10,"يونس","Yunus",89,"قال قد اجيبت دعوتكما فاستقيما ولا تتبعان سبيل الذين لا يعلمون"],[10,"يونس","Yunus",90,"۞وجاوزنا ببني اسراءيل البحر فاتبعهم فرعون وجنوده بغيا وعدوا حتي اذا ادركه الغرق قال ءامنت انه لا الاه الا الذي ءامنت به بنوا اسراءيل وانا من المسلمين"],[10,"يونس","Yunus",91,"ءالان وقد عصيت قبل وكنت من المفسدين"],[10,"يونس","Yunus",92,"فاليوم ننجيك ببدنك لتكون لمن خلفك ءاية وان كثيرا من الناس عن ءاياتنا لغافلون"],[10,"يونس","Yunus",93,"ولقد بوانا بني اسراءيل مبوا صدق ورزقناهم من الطيبات فما اختلفوا حتي جاءهم العلم ان ربك يقضي بينهم يوم القيامة فيما كانوا فيه يختلفون"],[10,"يونس","Yunus",94,"فان كنت في شك مما انزلنا اليك فسل الذين يقرءون الكتاب من قبلك لقد جاءك الحق من ربك فلا تكونن من الممترين"],[10,"يونس","Yunus",95,"ولا تكونن من الذين كذبوا بايات الله فتكون من الخاسرين"],[10,"يونس","Yunus",96,"ان الذين حقت عليهم كلمت ربك لا يؤمنون"],[10,"يونس","Yunus",97,"ولو جاءتهم كل ءاية حتي يروا العذاب الاليم"],[10,"يونس","Yunus",98,"فلولا كانت قرية ءامنت فنفعها ايمانها الا قوم يونس لما ءامنوا كشفنا عنهم عذاب الخزي في الحيواة الدنيا ومتعناهم الي حين"],[10,"يونس","Yunus",99,"ولو شاء ربك لامن من في الارض كلهم جميعا افانت تكره الناس حتي يكونوا مؤمنين"],[10,"يونس","Yunus",100,"وما كان لنفس ان تؤمن الا باذن الله ويجعل الرجس علي الذين لا يعقلون"],[10,"يونس","Yunus",101,"قل انظروا ماذا في السماوات والارض وما تغني الايات والنذر عن قوم لا يؤمنون"],[10,"يونس","Yunus",102,"فهل ينتظرون الا مثل ايام الذين خلوا من قبلهم قل فانتظروا اني معكم من المنتظرين"],[10,"يونس","Yunus",103,"ثم ننجي رسلنا والذين ءامنوا كذالك حقا علينا ننج المؤمنين"],[10,"يونس","Yunus",104,"قل ياايها الناس ان كنتم في شك من ديني فلا اعبد الذين تعبدون من دون الله ولاكن اعبد الله الذي يتوفيكم وامرت ان اكون من المؤمنين"],[10,"يونس","Yunus",105,"وان اقم وجهك للدين حنيفا ولا تكونن من المشركين"],[10,"يونس","Yunus",106,"ولا تدع من دون الله ما لا ينفعك ولا يضرك فان فعلت فانك اذا من الظالمين"],[10,"يونس","Yunus",107,"وان يمسسك الله بضر فلا كاشف له الا هو وان يردك بخير فلا راد لفضله يصيب به من يشاء من عباده وهو الغفور الرحيم"],[10,"يونس","Yunus",108,"قل ياايها الناس قد جاءكم الحق من ربكم فمن اهتدي فانما يهتدي لنفسه ومن ضل فانما يضل عليها وما انا عليكم بوكيل"],[10,"يونس","Yunus",109,"واتبع ما يوحي اليك واصبر حتي يحكم الله وهو خير الحاكمين"],[11,"هود","Hud",1,"الر كتاب احكمت ءاياته ثم فصلت من لدن حكيم خبير"],[11,"هود","Hud",2,"الا تعبدوا الا الله انني لكم منه نذير وبشير"],[11,"هود","Hud",3,"وان استغفروا ربكم ثم توبوا اليه يمتعكم متاعا حسنا الي اجل مسمي ويؤت كل ذي فضل فضله وان تولوا فاني اخاف عليكم عذاب يوم كبير"],[11,"هود","Hud",4,"الي الله مرجعكم وهو علي كل شيء قدير"],[11,"هود","Hud",5,"الا انهم يثنون صدورهم ليستخفوا منه الا حين يستغشون ثيابهم يعلم ما يسرون وما يعلنون انه عليم بذات الصدور"],[11,"هود","Hud",6,"۞وما من دابة في الارض الا علي الله رزقها ويعلم مستقرها ومستودعها كل في كتاب مبين"],[11,"هود","Hud",7,"وهو الذي خلق السماوات والارض في ستة ايام وكان عرشه علي الماء ليبلوكم ايكم احسن عملا ولئن قلت انكم مبعوثون من بعد الموت ليقولن الذين كفروا ان هاذا الا سحر مبين"],[11,"هود","Hud",8,"ولئن اخرنا عنهم العذاب الي امة معدودة ليقولن ما يحبسه الا يوم ياتيهم ليس مصروفا عنهم وحاق بهم ما كانوا به يستهزءون"],[11,"هود","H  عبادنا المخلصين"],[12,"يوسف","Yusuf",25,"واستبقا الباب وقدت قميصه من دبر والفيا سيدها لدا الباب قالت ما جزاء من اراد باهلك سوءا الا ان يسجن او عذاب اليم"],[12,"يوسف","Yusuf",26,"قال هي راودتني عن نفسي وشهد شاهد من اهلها ان كان قميصه قد من قبل فصدقت وهو من الكاذبين"],[12,"يوسف","Yusuf",27,"وان كان قميصه قد من دبر فكذبت وهو من الصادقين"],[12,"يوسف","Yusuf",28,"فلما رءا قميصه قد من دبر قال انه من كيدكن ان كيدكن عظيم"],[12,"يوسف","Yusuf",29,"يوسف اعرض عن هاذا واستغفري لذنبك انك كنت من الخاطين"],[12,"يوسف","Yusuf",30,"۞وقال نسوة في المدينة امرات العزيز تراود فتيها عن نفسه قد شغفها حبا انا لنريها في ضلال مبين"],[12,"يوسف","Yusuf",31,"فلما سمعت بمكرهن ارسلت اليهن واعتدت لهن متكا وءاتت كل واحدة منهن سكينا وقالت اخرج عليهن فلما راينه اكبرنه وقطعن ايديهن وقلن حاش لله ما هاذا بشرا ان هاذا الا ملك كريم"],[12,"يوسف","Yusuf",32,"قالت فذالكن الذي لمتنني فيه ولقد راودته عن نفسه فاستعصم ولئن لم يفعل ما ءامره ليسجنن وليكونا من الصاغرين"],[12,"يوسف","Yusuf",33,"قال رب السجن احب الي مما يدعونني اليه والا تصرف عني كيدهن اصب اليهن واكن من الجاهلين"],[12,"يوسف","Yusuf",34,"فاستجاب له ربه فصرف عنه كيدهن انه هو السميع العليم"],[12,"يوسف","Yusuf",35,"ثم بدا لهم من بعد ما راوا الايات ليسجننه حتي حين"],[12,"يوسف","Yusuf",36,"ودخل معه السجن فتيان قال احدهما اني اريني اعصر خمرا وقال الاخر اني اريني احمل فوق راسي خبزا تاكل الطير منه نبئنا بتاويله انا نريك من المحسنين"],[12,"يوسف","Yusuf",37,"قال لا ياتيكما طعام ترزقانه الا نباتكما بتاويله قبل ان ياتيكما ذالكما مما علمني ربي اني تركت ملة قوم لا يؤمنون بالله وهم بالاخرة هم كافرون"],[12,"يوسف","Yusuf",38,"واتبعت ملة ءاباءي ابراهيم واسحاق ويعقوب ما كان لنا ان نشرك بالله من شيء ذالك من فضل الله علينا وعلي الناس ولاكن اكثر الناس لا يشكرون"],[12,"يوسف","Yusuf",39,"ياصاحبي السجن ءارباب متفرقون خير ام الله الواحد القهار"],[12,"يوسف","Yusuf",40,"ما تعبدون من دونه الا اسماء سميتموها انتم وءاباؤكم ما انزل الله بها من سلطان ان الحكم الا لله امر الا تعبدوا الا اياه ذالك الدين القيم ولاكن اكثر الناس لا يعلمون"],[12,"يوسف","Yusuf",41,"ياصاحبي السجن اما احدكما فيسقي ربه خمرا واما الاخر فيصلب فتاكل الطير من راسه قضي الامر الذي فيه تستفتيان"],[12,"يوسف","Yusuf",42,"وقال للذي ظن انه ناج منهما اذكرني عند ربك فانسيه الشيطان ذكر ربه فلبث في السجن بضع سنين"],[12,"يوسف","Yusuf",43,"وقال الملك اني اري سبع بقرات سمان ياكلهن سبع عجاف وسبع سنبلات خضر واخر يابسات ياايها الملا افتوني في رءياي ان كنتم للرءيا تعبرون"],[12,"يوسف","Yusuf",44,"قالوا اضغاث احلام وما نحن بتاويل الاحلام بعالمين"],[12,"يوسف","Yusuf",45,"وقال الذي نجا منهما وادكر بعد امة انا انبئكم بتاويله فارسلون"],[12,"يوسف","Yusuf",46,"يوسف ايها الصديق افتنا في سبع بقرات سمان ياكلهن سبع عجاف وسبع سنبلات خضر واخر يابسات لعلي ارجع الي الناس لعلهم يعلمون"],[12,"يوسف","Yusuf",47,"قال تزرعون سبع سنين دابا فما حصدتم فذروه في سنبله الا قليلا مما تاكلون"],[12,"يوسف","Yusuf",48,"ثم ياتي من بعد ذالك سبع شداد ياكلن ما قدمتم لهن الا قليلا مما تحصنون"],[12,"يوسف","Yusuf",49,"ثم ياتي من بعد ذالك عام فيه يغاث الناس وفيه يعصرون"],[12,"يوسف","Yusuf",50,"وقال الملك ائتوني به فلما جاءه الرسول قال ارجع الي ربك فسله ما بال النسوة الاتي قطعن ايديهن ان ربي بكيدهن عليم"],[12,"يوسف","Yusuf",51,"قال ما خطبكن اذ راودتن يوسف عن نفسه قلن حاش لله ما علمنا عليه من سوء قالت امرات العزيز الان حصحص الحق انا راودته عن نفسه وانه لمن الصادقين"],[12,"يوسف","Yusuf",52,"ذالك ليعلم اني لم اخنه بالغيب وان الله لا يهدي كيد الخائنين"],[12,"يوسف","Yusuf",53,"۞وما ابرئ نفسي ان النفس لامارة بالسوء الا ما رحم ربي ان ربي غفور رحيم"],[12,"يوسف","Yusuf",54,"وقال الملك ائتوني به استخلصه لنفسي فلما كلمه قال انك اليوم لدينا مكين امين"],[12,"يوسف","Yusuf",55,"قال اجعلني علي خزائن الارض اني حفيظ عليم"],[12,"يوسف","Yusuf",56,"وكذالك مكنا ليوسف في الارض يتبوا منها حيث يشاء نصيب برحمتنا من نشاء ولا نضيع اجر المحسنين"],[12,"يوسف","Yusuf",57,"ولاجر الاخرة خير للذين ءامنوا وكانوا يتقون"],[12,"يوسف","Yusuf",58,"وجاء اخوة يوسف فدخلوا عليه فعرفهم وهم له منكرون"],[12,"يوسف","Yusuf",59,"ولما جهزهم بجهازهم قال ائتوني باخ لكم من ابيكم الا ترون اني اوفي الكيل وانا خير المنزلين"],[12,"يوسف","Yusuf",60,"فان لم تاتوني به فلا كيل لكم عندي ولا تقربون"],[12,"يوسف","Yusuf",61,"قالوا سنراود عنه اباه وانا لفاعلون"],[12,"يوسف","Yusuf",62,"وقال لفتيانه اجعلوا بضاعتهم في رحالهم لعلهم يعرفونها اذا انقلبوا الي اهلهم لعلهم يرجعون"],[12,"يوسف","Yusuf",63,"فلما رجعوا الي ابيهم قالوا ياابانا منع منا الكيل فارسل معنا اخانا نكتل وانا له لحافظون"],[12,"يوسف","Yusuf",64,"قال هل ءامنكم عليه الا كما امنتكم علي اخيه من قبل فالله خير حافظا وهو ارحم الراحمين"],[12,"يوسف","Yusuf",65,"ولما فتحوا متاعهم وجدوا بضاعتهم ردت اليهم قالوا ياابانا ما نبغي هاذه بضاعتنا ردت الينا ونمير اهلنا ونحفظ اخانا ونزداد كيل بعير ذالك كيل يسير"],[12,"يوسف","Yusuf",66,"قال لن ارسله معكم حتي تؤتون موثقا من الله لتاتنني به الا ان يحاط بكم فلما ءاتوه موثقهم قال الله علي ما نقول وكيل"],[12,"يوسف","Yusuf",67,"وقال يابني لا تدخلوا من باب واحد وادخلوا من ابواب متفرقة وما اغني عنكم من الله من شيء ان الحكم الا لله عليه توكلت وعليه فليتوكل المتوكلون"],[12,"يوسف","Yusuf",68,"ولما دخلوا من حيث امرهم ابوهم ما كان يغني عنهم من الله من شيء الا حاجة في نفس يعقوب قضيها وانه لذو علم لما علمناه ولاكن اكثر الناس لا يعلمون"],[12,"يوسف","Yusuf",69,"ولما دخلوا علي يوسف ءاوي اليه اخاه قال اني انا اخوك فلا تبتئس بما كانوا يعملون"],[12,"يوسف","Yusuf",70,"فلما جهزهم بجهازهم جعل السقاية في رحل اخيه ثم اذن مؤذن ايتها العير انكم لسارقون"],[12,"يوسف","Yusuf",71,"قالوا واقبلوا عليهم ماذا تفقدون"],[12,"يوسف","Yusuf",72,"قالوا نفقد صواع الملك ولمن جاء به حمل بعير وانا به زعيم"],[12,"يوسف","Yusuf",73,"قالوا تالله لقد علمتم ما جئنا لنفسد في الارض وما كنا سارقين"],[12,"يوسف","Yusuf",74,"قالوا فما جزاؤه ان كنتم كاذبين"],[12,"يوسف","Yusuf",75,"قالوا جزاؤه من وجد في رحله فهو جزاؤه كذالك نجزي الظالمين"],[12,"يوسف","Yusuf",76,"فبدا باوعيتهم قبل وعاء اخيه ثم استخرجها من وعاء اخيه كذالك كدنا ليوسف ما كان لياخذ اخاه في دين الملك الا ان يشاء الله نرفع درجات من نشاء وفوق كل ذي علم عليم"],[12,"يوسف","Yusuf",77,"۞قالوا ان يسرق فقد سرق اخ له من قبل فاسرها يوسف في نفسه ولم يبدها لهم قال انتم شر مكانا والله اعلم بما تصفون"],[12,"يوسف","Yusuf",78,"قالوا ياايها العزيز ان له ابا شيخا كبيرا فخذ احدنا مكانه انا  الرحيم"],[12,"يوسف","Yusuf",99,"فلما دخلوا علي يوسف ءاوي اليه ابويه وقال ادخلوا مصر ان شاء الله ءامنين"],[12,"يوسف","Yusuf",100,"ورفع ابويه علي العرش وخروا له سجدا وقال ياابت هاذا تاويل رءياي من قبل قد جعلها ربي حقا وقد احسن بي اذ اخرجني من السجن وجاء بكم من البدو من بعد ان نزغ الشيطان بيني وبين اخوتي ان ربي لطيف لما يشاء انه هو العليم الحكيم"],[12,"يوسف","Yusuf",101,"۞رب قد ءاتيتني من الملك وعلمتني من تاويل الاحاديث فاطر السماوات والارض انت ولي في الدنيا والاخرة توفني مسلما والحقني بالصالحين"],[12,"يوسف","Yusuf",102,"ذالك من انباء الغيب نوحيه اليك وما كنت لديهم اذ اجمعوا امرهم وهم يمكرون"],[12,"يوسف","Yusuf",103,"وما اكثر الناس ولو حرصت بمؤمنين"],[12,"يوسف","Yusuf",104,"وما تسلهم عليه من اجر ان هو الا ذكر للعالمين"],[12,"يوسف","Yusuf",105,"وكاين من ءاية في السماوات والارض يمرون عليها وهم عنها معرضون"],[12,"يوسف","Yusuf",106,"وما يؤمن اكثرهم بالله الا وهم مشركون"],[12,"يوسف","Yusuf",107,"افامنوا ان تاتيهم غاشية من عذاب الله او تاتيهم الساعة بغتة وهم لا يشعرون"],[12,"يوسف","Yusuf",108,"قل هاذه سبيلي ادعوا الي الله علي بصيرة انا ومن اتبعني وسبحان الله وما انا من المشركين"],[12,"يوسف","Yusuf",109,"وما ارسلنا من قبلك الا رجالا نوحي اليهم من اهل القري افلم يسيروا في الارض فينظروا كيف كان عاقبة الذين من قبلهم ولدار الاخرة خير للذين اتقوا افلا تعقلون"],[12,"يوسف","Yusuf",110,"حتي اذا استيس الرسل وظنوا انهم قد كذبوا جاءهم نصرنا فنجي من نشاء ولا يرد باسنا عن القوم المجرمين"],[12,"يوسف","Yusuf",111,"لقد كان في قصصهم عبرة لاولي الالباب ما كان حديثا يفتري ولاكن تصديق الذي بين يديه وتفصيل كل شيء وهدي ورحمة لقوم يؤمنون"],[13,"الرعد","Ar-Ra'd",1,"المر تلك ءايات الكتاب والذي انزل اليك من ربك الحق ولاكن اكثر الناس لا يؤمنون"],[13,"الرعد","Ar-Ra'd",2,"الله الذي رفع السماوات بغير عمد ترونها ثم استوي علي العرش وسخر الشمس والقمر كل يجري لاجل مسمي يدبر الامر يفصل الايات لعلكم بلقاء ربكم توقنون"],[13,"الرعد","Ar-Ra'd",3,"وهو الذي مد الارض وجعل فيها رواسي وانهارا ومن كل الثمرات جعل فيها زوجين اثنين يغشي اليل النهار ان في ذالك لايات لقوم يتفكرون"],[13,"الرعد","Ar-Ra'd",4,"وفي الارض قطع متج ab",26,"وانزل الذين ظاهروهم من اهل الكتاب من صياصيهم وقذف في قلوبهم الرعب فريقا تقتلون وتاسرون فريقا"],[33,"الأحزاب","Al-Ahzab",27,"واورثكم ارضهم وديارهم واموالهم وارضا لم تطوها وكان الله علي كل شيء قديرا"],[33,"الأحزاب","Al-Ahzab",28,"ياايها النبي قل لازواجك ان كنتن تردن الحيواة الدنيا وزينتها فتعالين امتعكن واسرحكن سراحا جميلا"],[33,"الأحزاب","Al-Ahzab",29,"وان كنتن تردن الله ورسوله والدار الاخرة فان الله اعد للمحسنات منكن اجرا عظيما"],[33,"الأحزاب","Al-Ahzab",30,"يانساء النبي من يات منكن بفاحشة مبينة يضاعف لها العذاب ضعفين وكان ذالك علي الله يسيرا"],[33,"الأحزاب","Al-Ahzab",31,"۞ومن يقنت منكن لله ورسوله وتعمل صالحا نؤتها اجرها مرتين واعتدنا لها رزقا كريما"],[33,"الأحزاب","Al-Ahzab",32,"يانساء النبي لستن كاحد من النساء ان اتقيتن فلا تخضعن بالقول فيطمع الذي في قلبه مرض وقلن قولا معروفا"],[33,"الأحزاب","Al-Ahzab",33,"وقرن في بيوتكن ولا تبرجن تبرج الجاهلية الاولي واقمن الصلواة وءاتين الزكواة واطعن الله ورسوله انما يريد الله ليذهب عنكم الرجس اهل البيت ويطهركم تطهيرا"],[33,"الأحزاب","Al-Ahzab",34,"واذكرن ما يتلي في بيوتكن من ءايات الله والحكمة ان الله كان لطيفا خبيرا"],[33,"الأحزاب","Al-Ahzab",35,"ان المسلمين والمسلمات والمؤمنين والمؤمنات والقانتين والقانتات والصادقين والصادقات والصابرين والصابرات والخاشعين والخاشعات والمتصدقين والمتصدقات والصائمين والصائمات والحافظين فروجهم والحافظات والذاكرين الله كثيرا والذاكرات اعد الله لهم مغفرة واجرا عظيما"],[33,"الأحزاب","Al-Ahzab",36,"وما كان لمؤمن ولا مؤمنة اذا قضي الله ورسوله امرا ان يكون لهم الخيرة من امرهم ومن يعص الله ورسوله فقد ضل ضلالا مبينا"],[33,"الأحزاب","Al-Ahzab",37,"واذ تقول للذي انعم الله عليه وانعمت عليه امسك عليك زوجك واتق الله وتخفي في نفسك ما الله مبديه وتخشي الناس والله احق ان تخشيه فلما قضي زيد منها وطرا زوجناكها لكي لا يكون علي المؤمنين حرج في ازواج ادعيائهم اذا قضوا منهن وطرا وكان امر الله مفعولا"],[33,"الأحزاب","Al-Ahzab",38,"ما كان علي النبي من حرج فيما فرض الله له سنة الله في الذين خلوا من قبل وكان امر الله قدرا مقدورا"],[33,"الأحزاب","Al-Ahzab",39,"الذين يبلغون رسالات الله ويخشونه ولا يخشون احدا الا ال  لهم ولهم اجر كريم"],[57,"الحديد","Al-Hadid",19,"والذين ءامنوا بالله ورسله اولائك هم الصديقون والشهداء عند ربهم لهم اجرهم ونورهم والذين كفروا وكذبوا باياتنا اولائك اصحاب الجحيم"],[57,"الحديد","Al-Hadid",20,"اعلموا انما الحيواة الدنيا لعب ولهو وزينة وتفاخر بينكم وتكاثر في الاموال والاولاد كمثل غيث اعجب الكفار نباته ثم يهيج فتريه مصفرا ثم يكون حطاما وفي الاخرة عذاب شديد ومغفرة من الله ورضوان وما الحيواة الدنيا الا متاع الغرور"],[57,"الحديد","Al-Hadid",21,"سابقوا الي مغفرة من ربكم وجنة عرضها كعرض السماء والارض اعدت للذين ءامنوا بالله ورسله ذالك فضل الله يؤتيه من يشاء والله ذو الفضل العظيم"],[57,"الحديد","Al-Hadid",22,"ما اصاب من مصيبة في الارض ولا في انفسكم الا في كتاب من قبل ان نبراها ان ذالك علي الله يسير"],[57,"الحديد","Al-Hadid",23,"لكيلا تاسوا علي ما فاتكم ولا تفرحوا بما ءاتيكم والله لا يحب كل مختال فخور"],[57,"الحديد","Al-Hadid",24,"الذين يبخلون ويامرون الناس بالبخل ومن يتول فان الله هو الغني الحميد"],[57,"الحديد","Al-Hadid",25,"لقد ارسلنا رسلنا بالبينات وانزلنا معهم الكتاب والميزان ليقوم الناس بالقسط وانزلنا الحديد فيه باس شديد ومنافع للناس وليعلم الله من ينصره ورسله بالغيب ان الله قوي عزيز"],[57,"الحديد","Al-Hadid",26,"ولقد ارسلنا نوحا وابراهيم وجعلنا في ذريتهما النبوة والكتاب فمنهم مهتد وكثير منهم فاسقون"],[57,"الحديد","Al-Hadid",27,"ثم قفينا علي ءاثارهم برسلنا وقفينا بعيسي ابن مريم وءاتيناه الانجيل وجعلنا في قلوب الذين اتبعوه رافة ورحمة ورهبانية ابتدعوها ما كتبناها عليهم الا ابتغاء رضوان الله فما رعوها حق رعايتها فاتينا الذين ءامنوا منهم اجرهم وكثير منهم فاسقون"],[57,"الحديد","Al-Hadid",28,"ياايها الذين ءامنوا اتقوا الله وءامنوا برسوله يؤتكم كفلين من رحمته ويجعل لكم نورا تمشون به ويغفر لكم والله غفور رحيم"],[57,"الحديد","Al-Hadid",29,"لئلا يعلم اهل الكتاب الا يقدرون علي شيء من فضل الله وان الفضل بيد الله يؤتيه من يشاء والله ذو الفضل العظيم"],[58,"المجادلة","Al-Mujadila",1,"قد سمع الله قول التي تجادلك في زوجها وتشتكي الي الله والله يسمع تحاوركما ان الله سميع بصير"],[58,"المجادلة","Al-Mujadila",2,"الذين يظاهرون منكم من نسائهم ما هن امهاتهم ان امهاتهم الا الاي و var SURAH_MAP={}, SURAHS=[];
QURAN.forEach(function(r){
  var sn=r[0],sa=r[1],se=r[2],an=r[3],text=r[4];
  if(!SURAH_MAP[sn]){SURAH_MAP[sn]={sa:sa,se:se,ayahs:[]};SURAHS.push({sn:sn,sa:sa,se:se});}
  SURAH_MAP[sn].ayahs.push({an:an,text:text});
});

var sel=document.getElementById("surah-sel");
SURAHS.forEach(function(s){
  var o=document.createElement("option");o.value=s.sn;
  o.textContent=s.sn+". "+s.sa+" — "+s.se;sel.appendChild(o);
});

// Equivalents — loaded from localStorage, persisted on every change
var EQUIVS = [];
function loadEquivs(){
  try{ EQUIVS=JSON.parse(localStorage.getItem("hifz_equivs")||"[]"); }catch(e){EQUIVS=[];}
  renderEquivTags();
}
function saveEquivs(){ localStorage.setItem("hifz_equivs", JSON.stringify(EQUIVS)); }

function isMatch(inp, ref){
  if(inp===ref) return true;
  for(var i=0;i<EQUIVS.length;i++){
    var p=EQUIVS[i];
    if((p[0]===inp&&p[1]===ref)||(p[1]===inp&&p[0]===ref)) return true;
  }
  return false;
}

function normInput(t){
  if(!t) return "";
  return t
    .replace(/[\u064B-\u065F\u0670\u06D6-\u06DC\u06DF-\u06E8\u06EA-\u06ED]/g,"")
    .replace(/\u0640/g,"")
    .replace(/[\u0623\u0625\u0622\u0671]/g,"\u0627")
    .replace(/\u0649\u0670/g,"\u064A")
    .replace(/\u06CC|\u0649/g,"\u064A")
    .replace(/\u06A9/g,"\u0643")
    .replace(/[\u06C1\u06BE]/g,"\u0647")
    .replace(/\u06C3/g,"\u0629")
    .replace(/\s+/g," ").trim();
}

function addEquiv(){
  var a=normInput(document.getElementById("eq-a").value.trim());
  var b=normInput(document.getElementById("eq-b").value.trim());
  if(!a||!b||a===b) return;
  for(var i=0;i<EQUIVS.length;i++){
    var p=EQUIVS[i];
    if((p[0]===a&&p[1]===b)||(p[1]===a&&p[0]===b)) return;
  }
  EQUIVS.push([a,b]);
  saveEquivs(); renderEquivTags();
  document.getElementById("eq-a").value="";
  document.getElementById("eq-b").value="";
  document.getElementById("eq-a").focus();
}

function removeEquiv(i){
  EQUIVS.splice(i,1); saveEquivs(); renderEquivTags();
}

function renderEquivTags(){
  var cnt=document.getElementById('equiv-count');
  if(cnt) cnt.textContent=EQUIVS.length?'('+EQUIVS.length+')':'';

  var list=document.getElementById("equiv-list");
  if(!EQUIVS.length){list.innerHTML="<span style='font-family:sans-serif;font-size:11px;color:#444'>No equivalents yet</span>";return;}
  list.innerHTML=EQUIVS.map(function(p,i){
    return "<span class='equiv-tag'>"+p[0]+"<span style='font-family:sans-serif;font-size:12px;color:#555;padding:0 3px'>=</span>"+p[1]
           +"<button class='del' onclick='removeEquiv("+i+")'>x</button></span>";
  }).join("");
}

function toggleEquiv(){
  var body=document.getElementById("equiv-body");
  var tog=document.getElementById("equiv-tog");
  var open=body.classList.toggle("open");
  tog.textContent=open?"▲":"▼";
}

var curSurah=null, curAyahIdx=0;
function getCurrentAyah(){return curSurah?SURAH_MAP[curSurah].ayahs[curAyahIdx]:null;}

function onSurahChange(){
  var sn=+sel.value;if(!sn){curSurah=null;return;}
  curSurah=sn;curAyahIdx=0;
  var total=SURAH_MAP[sn].ayahs.length;
  document.getElementById("ayah-num").max=total;
  document.getElementById("ayah-num").value=1;
  document.getElementById("ayah-of").textContent="/ "+total;
  document.getElementById("hint-btn").style.display="inline-block";
  clearAll();document.getElementById("inp").focus();
}

function onAyahChange(){
  if(!curSurah)return;
  var total=SURAH_MAP[curSurah].ayahs.length;
  var v=Math.max(1,Math.min(parseInt(document.getElementById("ayah-num").value)||1,total));
  document.getElementById("ayah-num").value=v;
  curAyahIdx=v-1;clearAll();document.getElementById("inp").focus();
}

function prevAyah(){if(curSurah&&curAyahIdx>0){curAyahIdx--;document.getElementById("ayah-num").value=curAyahIdx+1;clearAll();document.getElementById("inp").focus();}}
function nextAyah(){
  if(!curSurah)return;
  var total=SURAH_MAP[curSurah].ayahs.length;
  if(curAyahIdx<total-1){curAyahIdx++;document.getElementById("ayah-num").value=curAyahIdx+1;clearAll();document.getElementById("inp").focus();}
}

function doCompare(){
  var raw=document.getElementById("inp").value.trim();
  if(!raw)return;
  var ayah=getCurrentAyah();
  if(!ayah){document.getElementById("score-lbl").textContent="Please select a surah first";return;}
  var rw=ayah.text.split(" ");
  var iw=normInput(raw).split(" ");
  var diff=rw.map(function(r,i){
    var inp=iw[i]||"";
    return {r:r,inp:inp,match:isMatch(inp,r),missing:!inp};
  });
  var mc=diff.filter(function(d){return d.match;}).length;
  var total=diff.length;
  var pct=Math.round(mc/total*100);
  document.getElementById("sf").style.width=pct+"%";
  document.getElementById("sf").style.background=pct>80?"#5ec48a":pct>50?"#c8943a":"#e07070";
  document.getElementById("score-lbl").textContent=pct+"% · "+mc+"/"+total+" words correct";
  var s=SURAH_MAP[curSurah];
  document.getElementById("ref-meta").textContent=s.sa+" · "+s.se+" "+curSurah+":"+ayah.an;
  document.getElementById("ref-out").innerHTML=diff.map(function(d){
    var cls=d.missing?"w-missing":d.match?"w-match":"w-wrong";
    return "<span class='"+cls+"'>" + d.r + " </span>";
  }).join("");
  if(pct>=80){
    var panel=document.getElementById("ref-panel");
    panel.classList.add("success-flash");
    setTimeout(function(){panel.classList.remove("success-flash");nextAyah();},800);
  }
}

function showHint(){
  var ayah=getCurrentAyah();if(!ayah)return;
  var words=ayah.text.split(" ");
  var hint=words.slice(0,Math.ceil(words.length*0.3)).join(" ")+" …";
  document.getElementById("ref-out").innerHTML="<span style='color:#555;font-style:italic'>"+hint+"</span>";
  document.getElementById("ref-meta").textContent="hint";
}

function clearInput(){
  document.getElementById("inp").value="";
  document.getElementById("ref-out").innerHTML="<span style='color:#2a2a2a'>—</span>";
  document.getElementById("sf").style.width="0%";
  document.getElementById("score-lbl").textContent="";
  document.getElementById("ref-meta").textContent="";
  document.getElementById("inp").focus();
}
function clearAll(){clearInput();}

document.getElementById("eq-a").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("eq-b").focus();});
document.getElementById("eq-b").addEventListener("keydown",function(e){if(e.key==="Enter")addEquiv();});
document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter"&&(e.ctrlKey||e.metaKey))doCompare();});

loadEquivs();
</script>
