<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Hifz Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Amiri','Traditional Arabic',serif;background:#1a1a1a;color:#e8e0d0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.container{width:100%;max-width:760px;display:flex;flex-direction:column;gap:10px}
.selector-bar{display:flex;align-items:center;gap:8px;direction:ltr;flex-wrap:wrap;padding:4px 0}
.selector-bar select,.selector-bar input[type=number]{font-family:sans-serif;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid #363636;background:#252525;color:#ccc;outline:none}
.selector-bar select{flex:1;min-width:180px;max-width:360px}
.selector-bar select:focus,.selector-bar input[type=number]:focus{border-color:#2a5438}
.selector-bar input[type=number]{width:70px;text-align:center}
.ayah-nav{display:flex;align-items:center;gap:4px}
.nav-btn{font-family:sans-serif;font-size:18px;padding:4px 10px;border-radius:8px;border:1px solid #363636;background:#252525;color:#888;cursor:pointer}
.nav-btn:hover{background:#2f2f2f;color:#ccc}
.ayah-label{font-family:sans-serif;font-size:12px;color:#555;white-space:nowrap}
.panel{border-radius:12px;padding:14px 18px;position:relative;min-height:110px}
.panel-input{background:#252525;border:1px solid #363636}
.panel-ref{background:#1e1e1e;border:1px solid #2d2d2d}
.panel-equiv{background:#1e1e1e;border:1px solid #2d2d2d;min-height:unset;padding:12px 16px}
.panel-label{font-family:sans-serif;font-size:11px;color:#555;position:absolute;top:10px;right:16px}
textarea{width:100%;background:transparent;border:none;outline:none;resize:none;font-size:26px;line-height:1.85;font-family:'Amiri','Traditional Arabic',serif;color:#ddd8cc;direction:rtl;text-align:right;margin-top:24px;height:80px;caret-color:#8ab4f8}
.ref-text{font-size:26px;line-height:1.85;direction:rtl;text-align:right;margin-top:24px;min-height:52px;word-spacing:4px}
.toolbar{display:flex;align-items:center;gap:10px;direction:ltr;flex-wrap:wrap}
button.action{font-family:sans-serif;font-size:13px;font-weight:500;padding:6px 16px;border-radius:8px;border:1px solid #363636;background:#252525;color:#bbb;cursor:pointer;transition:background .15s}
button.action:hover{background:#2f2f2f}
button.primary{background:#162d20;border-color:#2a5438;color:#5ec48a}
button.primary:hover{background:#1b3828}
button.ghost{background:transparent;border-color:transparent;color:#555;padding:4px 8px;font-size:12px}
button.ghost:hover{color:#999;background:transparent}
.meta{font-family:sans-serif;font-size:12px;color:#555;direction:ltr}
.ref-meta{font-family:sans-serif;font-size:11px;color:#454545;position:absolute;bottom:10px;left:16px;direction:ltr}
.score-bar{height:2px;border-radius:2px;background:#2a2a2a;margin-top:8px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .4s,background .4s;width:0%}
.w-match{color:#5ec48a}
.w-wrong{color:#e07070;text-decoration:underline wavy #e07070 1.5px;text-underline-offset:3px}
.w-missing{color:#2e2e2e}
@keyframes flashGreen{0%{border-color:#2a5438}50%{border-color:#5ec48a}100%{border-color:#2d2d2d}}
.success-flash{animation:flashGreen .6s ease}
.equiv-header{display:flex;align-items:center;justify-content:space-between;direction:ltr;cursor:pointer;user-select:none}
.equiv-header span{font-family:sans-serif;font-size:12px;color:#555}
.equiv-header .toggle{font-size:11px;color:#444}
.equiv-body{display:none;margin-top:10px}
.equiv-body.open{display:block}
.equiv-add{display:flex;gap:6px;margin-bottom:10px;direction:ltr}
.equiv-add input{flex:1;font-family:'Amiri','Traditional Arabic',serif;font-size:18px;padding:5px 10px;border-radius:8px;border:1px solid #363636;background:#252525;color:#ccc;outline:none;direction:rtl;text-align:right}
.equiv-add input:focus{border-color:#2a5438}
.equiv-add .sep{font-family:sans-serif;font-size:18px;color:#555;padding:5px 2px;align-self:center}
.equiv-list{display:flex;flex-wrap:wrap;gap:6px}
.equiv-tag{display:flex;align-items:center;gap:5px;background:#252525;border:1px solid #363636;border-radius:6px;padding:3px 8px 3px 6px;font-family:'Amiri','Traditional Arabic',serif;font-size:16px;direction:rtl}
.equiv-tag .del{font-family:sans-serif;font-size:12px;color:#555;cursor:pointer;border:none;background:none;padding:0 2px}
.equiv-tag .del:hover{color:#e07070}
</style>
</head>
<body>
<div class="container">
  <div class="selector-bar">
    <select id="surah-sel" onchange="onSurahChange()"><option value="">— Select Surah —</option></select>
    <div class="ayah-nav">
      <button class="nav-btn" onclick="prevAyah()">&#8249;</button>
      <input type="number" id="ayah-num" min="1" value="1" onchange="onAyahChange()" onkeydown="if(event.key==='Enter')document.getElementById('inp').focus()">
      <span class="ayah-label" id="ayah-of">/ —</span>
      <button class="nav-btn" onclick="nextAyah()">&#8250;</button>
    </div>
  </div>
  <div class="panel panel-input">
    <span class="panel-label">اكتب من حفظك</span>
    <textarea id="inp" dir="rtl" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
    <div class="score-bar"><div class="score-fill" id="sf"></div></div>
  </div>
  <div class="toolbar">
    <button class="action primary" onclick="doCompare()">Compare</button>
    <button class="action" onclick="clearInput()">Clear</button>
    <button class="action" id="hint-btn" onclick="showHint()" style="display:none">Hint</button>
    <span id="score-lbl" class="meta"></span>
  </div>
  <div class="panel panel-ref" id="ref-panel">
    <span class="panel-label">النص الصحيح</span>
    <div class="ref-text" id="ref-out"><span style="color:#2a2a2a">—</span></div>
    <span class="ref-meta" id="ref-meta"></span>
  </div>
  <div class="panel panel-equiv">
    <div class="equiv-header" onclick="toggleEquiv()">
      <span>Equivalent pairs <span id="equiv-count"></span></span>
      <span class="toggle" id="equiv-tog">▼</span>
    </div>
    <div class="equiv-body" id="equiv-body">
      <div class="equiv-add">
        <input id="eq-a" dir="rtl" placeholder="كتب" autocomplete="off" autocorrect="off" spellcheck="false">
        <span class="sep">=</span>
        <input id="eq-b" dir="rtl" placeholder="كتاب" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="action" onclick="addEquiv()" style="white-space:nowrap">Add</button>
      </div>
      <div id="equiv-list" class="equiv-list"></div>
    </div>
  </div>
</div>
<script>
const QURAN=[[1,"الفاتحة","Al-Fatihah",1,"بسم الله الرحمان الرحيم"],[1,"الفاتحة","Al-Fatihah",2,"الحمد لله رب العالمين"],[1,"الفاتحة","Al-Fatihah",3,"الرحمان الرحيم"],[1,"الفاتحة","Al-Fatihah",4,"مالك يوم الدين"],[1,"الفاتحة","Al-Fatihah",5,"اياك نعبد واياك نستعين"],[1,"الفاتحة","Al-Fatihah",6,"اهدنا الصراط المستقيم"],[1,"الفاتحة","Al-Fatihah",7,"صراط الذين انعمت عليهم غير المغضوب عليهم ولا الضالين"],[2,"البقرة","Al-Baqarah",1,"الم"],[2,"البقرة","Al-Baqarah",2,"ذالك الكتاب لا ريب فيه هدي للمتقين"],[2,"البقرة","Al-Baqarah",3,"الذين يؤمنون بالغيب ويقيمون الصلواة ومما رزقناهم ينفقون"],[2,"البقرة","Al-Baqarah",4,"والذين يؤمنون بما انزل اليك وما انزل من قبلك وبالاخرة هم يوقنون"],[2,"البقرة","Al-Baqarah",5,"اولائك علي هدي من ربهم واولائك هم المفلحون"],[2,"البقرة","Al-Baqarah",6,"ان الذين كفروا سواء عليهم ءانذرتهم ام لم تنذرهم لا يؤمنون"],[2,"البقرة","Al-Baqarah",7,"ختم الله علي قلوبهم وعلي سمعهم وعلي ابصارهم غشاوة ولهم عذاب عظيم"],[2,"البقرة","Al-Baqarah",8,"ومن الناس من يقول ءامنا بالله وباليوم الاخر وما هم بمؤمنين"],[2,"البقرة","Al-Baqarah",9,"يخادعون الله والذين ءامنوا وما يخدعون الا انفسهم وما يشعرون"],[2,"البقرة","Al-Baqarah",10,"في قلوبهم مرض فزادهم الله مرضا ولهم عذاب اليم بما كانوا يكذبون"],[2,"البقرة","Al-Baqarah",11,"واذا قيل لهم لا تفسدوا في الارض قالوا انما نحن مصلحون"],[2,"البقرة","Al-Baqarah",12,"الا انهم هم المفسدون ولاكن لا يشعرون"],[2,"البقرة","Al-Baqarah",13,"واذا قيل لهم ءامنوا كما ءامن الناس قالوا انؤمن كما ءامن السفهاء الا انهم هم السفهاء ولاكن لا يعلمون"],[2,"البقرة","Al-Baqarah",14,"واذا لقوا الذين ءامنوا قالوا ءامنا واذا خلوا الي شياطينهم قالوا انا معكم انما نحن مستهزءون"],[2,"البقرة","Al-Baqarah",15,"الله يستهزئ بهم ويمدهم في طغيانهم يعمهون"],[2,"البقرة","Al-Baqarah",16,"اولائك الذين اشتروا الضلالة بالهدي فما ربحت تجارتهم وما كانوا مهتدين"],[2,"البقرة","Al-Baqarah",17,"مثلهم كمثل الذي استوقد نارا فلما اضاءت ما حوله ذهب الله بنورهم وتركهم في ظلمات لا يبصرون"],[2,"البقرة","Al-Baqarah",18,"صم بكم عمي فهم لا يرجعون"],[2,"البقرة","Al-Baqarah",19,"او كصيب من السماء فيه ظلمات ورعد وبرق يجعلون اصابعهم في ءاذانهم من الصواعق حذر الموت والله محيط بالكافرين"],[2,"البقرة","Al-Baqarah",20,"يكاد البرق يخطف ابصارهم كلما اضاء لهم مشوا فيه واذا اظلم عليهم قاموا ولو شاء الله لذهب بسمعهم وابصارهم ان الله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",21,"ياايها الناس اعبدوا ربكم الذي خلقكم والذين من قبلكم لعلكم تتقون"],[2,"البقرة","Al-Baqarah",22,"الذي جعل لكم الارض فراشا والسماء بناء وانزل من السماء ماء فاخرج به من الثمرات رزقا لكم فلا تجعلوا لله اندادا وانتم تعلمون"],[2,"البقرة","Al-Baqarah",23,"وان كنتم في ريب مما نزلنا علي عبدنا فاتوا بسورة من مثله وادعوا شهداءكم من دون الله ان كنتم صادقين"],[2,"البقرة","Al-Baqarah",24,"فان لم تفعلوا ولن تفعلوا فاتقوا النار التي وقودها الناس والحجارة اعدت للكافرين"],[2,"البقرة","Al-Baqarah",25,"وبشر الذين ءامنوا وعملوا الصالحات ان لهم جنات تجري من تحتها الانهار كلما رزقوا منها من ثمرة رزقا قالوا هاذا الذي رزقنا من قبل واتوا به متشابها ولهم فيها ازواج مطهرة وهم فيها خالدون"],[2,"البقرة","Al-Baqarah",26,"۞ان الله لا يستحي ان يضرب مثلا ما بعوضة فما فوقها فاما الذين ءامنوا فيعلمون انه الحق من ربهم واما الذين كفروا فيقولون ماذا اراد الله بهاذا مثلا يضل به كثيرا ويهدي به كثيرا وما يضل به الا الفاسقين"],[2,"البقرة","Al-Baqarah",27,"الذين ينقضون عهد الله من بعد ميثاقه ويقطعون ما امر الله به ان يوصل ويفسدون في الارض اولائك هم الخاسرون"],[2,"البقرة","Al-Baqarah",28,"كيف تكفرون بالله وكنتم امواتا فاحياكم ثم يميتكم ثم يحييكم ثم اليه ترجعون"],[2,"البقرة","Al-Baqarah",29,"هو الذي خلق لكم ما في الارض جميعا ثم استوي الي السماء فسويهن سبع سماوات وهو بكل شيء عليم"],[2,"البقرة","Al-Baqarah",30,"واذ قال ربك للملائكة اني جاعل في الارض خليفة قالوا اتجعل فيها من يفسد فيها ويسفك الدماء ونحن نسبح بحمدك ونقدس لك قال اني اعلم ما لا تعلمون"],[2,"البقرة","Al-Baqarah",31,"وعلم ءادم الاسماء كلها ثم عرضهم علي الملائكة فقال انبوني باسماء هاؤلاء ان كنتم صادقين"],[2,"البقرة","Al-Baqarah",32,"قالوا سبحانك لا علم لنا الا ما علمتنا انك انت العليم الحكيم"],[2,"البقرة","Al-Baqarah",33,"قال ياادم انبئهم باسمائهم فلما انباهم باسمائهم قال الم اقل لكم اني اعلم غيب السماوات والارض واعلم ما تبدون وما كنتم تكتمون"],[2,"البقرة","Al-Baqarah",34,"واذ قلنا للملائكة اسجدوا لادم فسجدوا الا ابليس ابي واستكبر وكان من الكافرين"],[2,"البقرة","Al-Baqarah",35,"وقلنا ياادم اسكن انت وزوجك الجنة وكلا منها رغدا حيث شئتما ولا تقربا هاذه الشجرة فتكونا من الظالمين"],[2,"البقرة","Al-Baqarah",36,"فازلهما الشيطان عنها فاخرجهما مما كانا فيه وقلنا اهبطوا بعضكم لبعض عدو ولكم في الارض مستقر ومتاع الي حين"],[2,"البقرة","Al-Baqarah",37,"فتلقي ءادم من ربه كلمات فتاب عليه انه هو التواب الرحيم"],[2,"البقرة","Al-Baqarah",38,"قلنا اهبطوا منها جميعا فاما ياتينكم مني هدي فمن تبع هداي فلا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",39,"والذين كفروا وكذبوا باياتنا اولائك اصحاب النار هم فيها خالدون"],[2,"البقرة","Al-Baqarah",40,"يابني اسراءيل اذكروا نعمتي التي انعمت عليكم واوفوا بعهدي اوف بعهدكم واياي فارهبون"],[2,"البقرة","Al-Baqarah",41,"وءامنوا بما انزلت مصدقا لما معكم ولا تكونوا اول كافر به ولا تشتروا باياتي ثمنا قليلا واياي فاتقون"],[2,"البقرة","Al-Baqarah",42,"ولا تلبسوا الحق بالباطل وتكتموا الحق وانتم تعلمون"],[2,"البقرة","Al-Baqarah",43,"واقيموا الصلواة وءاتوا الزكواة واركعوا مع الراكعين"],[2,"البقرة","Al-Baqarah",44,"۞اتامرون الناس بالبر وتنسون انفسكم وانتم تتلون الكتاب افلا تعقلون"],[2,"البقرة","Al-Baqarah",45,"واستعينوا بالصبر والصلواة وانها لكبيرة الا علي الخاشعين"],[2,"البقرة","Al-Baqarah",46,"الذين يظنون انهم ملاقوا ربهم وانهم اليه راجعون"],[2,"البقرة","Al-Baqarah",47,"يابني اسراءيل اذكروا نعمتي التي انعمت عليكم واني فضلتكم علي العالمين"],[2,"البقرة","Al-Baqarah",48,"واتقوا يوما لا تجزي نفس عن نفس شيا ولا يقبل منها شفاعة ولا يؤخذ منها عدل ولا هم ينصرون"],[2,"البقرة","Al-Baqarah",49,"واذ نجيناكم من ءال فرعون يسومونكم سوء العذاب يذبحون ابناءكم ويستحيون نساءكم وفي ذالكم بلاء من ربكم عظيم"],[2,"البقرة","Al-Baqarah",50,"واذ فرقنا بكم البحر فانجيناكم واغرقنا ءال فرعون وانتم تنظرون"],[2,"البقرة","Al-Baqarah",51,"واذ واعدنا موسي اربعين ليلة ثم اتخذتم العجل من بعده وانتم ظالمون"],[2,"البقرة","Al-Baqarah",52,"ثم عفونا عنكم من بعد ذالك لعلكم تشكرون"],[2,"البقرة","Al-Baqarah",53,"واذ ءاتينا موسي الكتاب والفرقان لعلكم تهتدون"],[2,"البقرة","Al-Baqarah",54,"واذ قال موسي لقومه ياقوم انكم ظلمتم انفسكم باتخاذكم العجل فتوبوا الي بارئكم فاقتلوا انفسكم ذالكم خير لكم عند بارئكم فتاب عليكم انه هو التواب الرحيم"],[2,"البقرة","Al-Baqarah",55,"واذ قلتم ياموسي لن نؤمن لك حتي نري الله جهرة فاخذتكم الصاعقة وانتم تنظرون"],[2,"البقرة","Al-Baqarah",56,"ثم بعثناكم من بعد موتكم لعلكم تشكرون"],[2,"البقرة","Al-Baqarah",57,"وظللنا عليكم الغمام وانزلنا عليكم المن والسلوي كلوا من طيبات ما رزقناكم وما ظلمونا ولاكن كانوا انفسهم يظلمون"],[2,"البقرة","Al-Baqarah",58,"واذ قلنا ادخلوا هاذه القرية فكلوا منها حيث شئتم رغدا وادخلوا الباب سجدا وقولوا حطة نغفر لكم خطاياكم وسنزيد المحسنين"],[2,"البقرة","Al-Baqarah",59,"فبدل الذين ظلموا قولا غير الذي قيل لهم فانزلنا علي الذين ظلموا رجزا من السماء بما كانوا يفسقون"],[2,"البقرة","Al-Baqarah",60,"۞واذ استسقي موسي لقومه فقلنا اضرب بعصاك الحجر فانفجرت منه اثنتا عشرة عينا قد علم كل اناس مشربهم كلوا واشربوا من رزق الله ولا تعثوا في الارض مفسدين"],[2,"البقرة","Al-Baqarah",61,"واذ قلتم ياموسي لن نصبر علي طعام واحد فادع لنا ربك يخرج لنا مما تنبت الارض من بقلها وقثائها وفومها وعدسها وبصلها قال اتستبدلون الذي هو ادني بالذي هو خير اهبطوا مصرا فان لكم ما سالتم وضربت عليهم الذلة والمسكنة وباءو بغضب من الله ذالك بانهم كانوا يكفرون بايات الله ويقتلون النبين بغير الحق ذالك بما عصوا وكانوا يعتدون"],[2,"البقرة","Al-Baqarah",62,"ان الذين ءامنوا والذين هادوا والنصاري والصابين من ءامن بالله واليوم الاخر وعمل صالحا فلهم اجرهم عند ربهم ولا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",63,"واذ اخذنا ميثاقكم ورفعنا فوقكم الطور خذوا ما ءاتيناكم بقوة واذكروا ما فيه لعلكم تتقون"],[2,"البقرة","Al-Baqarah",64,"ثم توليتم من بعد ذالك فلولا فضل الله عليكم ورحمته لكنتم من الخاسرين"],[2,"البقرة","Al-Baqarah",65,"ولقد علمتم الذين اعتدوا منكم في السبت فقلنا لهم كونوا قردة خاسين"],[2,"البقرة","Al-Baqarah",66,"فجعلناها نكالا لما بين يديها وما خلفها وموعظة للمتقين"],[2,"البقرة","Al-Baqarah",67,"واذ قال موسي لقومه ان الله يامركم ان تذبحوا بقرة قالوا اتتخذنا هزوا قال اعوذ بالله ان اكون من الجاهلين"],[2,"البقرة","Al-Baqarah",68,"قالوا ادع لنا ربك يبين لنا ما هي قال انه يقول انها بقرة لا فارض ولا بكر عوان بين ذالك فافعلوا ما تؤمرون"],[2,"البقرة","Al-Baqarah",69,"قالوا ادع لنا ربك يبين لنا ما لونها قال انه يقول انها بقرة صفراء فاقع لونها تسر الناظرين"],[2,"البقرة","Al-Baqarah",70,"قالوا ادع لنا ربك يبين لنا ما هي ان البقر تشابه علينا وانا ان شاء الله لمهتدون"],[2,"البقرة","Al-Baqarah",71,"قال انه يقول انها بقرة لا ذلول تثير الارض ولا تسقي الحرث مسلمة لا شية فيها قالوا الان جئت بالحق فذبحوها وما كادوا يفعلون"],[2,"البقرة","Al-Baqarah",72,"واذ قتلتم نفسا فادار اتم فيها والله مخرج ما كنتم تكتمون"],[2,"البقرة","Al-Baqarah",73,"فقلنا اضربوه ببعضها كذالك يحي الله الموتي ويريكم ءاياته لعلكم تعقلون"],[2,"البقرة","Al-Baqarah",74,"ثم قست قلوبكم من بعد ذالك فهي كالحجارة او اشد قسوة وان من الحجارة لما يتفجر منه الانهار وان منها لما يشقق فيخرج منه الماء وان منها لما يهبط من خشية الله وما الله بغافل عما تعملون"],[2,"البقرة","Al-Baqarah",75,"۞افتطمعون ان يؤمنوا لكم وقد كان فريق منهم يسمعون كلام الله ثم يحرفونه من بعد ما عقلوه وهم يعلمون"],[2,"البقرة","Al-Baqarah",76,"واذا لقوا الذين ءامنوا قالوا ءامنا واذا خلا بعضهم الي بعض قالوا اتحدثونهم بما فتح الله عليكم ليحاجوكم به عند ربكم افلا تعقلون"],[2,"البقرة","Al-Baqarah",77,"اولا يعلمون ان الله يعلم ما يسرون وما يعلنون"],[2,"البقرة","Al-Baqarah",78,"ومنهم اميون لا يعلمون الكتاب الا اماني وان هم الا يظنون"],[2,"البقرة","Al-Baqarah",79,"فويل للذين يكتبون الكتاب بايديهم ثم يقولون هاذا من عند الله ليشتروا به ثمنا قليلا فويل لهم مما كتبت ايديهم وويل لهم مما يكسبون"],[2,"البقرة","Al-Baqarah",80,"وقالوا لن تمسنا النار الا اياما معدودة قل اتخذتم عند الله عهدا فلن يخلف الله عهده ام تقولون علي الله ما لا تعلمون"],[2,"البقرة","Al-Baqarah",81,"بلي من كسب سيئة واحاطت به خطيته فاولائك اصحاب النار هم فيها خالدون"],[2,"البقرة","Al-Baqarah",82,"والذين ءامنوا وعملوا الصالحات اولائك اصحاب الجنة هم فيها خالدون"],[2,"البقرة","Al-Baqarah",83,"واذ اخذنا ميثاق بني اسراءيل لا تعبدون الا الله وبالوالدين احسانا وذي القربي واليتامي والمساكين وقولوا للناس حسنا واقيموا الصلواة وءاتوا الزكواة ثم توليتم الا قليلا منكم وانتم معرضون"],[2,"البقرة","Al-Baqarah",84,"واذ اخذنا ميثاقكم لا تسفكون دماءكم ولا تخرجون انفسكم من دياركم ثم اقررتم وانتم تشهدون"],[2,"البقرة","Al-Baqarah",85,"ثم انتم هاؤلاء تقتلون انفسكم وتخرجون فريقا منكم من ديارهم تظاهرون عليهم بالاثم والعدوان وان ياتوكم اساري تفادوهم وهو محرم عليكم اخراجهم افتؤمنون ببعض الكتاب وتكفرون ببعض فما جزاء من يفعل ذالك منكم الا خزي في الحيواة الدنيا ويوم القيامة يردون الي اشد العذاب وما الله بغافل عما تعملون"],[2,"البقرة","Al-Baqarah",86,"اولائك الذين اشتروا الحيواة الدنيا بالاخرة فلا يخفف عنهم العذاب ولا هم ينصرون"],[2,"البقرة","Al-Baqarah",87,"ولقد ءاتينا موسي الكتاب وقفينا من بعده بالرسل وءاتينا عيسي ابن مريم البينات وايدناه بروح القدس افكلما جاءكم رسول بما لا تهوي انفسكم استكبرتم ففريقا كذبتم وفريقا تقتلون"],[2,"البقرة","Al-Baqarah",88,"وقالوا قلوبنا غلف بل لعنهم الله بكفرهم فقليلا ما يؤمنون"],[2,"البقرة","Al-Baqarah",89,"ولما جاءهم كتاب من عند الله مصدق لما معهم وكانوا من قبل يستفتحون علي الذين كفروا فلما جاءهم ما عرفوا كفروا به فلعنة الله علي الكافرين"],[2,"البقرة","Al-Baqarah",90,"بئسما اشتروا به انفسهم ان يكفروا بما انزل الله بغيا ان ينزل الله من فضله علي من يشاء من عباده فباءو بغضب علي غضب وللكافرين عذاب مهين"],[2,"البقرة","Al-Baqarah",91,"واذا قيل لهم ءامنوا بما انزل الله قالوا نؤمن بما انزل علينا ويكفرون بما وراءه وهو الحق مصدقا لما معهم قل فلم تقتلون انبياء الله من قبل ان كنتم مؤمنين"],[2,"البقرة","Al-Baqarah",92,"۞ولقد جاءكم موسي بالبينات ثم اتخذتم العجل من بعده وانتم ظالمون"],[2,"البقرة","Al-Baqarah",93,"واذ اخذنا ميثاقكم ورفعنا فوقكم الطور خذوا ما ءاتيناكم بقوة واسمعوا قالوا سمعنا وعصينا واشربوا في قلوبهم العجل بكفرهم قل بئسما يامركم به ايمانكم ان كنتم مؤمنين"],[2,"البقرة","Al-Baqarah",94,"قل ان كانت لكم الدار الاخرة عند الله خالصة من دون الناس فتمنوا الموت ان كنتم صادقين"],[2,"البقرة","Al-Baqarah",95,"ولن يتمنوه ابدا بما قدمت ايديهم والله عليم بالظالمين"],[2,"البقرة","Al-Baqarah",96,"ولتجدنهم احرص الناس علي حيواة ومن الذين اشركوا يود احدهم لو يعمر الف سنة وما هو بمزحزحه من العذاب ان يعمر والله بصير بما يعملون"],[2,"البقرة","Al-Baqarah",97,"قل من كان عدوا لجبريل فانه نزله علي قلبك باذن الله مصدقا لما بين يديه وهدي وبشري للمؤمنين"],[2,"البقرة","Al-Baqarah",98,"من كان عدوا لله وملائكته ورسله وجبريل وميكيل فان الله عدو للكافرين"],[2,"البقرة","Al-Baqarah",99,"ولقد انزلنا اليك ءايات بينات وما يكفر بها الا الفاسقون"],[2,"البقرة","Al-Baqarah",100,"اوكلما عاهدوا عهدا نبذه فريق منهم بل اكثرهم لا يؤمنون"],[2,"البقرة","Al-Baqarah",101,"ولما جاءهم رسول من عند الله مصدق لما معهم نبذ فريق من الذين اوتوا الكتاب كتاب الله وراء ظهورهم كانهم لا يعلمون"],[2,"البقرة","Al-Baqarah",102,"واتبعوا ما تتلوا الشياطين علي ملك سليمان وما كفر سليمان ولاكن الشياطين كفروا يعلمون الناس السحر وما انزل علي الملكين ببابل هاروت وماروت وما يعلمان من احد حتي يقولا انما نحن فتنة فلا تكفر فيتعلمون منهما ما يفرقون به بين المرء وزوجه وما هم بضارين به من احد الا باذن الله ويتعلمون ما يضرهم ولا ينفعهم ولقد علموا لمن اشتريه ما له في الاخرة من خلاق ولبئس ما شروا به انفسهم لو كانوا يعلمون"],[2,"البقرة","Al-Baqarah",103,"ولو انهم ءامنوا واتقوا لمثوبة من عند الله خير لو كانوا يعلمون"],[2,"البقرة","Al-Baqarah",104,"ياايها الذين ءامنوا لا تقولوا راعنا وقولوا انظرنا واسمعوا وللكافرين عذاب اليم"],[2,"البقرة","Al-Baqarah",105,"ما يود الذين كفروا من اهل الكتاب ولا المشركين ان ينزل عليكم من خير من ربكم والله يختص برحمته من يشاء والله ذو الفضل العظيم"],[2,"البقرة","Al-Baqarah",106,"۞ما ننسخ من ءاية او ننسها نات بخير منها او مثلها الم تعلم ان الله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",107,"الم تعلم ان الله له ملك السماوات والارض وما لكم من دون الله من ولي ولا نصير"],[2,"البقرة","Al-Baqarah",108,"ام تريدون ان تسلوا رسولكم كما سئل موسي من قبل ومن يتبدل الكفر بالايمان فقد ضل سواء السبيل"],[2,"البقرة","Al-Baqarah",109,"ود كثير من اهل الكتاب لو يردونكم من بعد ايمانكم كفارا حسدا من عند انفسهم من بعد ما تبين لهم الحق فاعفوا واصفحوا حتي ياتي الله بامره ان الله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",110,"واقيموا الصلواة وءاتوا الزكواة وما تقدموا لانفسكم من خير تجدوه عند الله ان الله بما تعملون بصير"],[2,"البقرة","Al-Baqarah",111,"وقالوا لن يدخل الجنة الا من كان هودا او نصاري تلك امانيهم قل هاتوا برهانكم ان كنتم صادقين"],[2,"البقرة","Al-Baqarah",112,"بلي من اسلم وجهه لله وهو محسن فله اجره عند ربه ولا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",113,"وقالت اليهود ليست النصاري علي شيء وقالت النصاري ليست اليهود علي شيء وهم يتلون الكتاب كذالك قال الذين لا يعلمون مثل قولهم فالله يحكم بينهم يوم القيامة فيما كانوا فيه يختلفون"],[2,"البقرة","Al-Baqarah",114,"ومن اظلم ممن منع مساجد الله ان يذكر فيها اسمه وسعي في خرابها اولائك ما كان لهم ان يدخلوها الا خائفين لهم في الدنيا خزي ولهم في الاخرة عذاب عظيم"],[2,"البقرة","Al-Baqarah",115,"ولله المشرق والمغرب فاينما تولوا فثم وجه الله ان الله واسع عليم"],[2,"البقرة","Al-Baqarah",116,"وقالوا اتخذ الله ولدا سبحانه بل له ما في السماوات والارض كل له قانتون"],[2,"البقرة","Al-Baqarah",117,"بديع السماوات والارض واذا قضي امرا فانما يقول له كن فيكون"],[2,"البقرة","Al-Baqarah",118,"وقال الذين لا يعلمون لولا يكلمنا الله او تاتينا ءاية كذالك قال الذين من قبلهم مثل قولهم تشابهت قلوبهم قد بينا الايات لقوم يوقنون"],[2,"البقرة","Al-Baqarah",119,"انا ارسلناك بالحق بشيرا ونذيرا ولا تسل عن اصحاب الجحيم"],[2,"البقرة","Al-Baqarah",120,"ولن ترضي عنك اليهود ولا النصاري حتي تتبع ملتهم قل ان هدي الله هو الهدي ولئن اتبعت اهواءهم بعد الذي جاءك من العلم ما لك من الله من ولي ولا نصير"],[2,"البقرة","Al-Baqarah",121,"الذين ءاتيناهم الكتاب يتلونه حق تلاوته اولائك يؤمنون به ومن يكفر به فاولائك هم الخاسرون"],[2,"البقرة","Al-Baqarah",122,"يابني اسراءيل اذكروا نعمتي التي انعمت عليكم واني فضلتكم علي العالمين"],[2,"البقرة","Al-Baqarah",123,"واتقوا يوما لا تجزي نفس عن نفس شيا ولا يقبل منها عدل ولا تنفعها شفاعة ولا هم ينصرون"],[2,"البقرة","Al-Baqarah",124,"۞واذ ابتلي ابراهم ربه بكلمات فاتمهن قال اني جاعلك للناس اماما قال ومن ذريتي قال لا ينال عهدي الظالمين"],[2,"البقرة","Al-Baqarah",125,"واذ جعلنا البيت مثابة للناس وامنا واتخذوا من مقام ابراهم مصلي وعهدنا الي ابراهم واسماعيل ان طهرا بيتي للطائفين والعاكفين والركع السجود"],[2,"البقرة","Al-Baqarah",126,"واذ قال ابراهم رب اجعل هاذا بلدا ءامنا وارزق اهله من الثمرات من ءامن منهم بالله واليوم الاخر قال ومن كفر فامتعه قليلا ثم اضطره الي عذاب النار وبئس المصير"],[2,"البقرة","Al-Baqarah",127,"واذ يرفع ابراهم القواعد من البيت واسماعيل ربنا تقبل منا انك انت السميع العليم"],[2,"البقرة","Al-Baqarah",128,"ربنا واجعلنا مسلمين لك ومن ذريتنا امة مسلمة لك وارنا مناسكنا وتب علينا انك انت التواب الرحيم"],[2,"البقرة","Al-Baqarah",129,"ربنا وابعث فيهم رسولا منهم يتلوا عليهم ءاياتك ويعلمهم الكتاب والحكمة ويزكيهم انك انت العزيز الحكيم"],[2,"البقرة","Al-Baqarah",130,"ومن يرغب عن ملة ابراهم الا من سفه نفسه ولقد اصطفيناه في الدنيا وانه في الاخرة لمن الصالحين"],[2,"البقرة","Al-Baqarah",131,"اذ قال له ربه اسلم قال اسلمت لرب العالمين"],[2,"البقرة","Al-Baqarah",132,"ووصي بها ابراهم بنيه ويعقوب يابني ان الله اصطفي لكم الدين فلا تموتن الا وانتم مسلمون"],[2,"البقرة","Al-Baqarah",133,"ام كنتم شهداء اذ حضر يعقوب الموت اذ قال لبنيه ما تعبدون من بعدي قالوا نعبد الاهك والاه ءابائك ابراهم واسماعيل واسحاق الاها واحدا ونحن له مسلمون"],[2,"البقرة","Al-Baqarah",134,"تلك امة قد خلت لها ما كسبت ولكم ما كسبتم ولا تسلون عما كانوا يعملون"],[2,"البقرة","Al-Baqarah",135,"وقالوا كونوا هودا او نصاري تهتدوا قل بل ملة ابراهم حنيفا وما كان من المشركين"],[2,"البقرة","Al-Baqarah",136,"قولوا ءامنا بالله وما انزل الينا وما انزل الي ابراهم واسماعيل واسحاق ويعقوب والاسباط وما اوتي موسي وعيسي وما اوتي النبيون من ربهم لا نفرق بين احد منهم ونحن له مسلمون"],[2,"البقرة","Al-Baqarah",137,"فان ءامنوا بمثل ما ءامنتم به فقد اهتدوا وان تولوا فانما هم في شقاق فسيكفيكهم الله وهو السميع العليم"],[2,"البقرة","Al-Baqarah",138,"صبغة الله ومن احسن من الله صبغة ونحن له عابدون"],[2,"البقرة","Al-Baqarah",139,"قل اتحاجوننا في الله وهو ربنا وربكم ولنا اعمالنا ولكم اعمالكم ونحن له مخلصون"],[2,"البقرة","Al-Baqarah",140,"ام تقولون ان ابراهم واسماعيل واسحاق ويعقوب والاسباط كانوا هودا او نصاري قل ءانتم اعلم ام الله ومن اظلم ممن كتم شهادة عنده من الله وما الله بغافل عما تعملون"],[2,"البقرة","Al-Baqarah",141,"تلك امة قد خلت لها ما كسبت ولكم ما كسبتم ولا تسلون عما كانوا يعملون"],[2,"البقرة","Al-Baqarah",142,"۞سيقول السفهاء من الناس ما وليهم عن قبلتهم التي كانوا عليها قل لله المشرق والمغرب يهدي من يشاء الي صراط مستقيم"],[2,"البقرة","Al-Baqarah",143,"وكذالك جعلناكم امة وسطا لتكونوا شهداء علي الناس ويكون الرسول عليكم شهيدا وما جعلنا القبلة التي كنت عليها الا لنعلم من يتبع الرسول ممن ينقلب علي عقبيه وان كانت لكبيرة الا علي الذين هدي الله وما كان الله ليضيع ايمانكم ان الله بالناس لرءوف رحيم"],[2,"البقرة","Al-Baqarah",144,"قد نري تقلب وجهك في السماء فلنولينك قبلة ترضيها فول وجهك شطر المسجد الحرام وحيث ما كنتم فولوا وجوهكم شطره وان الذين اوتوا الكتاب ليعلمون انه الحق من ربهم وما الله بغافل عما يعملون"],[2,"البقرة","Al-Baqarah",145,"ولئن اتيت الذين اوتوا الكتاب بكل ءاية ما تبعوا قبلتك وما انت بتابع قبلتهم وما بعضهم بتابع قبلة بعض ولئن اتبعت اهواءهم من بعد ما جاءك من العلم انك اذا لمن الظالمين"],[2,"البقرة","Al-Baqarah",146,"الذين ءاتيناهم الكتاب يعرفونه كما يعرفون ابناءهم وان فريقا منهم ليكتمون الحق وهم يعلمون"],[2,"البقرة","Al-Baqarah",147,"الحق من ربك فلا تكونن من الممترين"],[2,"البقرة","Al-Baqarah",148,"ولكل وجهة هو موليها فاستبقوا الخيرات اين ما تكونوا يات بكم الله جميعا ان الله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",149,"ومن حيث خرجت فول وجهك شطر المسجد الحرام وانه للحق من ربك وما الله بغافل عما تعملون"],[2,"البقرة","Al-Baqarah",150,"ومن حيث خرجت فول وجهك شطر المسجد الحرام وحيث ما كنتم فولوا وجوهكم شطره لئلا يكون للناس عليكم حجة الا الذين ظلموا منهم فلا تخشوهم واخشوني ولاتم نعمتي عليكم ولعلكم تهتدون"],[2,"البقرة","Al-Baqarah",151,"كما ارسلنا فيكم رسولا منكم يتلوا عليكم ءاياتنا ويزكيكم ويعلمكم الكتاب والحكمة ويعلمكم ما لم تكونوا تعلمون"],[2,"البقرة","Al-Baqarah",152,"فاذكروني اذكركم واشكروا لي ولا تكفرون"],[2,"البقرة","Al-Baqarah",153,"ياايها الذين ءامنوا استعينوا بالصبر والصلواة ان الله مع الصابرين"],[2,"البقرة","Al-Baqarah",154,"ولا تقولوا لمن يقتل في سبيل الله اموات بل احياء ولاكن لا تشعرون"],[2,"البقرة","Al-Baqarah",155,"ولنبلونكم بشيء من الخوف والجوع ونقص من الاموال والانفس والثمرات وبشر الصابرين"],[2,"البقرة","Al-Baqarah",156,"الذين اذا اصابتهم مصيبة قالوا انا لله وانا اليه راجعون"],[2,"البقرة","Al-Baqarah",157,"اولائك عليهم صلوات من ربهم ورحمة واولائك هم المهتدون"],[2,"البقرة","Al-Baqarah",158,"۞ان الصفا والمروة من شعائر الله فمن حج البيت او اعتمر فلا جناح عليه ان يطوف بهما ومن تطوع خيرا فان الله شاكر عليم"],[2,"البقرة","Al-Baqarah",159,"ان الذين يكتمون ما انزلنا من البينات والهدي من بعد ما بيناه للناس في الكتاب اولائك يلعنهم الله ويلعنهم اللاعنون"],[2,"البقرة","Al-Baqarah",160,"الا الذين تابوا واصلحوا وبينوا فاولائك اتوب عليهم وانا التواب الرحيم"],[2,"البقرة","Al-Baqarah",161,"ان الذين كفروا وماتوا وهم كفار اولائك عليهم لعنة الله والملائكة والناس اجمعين"],[2,"البقرة","Al-Baqarah",162,"خالدين فيها لا يخفف عنهم العذاب ولا هم ينظرون"],[2,"البقرة","Al-Baqarah",163,"والاهكم الاه واحد لا الاه الا هو الرحمان الرحيم"],[2,"البقرة","Al-Baqarah",164,"ان في خلق السماوات والارض واختلاف اليل والنهار والفلك التي تجري في البحر بما ينفع الناس وما انزل الله من السماء من ماء فاحيا به الارض بعد موتها وبث فيها من كل دابة وتصريف الرياح والسحاب المسخر بين السماء والارض لايات لقوم يعقلون"],[2,"البقرة","Al-Baqarah",165,"ومن الناس من يتخذ من دون الله اندادا يحبونهم كحب الله والذين ءامنوا اشد حبا لله ولو يري الذين ظلموا اذ يرون العذاب ان القوة لله جميعا وان الله شديد العذاب"],[2,"البقرة","Al-Baqarah",166,"اذ تبرا الذين اتبعوا من الذين اتبعوا وراوا العذاب وتقطعت بهم الاسباب"],[2,"البقرة","Al-Baqarah",167,"وقال الذين اتبعوا لو ان لنا كرة فنتبرا منهم كما تبرءوا منا كذالك يريهم الله اعمالهم حسرات عليهم وما هم بخارجين من النار"],[2,"البقرة","Al-Baqarah",168,"ياايها الناس كلوا مما في الارض حلالا طيبا ولا تتبعوا خطوات الشيطان انه لكم عدو مبين"],[2,"البقرة","Al-Baqarah",169,"انما يامركم بالسوء والفحشاء وان تقولوا علي الله ما لا تعلمون"],[2,"البقرة","Al-Baqarah",170,"واذا قيل لهم اتبعوا ما انزل الله قالوا بل نتبع ما الفينا عليه ءاباءنا اولو كان ءاباؤهم لا يعقلون شيا ولا يهتدون"],[2,"البقرة","Al-Baqarah",171,"ومثل الذين كفروا كمثل الذي ينعق بما لا يسمع الا دعاء ونداء صم بكم عمي فهم لا يعقلون"],[2,"البقرة","Al-Baqarah",172,"ياايها الذين ءامنوا كلوا من طيبات ما رزقناكم واشكروا لله ان كنتم اياه تعبدون"],[2,"البقرة","Al-Baqarah",173,"انما حرم عليكم الميتة والدم ولحم الخنزير وما اهل به لغير الله فمن اضطر غير باغ ولا عاد فلا اثم عليه ان الله غفور رحيم"],[2,"البقرة","Al-Baqarah",174,"ان الذين يكتمون ما انزل الله من الكتاب ويشترون به ثمنا قليلا اولائك ما ياكلون في بطونهم الا النار ولا يكلمهم الله يوم القيامة ولا يزكيهم ولهم عذاب اليم"],[2,"البقرة","Al-Baqarah",175,"اولائك الذين اشتروا الضلالة بالهدي والعذاب بالمغفرة فما اصبرهم علي النار"],[2,"البقرة","Al-Baqarah",176,"ذالك بان الله نزل الكتاب بالحق وان الذين اختلفوا في الكتاب لفي شقاق بعيد"],[2,"البقرة","Al-Baqarah",177,"۞ليس البر ان تولوا وجوهكم قبل المشرق والمغرب ولاكن البر من ءامن بالله واليوم الاخر والملائكة والكتاب والنبين وءاتي المال علي حبه ذوي القربي واليتامي والمساكين وابن السبيل والسائلين وفي الرقاب واقام الصلواة وءاتي الزكواة والموفون بعهدهم اذا عاهدوا والصابرين في الباساء والضراء وحين الباس اولائك الذين صدقوا واولائك هم المتقون"],[2,"البقرة","Al-Baqarah",178,"ياايها الذين ءامنوا كتب عليكم القصاص في القتلي الحر بالحر والعبد بالعبد والانثي بالانثي فمن عفي له من اخيه شيء فاتباع بالمعروف واداء اليه باحسان ذالك تخفيف من ربكم ورحمة فمن اعتدي بعد ذالك فله عذاب اليم"],[2,"البقرة","Al-Baqarah",179,"ولكم في القصاص حيواة يااولي الالباب لعلكم تتقون"],[2,"البقرة","Al-Baqarah",180,"كتب عليكم اذا حضر احدكم الموت ان ترك خيرا الوصية للوالدين والاقربين بالمعروف حقا علي المتقين"],[2,"البقرة","Al-Baqarah",181,"فمن بدله بعد ما سمعه فانما اثمه علي الذين يبدلونه ان الله سميع عليم"],[2,"البقرة","Al-Baqarah",182,"فمن خاف من موص جنفا او اثما فاصلح بينهم فلا اثم عليه ان الله غفور رحيم"],[2,"البقرة","Al-Baqarah",183,"ياايها الذين ءامنوا كتب عليكم الصيام كما كتب علي الذين من قبلكم لعلكم تتقون"],[2,"البقرة","Al-Baqarah",184,"اياما معدودات فمن كان منكم مريضا او علي سفر فعدة من ايام اخر وعلي الذين يطيقونه فدية طعام مسكين فمن تطوع خيرا فهو خير له وان تصوموا خير لكم ان كنتم تعلمون"],[2,"البقرة","Al-Baqarah",185,"شهر رمضان الذي انزل فيه القرءان هدي للناس وبينات من الهدي والفرقان فمن شهد منكم الشهر فليصمه ومن كان مريضا او علي سفر فعدة من ايام اخر يريد الله بكم اليسر ولا يريد بكم العسر ولتكملوا العدة ولتكبروا الله علي ما هديكم ولعلكم تشكرون"],[2,"البقرة","Al-Baqarah",186,"واذا سالك عبادي عني فاني قريب اجيب دعوة الداع اذا دعان فليستجيبوا لي وليؤمنوا بي لعلهم يرشدون"],[2,"البقرة","Al-Baqarah",187,"احل لكم ليلة الصيام الرفث الي نسائكم هن لباس لكم وانتم لباس لهن علم الله انكم كنتم تختانون انفسكم فتاب عليكم وعفا عنكم فالان باشروهن وابتغوا ما كتب الله لكم وكلوا واشربوا حتي يتبين لكم الخيط الابيض من الخيط الاسود من الفجر ثم اتموا الصيام الي اليل ولا تباشروهن وانتم عاكفون في المساجد تلك حدود الله فلا تقربوها كذالك يبين الله ءاياته للناس لعلهم يتقون"],[2,"البقرة","Al-Baqarah",188,"ولا تاكلوا اموالكم بينكم بالباطل وتدلوا بها الي الحكام لتاكلوا فريقا من اموال الناس بالاثم وانتم تعلمون"],[2,"البقرة","Al-Baqarah",189,"۞يسلونك عن الاهلة قل هي مواقيت للناس والحج وليس البر بان تاتوا البيوت من ظهورها ولاكن البر من اتقي واتوا البيوت من ابوابها واتقوا الله لعلكم تفلحون"],[2,"البقرة","Al-Baqarah",190,"وقاتلوا في سبيل الله الذين يقاتلونكم ولا تعتدوا ان الله لا يحب المعتدين"],[2,"البقرة","Al-Baqarah",191,"واقتلوهم حيث ثقفتموهم واخرجوهم من حيث اخرجوكم والفتنة اشد من القتل ولا تقاتلوهم عند المسجد الحرام حتي يقاتلوكم فيه فان قاتلوكم فاقتلوهم كذالك جزاء الكافرين"],[2,"البقرة","Al-Baqarah",192,"فان انتهوا فان الله غفور رحيم"],[2,"البقرة","Al-Baqarah",193,"وقاتلوهم حتي لا تكون فتنة ويكون الدين لله فان انتهوا فلا عدوان الا علي الظالمين"],[2,"البقرة","Al-Baqarah",194,"الشهر الحرام بالشهر الحرام والحرمات قصاص فمن اعتدي عليكم فاعتدوا عليه بمثل ما اعتدي عليكم واتقوا الله واعلموا ان الله مع المتقين"],[2,"البقرة","Al-Baqarah",195,"وانفقوا في سبيل الله ولا تلقوا بايديكم الي التهلكة واحسنوا ان الله يحب المحسنين"],[2,"البقرة","Al-Baqarah",196,"واتموا الحج والعمرة لله فان احصرتم فما استيسر من الهدي ولا تحلقوا رءوسكم حتي يبلغ الهدي محله فمن كان منكم مريضا او به اذي من راسه ففدية من صيام او صدقة او نسك فاذا امنتم فمن تمتع بالعمرة الي الحج فما استيسر من الهدي فمن لم يجد فصيام ثلاثة ايام في الحج وسبعة اذا رجعتم تلك عشرة كاملة ذالك لمن لم يكن اهله حاضري المسجد الحرام واتقوا الله واعلموا ان الله شديد العقاب"],[2,"البقرة","Al-Baqarah",197,"الحج اشهر معلومات فمن فرض فيهن الحج فلا رفث ولا فسوق ولا جدال في الحج وما تفعلوا من خير يعلمه الله وتزودوا فان خير الزاد التقوي واتقون يااولي الالباب"],[2,"البقرة","Al-Baqarah",198,"ليس عليكم جناح ان تبتغوا فضلا من ربكم فاذا افضتم من عرفات فاذكروا الله عند المشعر الحرام واذكروه كما هديكم وان كنتم من قبله لمن الضالين"],[2,"البقرة","Al-Baqarah",199,"ثم افيضوا من حيث افاض الناس واستغفروا الله ان الله غفور رحيم"],[2,"البقرة","Al-Baqarah",200,"فاذا قضيتم مناسككم فاذكروا الله كذكركم ءاباءكم او اشد ذكرا فمن الناس من يقول ربنا ءاتنا في الدنيا وما له في الاخرة من خلاق"],[2,"البقرة","Al-Baqarah",201,"ومنهم من يقول ربنا ءاتنا في الدنيا حسنة وفي الاخرة حسنة وقنا عذاب النار"],[2,"البقرة","Al-Baqarah",202,"اولائك لهم نصيب مما كسبوا والله سريع الحساب"],[2,"البقرة","Al-Baqarah",203,"۞واذكروا الله في ايام معدودات فمن تعجل في يومين فلا اثم عليه ومن تاخر فلا اثم عليه لمن اتقي واتقوا الله واعلموا انكم اليه تحشرون"],[2,"البقرة","Al-Baqarah",204,"ومن الناس من يعجبك قوله في الحيواة الدنيا ويشهد الله علي ما في قلبه وهو الد الخصام"],[2,"البقرة","Al-Baqarah",205,"واذا تولي سعي في الارض ليفسد فيها ويهلك الحرث والنسل والله لا يحب الفساد"],[2,"البقرة","Al-Baqarah",206,"واذا قيل له اتق الله اخذته العزة بالاثم فحسبه جهنم ولبئس المهاد"],[2,"البقرة","Al-Baqarah",207,"ومن الناس من يشري نفسه ابتغاء مرضات الله والله رءوف بالعباد"],[2,"البقرة","Al-Baqarah",208,"ياايها الذين ءامنوا ادخلوا في السلم كافة ولا تتبعوا خطوات الشيطان انه لكم عدو مبين"],[2,"البقرة","Al-Baqarah",209,"فان زللتم من بعد ما جاءتكم البينات فاعلموا ان الله عزيز حكيم"],[2,"البقرة","Al-Baqarah",210,"هل ينظرون الا ان ياتيهم الله في ظلل من الغمام والملائكة وقضي الامر والي الله ترجع الامور"],[2,"البقرة","Al-Baqarah",211,"سل بني اسراءيل كم ءاتيناهم من ءاية بينة ومن يبدل نعمة الله من بعد ما جاءته فان الله شديد العقاب"],[2,"البقرة","Al-Baqarah",212,"زين للذين كفروا الحيواة الدنيا ويسخرون من الذين ءامنوا والذين اتقوا فوقهم يوم القيامة والله يرزق من يشاء بغير حساب"],[2,"البقرة","Al-Baqarah",213,"كان الناس امة واحدة فبعث الله النبين مبشرين ومنذرين وانزل معهم الكتاب بالحق ليحكم بين الناس فيما اختلفوا فيه وما اختلف فيه الا الذين اوتوه من بعد ما جاءتهم البينات بغيا بينهم فهدي الله الذين ءامنوا لما اختلفوا فيه من الحق باذنه والله يهدي من يشاء الي صراط مستقيم"],[2,"البقرة","Al-Baqarah",214,"ام حسبتم ان تدخلوا الجنة ولما ياتكم مثل الذين خلوا من قبلكم مستهم الباساء والضراء وزلزلوا حتي يقول الرسول والذين ءامنوا معه متي نصر الله الا ان نصر الله قريب"],[2,"البقرة","Al-Baqarah",215,"يسلونك ماذا ينفقون قل ما انفقتم من خير فللوالدين والاقربين واليتامي والمساكين وابن السبيل وما تفعلوا من خير فان الله به عليم"],[2,"البقرة","Al-Baqarah",216,"كتب عليكم القتال وهو كره لكم وعسي ان تكرهوا شيا وهو خير لكم وعسي ان تحبوا شيا وهو شر لكم والله يعلم وانتم لا تعلمون"],[2,"البقرة","Al-Baqarah",217,"يسلونك عن الشهر الحرام قتال فيه قل قتال فيه كبير وصد عن سبيل الله وكفر به والمسجد الحرام واخراج اهله منه اكبر عند الله والفتنة اكبر من القتل ولا يزالون يقاتلونكم حتي يردوكم عن دينكم ان استطاعوا ومن يرتدد منكم عن دينه فيمت وهو كافر فاولائك حبطت اعمالهم في الدنيا والاخرة واولائك اصحاب النار هم فيها خالدون"],[2,"البقرة","Al-Baqarah",218,"ان الذين ءامنوا والذين هاجروا وجاهدوا في سبيل الله اولائك يرجون رحمت الله والله غفور رحيم"],[2,"البقرة","Al-Baqarah",219,"۞يسلونك عن الخمر والميسر قل فيهما اثم كبير ومنافع للناس واثمهما اكبر من نفعهما ويسلونك ماذا ينفقون قل العفو كذالك يبين الله لكم الايات لعلكم تتفكرون"],[2,"البقرة","Al-Baqarah",220,"في الدنيا والاخرة ويسلونك عن اليتامي قل اصلاح لهم خير وان تخالطوهم فاخوانكم والله يعلم المفسد من المصلح ولو شاء الله لاعنتكم ان الله عزيز حكيم"],[2,"البقرة","Al-Baqarah",221,"ولا تنكحوا المشركات حتي يؤمن ولامة مؤمنة خير من مشركة ولو اعجبتكم ولا تنكحوا المشركين حتي يؤمنوا ولعبد مؤمن خير من مشرك ولو اعجبكم اولائك يدعون الي النار والله يدعوا الي الجنة والمغفرة باذنه ويبين ءاياته للناس لعلهم يتذكرون"],[2,"البقرة","Al-Baqarah",222,"ويسلونك عن المحيض قل هو اذي فاعتزلوا النساء في المحيض ولا تقربوهن حتي يطهرن فاذا تطهرن فاتوهن من حيث امركم الله ان الله يحب التوابين ويحب المتطهرين"],[2,"البقرة","Al-Baqarah",223,"نساؤكم حرث لكم فاتوا حرثكم اني شئتم وقدموا لانفسكم واتقوا الله واعلموا انكم ملاقوه وبشر المؤمنين"],[2,"البقرة","Al-Baqarah",224,"ولا تجعلوا الله عرضة لايمانكم ان تبروا وتتقوا وتصلحوا بين الناس والله سميع عليم"],[2,"البقرة","Al-Baqarah",225,"لا يؤاخذكم الله باللغو في ايمانكم ولاكن يؤاخذكم بما كسبت قلوبكم والله غفور حليم"],[2,"البقرة","Al-Baqarah",226,"للذين يؤلون من نسائهم تربص اربعة اشهر فان فاءو فان الله غفور رحيم"],[2,"البقرة","Al-Baqarah",227,"وان عزموا الطلاق فان الله سميع عليم"],[2,"البقرة","Al-Baqarah",228,"والمطلقات يتربصن بانفسهن ثلاثة قروء ولا يحل لهن ان يكتمن ما خلق الله في ارحامهن ان كن يؤمن بالله واليوم الاخر وبعولتهن احق بردهن في ذالك ان ارادوا اصلاحا ولهن مثل الذي عليهن بالمعروف وللرجال عليهن درجة والله عزيز حكيم"],[2,"البقرة","Al-Baqarah",229,"الطلاق مرتان فامساك بمعروف او تسريح باحسان ولا يحل لكم ان تاخذوا مما ءاتيتموهن شيا الا ان يخافا الا يقيما حدود الله فان خفتم الا يقيما حدود الله فلا جناح عليهما فيما افتدت به تلك حدود الله فلا تعتدوها ومن يتعد حدود الله فاولائك هم الظالمون"],[2,"البقرة","Al-Baqarah",230,"فان طلقها فلا تحل له من بعد حتي تنكح زوجا غيره فان طلقها فلا جناح عليهما ان يتراجعا ان ظنا ان يقيما حدود الله وتلك حدود الله يبينها لقوم يعلمون"],[2,"البقرة","Al-Baqarah",231,"واذا طلقتم النساء فبلغن اجلهن فامسكوهن بمعروف او سرحوهن بمعروف ولا تمسكوهن ضرارا لتعتدوا ومن يفعل ذالك فقد ظلم نفسه ولا تتخذوا ءايات الله هزوا واذكروا نعمت الله عليكم وما انزل عليكم من الكتاب والحكمة يعظكم به واتقوا الله واعلموا ان الله بكل شيء عليم"],[2,"البقرة","Al-Baqarah",232,"واذا طلقتم النساء فبلغن اجلهن فلا تعضلوهن ان ينكحن ازواجهن اذا تراضوا بينهم بالمعروف ذالك يوعظ به من كان منكم يؤمن بالله واليوم الاخر ذالكم ازكي لكم واطهر والله يعلم وانتم لا تعلمون"],[2,"البقرة","Al-Baqarah",233,"۞والوالدات يرضعن اولادهن حولين كاملين لمن اراد ان يتم الرضاعة وعلي المولود له رزقهن وكسوتهن بالمعروف لا تكلف نفس الا وسعها لا تضار والدة بولدها ولا مولود له بولده وعلي الوارث مثل ذالك فان ارادا فصالا عن تراض منهما وتشاور فلا جناح عليهما وان اردتم ان تسترضعوا اولادكم فلا جناح عليكم اذا سلمتم ما ءاتيتم بالمعروف واتقوا الله واعلموا ان الله بما تعملون بصير"],[2,"البقرة","Al-Baqarah",234,"والذين يتوفون منكم ويذرون ازواجا يتربصن بانفسهن اربعة اشهر وعشرا فاذا بلغن اجلهن فلا جناح عليكم فيما فعلن في انفسهن بالمعروف والله بما تعملون خبير"],[2,"البقرة","Al-Baqarah",235,"ولا جناح عليكم فيما عرضتم به من خطبة النساء او اكننتم في انفسكم علم الله انكم ستذكرونهن ولاكن لا تواعدوهن سرا الا ان تقولوا قولا معروفا ولا تعزموا عقدة النكاح حتي يبلغ الكتاب اجله واعلموا ان الله يعلم ما في انفسكم فاحذروه واعلموا ان الله غفور حليم"],[2,"البقرة","Al-Baqarah",236,"لا جناح عليكم ان طلقتم النساء ما لم تمسوهن او تفرضوا لهن فريضة ومتعوهن علي الموسع قدره وعلي المقتر قدره متاعا بالمعروف حقا علي المحسنين"],[2,"البقرة","Al-Baqarah",237,"وان طلقتموهن من قبل ان تمسوهن وقد فرضتم لهن فريضة فنصف ما فرضتم الا ان يعفون او يعفوا الذي بيده عقدة النكاح وان تعفوا اقرب للتقوي ولا تنسوا الفضل بينكم ان الله بما تعملون بصير"],[2,"البقرة","Al-Baqarah",238,"حافظوا علي الصلوات والصلواة الوسطي وقوموا لله قانتين"],[2,"البقرة","Al-Baqarah",239,"فان خفتم فرجالا او ركبانا فاذا امنتم فاذكروا الله كما علمكم ما لم تكونوا تعلمون"],[2,"البقرة","Al-Baqarah",240,"والذين يتوفون منكم ويذرون ازواجا وصية لازواجهم متاعا الي الحول غير اخراج فان خرجن فلا جناح عليكم في ما فعلن في انفسهن من معروف والله عزيز حكيم"],[2,"البقرة","Al-Baqarah",241,"وللمطلقات متاع بالمعروف حقا علي المتقين"],[2,"البقرة","Al-Baqarah",242,"كذالك يبين الله لكم ءاياته لعلكم تعقلون"],[2,"البقرة","Al-Baqarah",243,"۞الم تر الي الذين خرجوا من ديارهم وهم الوف حذر الموت فقال لهم الله موتوا ثم احياهم ان الله لذو فضل علي الناس ولاكن اكثر الناس لا يشكرون"],[2,"البقرة","Al-Baqarah",244,"وقاتلوا في سبيل الله واعلموا ان الله سميع عليم"],[2,"البقرة","Al-Baqarah",245,"من ذا الذي يقرض الله قرضا حسنا فيضاعفه له اضعافا كثيرة والله يقبض ويبصط واليه ترجعون"],[2,"البقرة","Al-Baqarah",246,"الم تر الي الملا من بني اسراءيل من بعد موسي اذ قالوا لنبي لهم ابعث لنا ملكا نقاتل في سبيل الله قال هل عسيتم ان كتب عليكم القتال الا تقاتلوا قالوا وما لنا الا نقاتل في سبيل الله وقد اخرجنا من ديارنا وابنائنا فلما كتب عليهم القتال تولوا الا قليلا منهم والله عليم بالظالمين"],[2,"البقرة","Al-Baqarah",247,"وقال لهم نبيهم ان الله قد بعث لكم طالوت ملكا قالوا اني يكون له الملك علينا ونحن احق بالملك منه ولم يؤت سعة من المال قال ان الله اصطفيه عليكم وزاده بسطة في العلم والجسم والله يؤتي ملكه من يشاء والله واسع عليم"],[2,"البقرة","Al-Baqarah",248,"وقال لهم نبيهم ان ءاية ملكه ان ياتيكم التابوت فيه سكينة من ربكم وبقية مما ترك ءال موسي وءال هارون تحمله الملائكة ان في ذالك لاية لكم ان كنتم مؤمنين"],[2,"البقرة","Al-Baqarah",249,"فلما فصل طالوت بالجنود قال ان الله مبتليكم بنهر فمن شرب منه فليس مني ومن لم يطعمه فانه مني الا من اغترف غرفة بيده فشربوا منه الا قليلا منهم فلما جاوزه هو والذين ءامنوا معه قالوا لا طاقة لنا اليوم بجالوت وجنوده قال الذين يظنون انهم ملاقوا الله كم من فئة قليلة غلبت فئة كثيرة باذن الله والله مع الصابرين"],[2,"البقرة","Al-Baqarah",250,"ولما برزوا لجالوت وجنوده قالوا ربنا افرغ علينا صبرا وثبت اقدامنا وانصرنا علي القوم الكافرين"],[2,"البقرة","Al-Baqarah",251,"فهزموهم باذن الله وقتل داود جالوت وءاتيه الله الملك والحكمة وعلمه مما يشاء ولولا دفع الله الناس بعضهم ببعض لفسدت الارض ولاكن الله ذو فضل علي العالمين"],[2,"البقرة","Al-Baqarah",252,"تلك ءايات الله نتلوها عليك بالحق وانك لمن المرسلين"],[2,"البقرة","Al-Baqarah",253,"۞تلك الرسل فضلنا بعضهم علي بعض منهم من كلم الله ورفع بعضهم درجات وءاتينا عيسي ابن مريم البينات وايدناه بروح القدس ولو شاء الله ما اقتتل الذين من بعدهم من بعد ما جاءتهم البينات ولاكن اختلفوا فمنهم من ءامن ومنهم من كفر ولو شاء الله ما اقتتلوا ولاكن الله يفعل ما يريد"],[2,"البقرة","Al-Baqarah",254,"ياايها الذين ءامنوا انفقوا مما رزقناكم من قبل ان ياتي يوم لا بيع فيه ولا خلة ولا شفاعة والكافرون هم الظالمون"],[2,"البقرة","Al-Baqarah",255,"الله لا الاه الا هو الحي القيوم لا تاخذه سنة ولا نوم له ما في السماوات وما في الارض من ذا الذي يشفع عنده الا باذنه يعلم ما بين ايديهم وما خلفهم ولا يحيطون بشيء من علمه الا بما شاء وسع كرسيه السماوات والارض ولا يوده حفظهما وهو العلي العظيم"],[2,"البقرة","Al-Baqarah",256,"لا اكراه في الدين قد تبين الرشد من الغي فمن يكفر بالطاغوت ويؤمن بالله فقد استمسك بالعروة الوثقي لا انفصام لها والله سميع عليم"],[2,"البقرة","Al-Baqarah",257,"الله ولي الذين ءامنوا يخرجهم من الظلمات الي النور والذين كفروا اولياؤهم الطاغوت يخرجونهم من النور الي الظلمات اولائك اصحاب النار هم فيها خالدون"],[2,"البقرة","Al-Baqarah",258,"الم تر الي الذي حاج ابراهم في ربه ان ءاتيه الله الملك اذ قال ابراهم ربي الذي يحي ويميت قال انا احي واميت قال ابراهم فان الله ياتي بالشمس من المشرق فات بها من المغرب فبهت الذي كفر والله لا يهدي القوم الظالمين"],[2,"البقرة","Al-Baqarah",259,"او كالذي مر علي قرية وهي خاوية علي عروشها قال اني يحي هاذه الله بعد موتها فاماته الله مائة عام ثم بعثه قال كم لبثت قال لبثت يوما او بعض يوم قال بل لبثت مائة عام فانظر الي طعامك وشرابك لم يتسنه وانظر الي حمارك ولنجعلك ءاية للناس وانظر الي العظام كيف ننشزها ثم نكسوها لحما فلما تبين له قال اعلم ان الله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",260,"واذ قال ابراهم رب ارني كيف تحي الموتي قال اولم تؤمن قال بلي ولاكن ليطمئن قلبي قال فخذ اربعة من الطير فصرهن اليك ثم اجعل علي كل جبل منهن جزءا ثم ادعهن ياتينك سعيا واعلم ان الله عزيز حكيم"],[2,"البقرة","Al-Baqarah",261,"مثل الذين ينفقون اموالهم في سبيل الله كمثل حبة انبتت سبع سنابل في كل سنبلة مائة حبة والله يضاعف لمن يشاء والله واسع عليم"],[2,"البقرة","Al-Baqarah",262,"الذين ينفقون اموالهم في سبيل الله ثم لا يتبعون ما انفقوا منا ولا اذي لهم اجرهم عند ربهم ولا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",263,"۞قول معروف ومغفرة خير من صدقة يتبعها اذي والله غني حليم"],[2,"البقرة","Al-Baqarah",264,"ياايها الذين ءامنوا لا تبطلوا صدقاتكم بالمن والاذي كالذي ينفق ماله رئاء الناس ولا يؤمن بالله واليوم الاخر فمثله كمثل صفوان عليه تراب فاصابه وابل فتركه صلدا لا يقدرون علي شيء مما كسبوا والله لا يهدي القوم الكافرين"],[2,"البقرة","Al-Baqarah",265,"ومثل الذين ينفقون اموالهم ابتغاء مرضات الله وتثبيتا من انفسهم كمثل جنة بربوة اصابها وابل فاتت اكلها ضعفين فان لم يصبها وابل فطل والله بما تعملون بصير"],[2,"البقرة","Al-Baqarah",266,"ايود احدكم ان تكون له جنة من نخيل واعناب تجري من تحتها الانهار له فيها من كل الثمرات واصابه الكبر وله ذرية ضعفاء فاصابها اعصار فيه نار فاحترقت كذالك يبين الله لكم الايات لعلكم تتفكرون"],[2,"البقرة","Al-Baqarah",267,"ياايها الذين ءامنوا انفقوا من طيبات ما كسبتم ومما اخرجنا لكم من الارض ولا تيمموا الخبيث منه تنفقون ولستم باخذيه الا ان تغمضوا فيه واعلموا ان الله غني حميد"],[2,"البقرة","Al-Baqarah",268,"الشيطان يعدكم الفقر ويامركم بالفحشاء والله يعدكم مغفرة منه وفضلا والله واسع عليم"],[2,"البقرة","Al-Baqarah",269,"يؤتي الحكمة من يشاء ومن يؤت الحكمة فقد اوتي خيرا كثيرا وما يذكر الا اولوا الالباب"],[2,"البقرة","Al-Baqarah",270,"وما انفقتم من نفقة او نذرتم من نذر فان الله يعلمه وما للظالمين من انصار"],[2,"البقرة","Al-Baqarah",271,"ان تبدوا الصدقات فنعما هي وان تخفوها وتؤتوها الفقراء فهو خير لكم ويكفر عنكم من سياتكم والله بما تعملون خبير"],[2,"البقرة","Al-Baqarah",272,"۞ليس عليك هديهم ولاكن الله يهدي من يشاء وما تنفقوا من خير فلانفسكم وما تنفقون الا ابتغاء وجه الله وما تنفقوا من خير يوف اليكم وانتم لا تظلمون"],[2,"البقرة","Al-Baqarah",273,"للفقراء الذين احصروا في سبيل الله لا يستطيعون ضربا في الارض يحسبهم الجاهل اغنياء من التعفف تعرفهم بسيماهم لا يسلون الناس الحافا وما تنفقوا من خير فان الله به عليم"],[2,"البقرة","Al-Baqarah",274,"الذين ينفقون اموالهم باليل والنهار سرا وعلانية فلهم اجرهم عند ربهم ولا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",275,"الذين ياكلون الربواا لا يقومون الا كما يقوم الذي يتخبطه الشيطان من المس ذالك بانهم قالوا انما البيع مثل الربواا واحل الله البيع وحرم الربواا فمن جاءه موعظة من ربه فانتهي فله ما سلف وامره الي الله ومن عاد فاولائك اصحاب النار هم فيها خالدون"],[2,"البقرة","Al-Baqarah",276,"يمحق الله الربواا ويربي الصدقات والله لا يحب كل كفار اثيم"],[2,"البقرة","Al-Baqarah",277,"ان الذين ءامنوا وعملوا الصالحات واقاموا الصلواة وءاتوا الزكواة لهم اجرهم عند ربهم ولا خوف عليهم ولا هم يحزنون"],[2,"البقرة","Al-Baqarah",278,"ياايها الذين ءامنوا اتقوا الله وذروا ما بقي من الربواا ان كنتم مؤمنين"],[2,"البقرة","Al-Baqarah",279,"فان لم تفعلوا فاذنوا بحرب من الله ورسوله وان تبتم فلكم رءوس اموالكم لا تظلمون ولا تظلمون"],[2,"البقرة","Al-Baqarah",280,"وان كان ذو عسرة فنظرة الي ميسرة وان تصدقوا خير لكم ان كنتم تعلمون"],[2,"البقرة","Al-Baqarah",281,"واتقوا يوما ترجعون فيه الي الله ثم توفي كل نفس ما كسبت وهم لا يظلمون"],[2,"البقرة","Al-Baqarah",282,"ياايها الذين ءامنوا اذا تداينتم بدين الي اجل مسمي فاكتبوه وليكتب بينكم كاتب بالعدل ولا ياب كاتب ان يكتب كما علمه الله فليكتب وليملل الذي عليه الحق وليتق الله ربه ولا يبخس منه شيا فان كان الذي عليه الحق سفيها او ضعيفا او لا يستطيع ان يمل هو فليملل وليه بالعدل واستشهدوا شهيدين من رجالكم فان لم يكونا رجلين فرجل وامراتان ممن ترضون من الشهداء ان تضل احديهما فتذكر احديهما الاخري ولا ياب الشهداء اذا ما دعوا ولا تسموا ان تكتبوه صغيرا او كبيرا الي اجله ذالكم اقسط عند الله واقوم للشهادة وادني الا ترتابوا الا ان تكون تجارة حاضرة تديرونها بينكم فليس عليكم جناح الا تكتبوها واشهدوا اذا تبايعتم ولا يضار كاتب ولا شهيد وان تفعلوا فانه فسوق بكم واتقوا الله ويعلمكم الله والله بكل شيء عليم"],[2,"البقرة","Al-Baqarah",283,"۞وان كنتم علي سفر ولم تجدوا كاتبا فرهان مقبوضة فان امن بعضكم بعضا فليؤد الذي اؤتمن امانته وليتق الله ربه ولا تكتموا الشهادة ومن يكتمها فانه ءاثم قلبه والله بما تعملون عليم"],[2,"البقرة","Al-Baqarah",284,"لله ما في السماوات وما في الارض وان تبدوا ما في انفسكم او تخفوه يحاسبكم به الله فيغفر لمن يشاء ويعذب من يشاء والله علي كل شيء قدير"],[2,"البقرة","Al-Baqarah",285,"ءامن الرسول بما انزل اليه من ربه والمؤمنون كل ءامن بالله وملائكته وكتبه ورسله لا نفرق بين احد من رسله وقالوا سمعنا واطعنا غفرانك ربنا واليك المصير"],[2,"البقرة","Al-Baqarah",286,"لا يكلف الله نفسا الا وسعها لها ما كسبت وعليها ما اكتسبت ربنا لا تؤاخذنا ان نسينا او اخطانا ربنا ولا تحمل علينا اصرا كما حملته علي الذين من قبلنا ربنا ولا تحملنا ما لا طاقة لنا به واعف عنا واغفر لنا وارحمنا انت مولينا فانصرنا علي القوم الكافرين"],[3,"آل عمران","Ali 'Imran",1,"الم"],[3,"آل عمران","Ali 'Imran",2,"الله لا الاه الا هو الحي القيوم"],[3,"آل عمران","Ali 'Imran",3,"نزل عليك الكتاب بالحق مصدقا لما بين يديه وانزل التورية والانجيل"],[3,"آل عمران","Ali 'Imran",4,"من قبل هدي للناس وانزل الفرقان ان الذين كفروا بايات الله لهم عذاب شديد والله عزيز ذو انتقام"],[3,"آل عمران","Ali 'Imran",5,"ان الله لا يخفي عليه شيء في الارض ولا في السماء"],[3,"آل عمران","Ali 'Imran",6,"هو الذي يصوركم في الارحام كيف يشاء لا الاه الا هو العزيز الحكيم"],[3,"آل عمران","Ali 'Imran",7,"هو الذي انزل عليك الكتاب منه ءايات محكمات هن ام الكتاب واخر متشابهات فاما الذين في قلوبهم زيغ فيتبعون ما تشابه منه ابتغاء الفتنة وابتغاء تاويله وما يعلم تاويله الا الله والراسخون في العلم يقولون ءامنا به كل من عند ربنا وما يذكر الا اولوا الالباب"],[3,"آل عمران","Ali 'Imran",8,"ربنا لا تزغ قلوبنا بعد اذ هديتنا وهب لنا من لدنك رحمة انك انت الوهاب"],[3,"آل عمران","Ali 'Imran",9,"ربنا انك جامع الناس ليوم لا ريب فيه ان الله لا يخلف الميعاد"],[3,"آل عمران","Ali 'Imran",10,"ان الذين كفروا لن تغني عنهم اموالهم ولا اولادهم من الله شيا واولائك هم وقود النار"],[3,"آل عمران","Ali 'Imran",11,"كداب ءال فرعون والذين من قبلهم كذبوا باياتنا فاخذهم الله بذنوبهم والله شديد العقاب"],[3,"آل عمران","Ali 'Imran",12,"قل للذين كفروا ستغلبون وتحشرون الي جهنم وبئس المهاد"],[3,"آل عمران","Ali 'Imran",13,"قد كان لكم ءاية في فئتين التقتا فئة تقاتل في سبيل الله واخري كافرة يرونهم مثليهم راي العين والله يؤيد بنصره من يشاء ان في ذالك لعبرة لاولي الابصار"],[3,"آل عمران","Ali 'Imran",14,"زين للناس حب الشهوات من النساء والبنين والقناطير المقنطرة من الذهب والفضة والخيل المسومة والانعام والحرث ذالك متاع الحيواة الدنيا والله عنده حسن الماب"],[3,"آل عمران","Ali 'Imran",15,"۞قل اؤنبئكم بخير من ذالكم للذين اتقوا عند ربهم جنات تجري من تحتها الانهار خالدين فيها وازواج مطهرة ورضوان من الله والله بصير بالعباد"],[3,"آل عمران","Ali 'Imran",16,"الذين يقولون ربنا اننا ءامنا فاغفر لنا ذنوبنا وقنا عذاب النار"],[3,"آل عمران","Ali 'Imran",17,"الصابرين والصادقين والقانتين والمنفقين والمستغفرين بالاسحار"],[3,"آل عمران","Ali 'Imran",18,"شهد الله انه لا الاه الا هو والملائكة واولوا العلم قائما بالقسط لا الاه الا هو العزيز الحكيم"],[3,"آل عمران","Ali 'Imran",19,"ان الدين عند الله الاسلام وما اختلف الذين اوتوا الكتاب الا من بعد ما جاءهم العلم بغيا بينهم ومن يكفر بايات الله فان الله سريع الحساب"],[3,"آل عمران","Ali 'Imran",20,"فان حاجوك فقل اسلمت وجهي لله ومن اتبعن وقل للذين اوتوا الكتاب والامين ءاسلمتم فان اسلموا فقد اهتدوا وان تولوا فانما عليك البلاغ والله بصير بالعباد"],[3,"آل عمران","Ali 'Imran",21,"ان الذين يكفرون بايات الله ويقتلون النبين بغير حق ويقتلون الذين يامرون بالقسط من الناس فبشرهم بعذاب اليم"],[3,"آل عمران","Ali 'Imran",22,"اولائك الذين حبطت اعمالهم في الدنيا والاخرة وما لهم من ناصرين"],[3,"آل عمران","Ali 'Imran",23,"الم تر الي الذين اوتوا نصيبا من الكتاب يدعون الي كتاب الله ليحكم بينهم ثم يتولي فريق منهم وهم معرضون"],[3,"آل عمران","Ali 'Imran",24,"ذالك بانهم قالوا لن تمسنا النار الا اياما معدودات وغرهم في دينهم ما كانوا يفترون"],[3,"آل عمران","Ali 'Imran",25,"فكيف اذا جمعناهم ليوم لا ريب فيه ووفيت كل نفس ما كسبت وهم لا يظلمون"],[3,"آل عمران","Ali 'Imran",26,"قل اللهم مالك الملك تؤتي الملك من تشاء وتنزع الملك ممن تشاء وتعز من تشاء وتذل من تشاء بيدك الخير انك علي كل شيء قدير"],[3,"آل عمران","Ali 'Imran",27,"تولج اليل في النهار وتولج النهار في اليل وتخرج الحي من الميت وتخرج الميت من الحي وترزق من تشاء بغير حساب"],[3,"آل عمران","Ali 'Imran",28,"لا يتخذ المؤمنون الكافرين اولياء من دون المؤمنين ومن يفعل ذالك فليس من الله في شيء الا ان تتقوا منهم تقية ويحذركم الله نفسه والي الله المصير"],[3,"آل عمران","Ali 'Imran",29,"قل ان تخفوا ما في صدوركم او تبدوه يعلمه الله ويعلم ما في السماوات وما في الارض والله علي كل شيء قدير"],[3,"آل عمران","Ali 'Imran",30,"يوم تجد كل نفس ما عملت من خير محضرا وما عملت من سوء تود لو ان بينها وبينه امدا بعيدا ويحذركم الله نفسه والله رءوف بالعباد"],[3,"آل عمران","Ali 'Imran",31,"قل ان كنتم تحبون الله فاتبعوني يحببكم الله ويغفر لكم ذنوبكم والله غفور رحيم"],[3,"آل عمران","Ali 'Imran",32,"قل اطيعوا الله والرسول فان تولوا فان الله لا يحب الكافرين"],[3,"آل عمران","Ali 'Imran",33,"۞ان الله اصطفي ءادم ونوحا وءال ابراهيم وءال عمران علي العالمين"],[3,"آل عمران","Ali 'Imran",34,"ذرية بعضها من بعض والله سميع عليم"],[3,"آل عمران","Ali 'Imran",35,"اذ قالت امرات عمران رب اني نذرت لك ما في بطني محررا فتقبل مني انك انت السميع العليم"],[3,"آل عمران","Ali 'Imran",36,"فلما وضعتها قالت رب اني وضعتها انثي والله اعلم بما وضعت وليس الذكر كالانثي واني سميتها مريم واني اعيذها بك وذريتها من الشيطان الرجيم"],[3,"آل عمران","Ali 'Imran",37,"فتقبلها ربها بقبول حسن وانبتها نباتا حسنا وكفلها زكريا كلما دخل عليها زكريا المحراب وجد عندها رزقا قال يامريم اني لك هاذا قالت هو من عند الله ان الله يرزق من يشاء بغير حساب"],[3,"آل عمران","Ali 'Imran",38,"هنالك دعا زكريا ربه قال رب هب لي من لدنك ذرية طيبة انك سميع الدعاء"],[3,"آل عمران","Ali 'Imran",39,"فنادته الملائكة وهو قائم يصلي في المحراب ان الله يبشرك بيحيي مصدقا بكلمة من الله وسيدا وحصورا ونبيا من الصالحين"],[3,"آل عمران","Ali 'Imran",40,"قال رب اني يكون لي غلام وقد بلغني الكبر وامراتي عاقر قال كذالك الله يفعل ما يشاء"],[3,"آل عمران","Ali 'Imran",41,"قال رب اجعل لي ءاية قال ءايتك الا تكلم الناس ثلاثة ايام الا رمزا واذكر ربك كثيرا وسبح بالعشي والابكار"],[3,"آل عمران","Ali 'Imran",42,"واذ قالت الملائكة يامريم ان الله اصطفيك وطهرك واصطفيك علي نساء العالمين"],[3,"آل عمران","Ali 'Imran",43,"يامريم اقنتي لربك واسجدي واركعي مع الراكعين"],[3,"آل عمران","Ali 'Imran",44,"ذالك من انباء الغيب نوحيه اليك وما كنت لديهم اذ يلقون اقلامهم ايهم يكفل مريم وما كنت لديهم اذ يختصمون"],[3,"آل عمران","Ali 'Imran",45,"اذ قالت الملائكة يامريم ان الله يبشرك بكلمة منه اسمه المسيح عيسي ابن مريم وجيها في الدنيا والاخرة ومن المقربين"],[3,"آل عمران","Ali 'Imran",46,"ويكلم الناس في المهد وكهلا ومن الصالحين"],[3,"آل عمران","Ali 'Imran",47,"قالت رب اني يكون لي ولد ولم يمسسني بشر قال كذالك الله يخلق ما يشاء اذا قضي امرا فانما يقول له كن فيكون"],[3,"آل عمران","Ali 'Imran",48,"ويعلمه الكتاب والحكمة والتورية والانجيل"],[3,"آل عمران","Ali 'Imran",49,"ورسولا الي بني اسراءيل اني قد جئتكم باية من ربكم اني اخلق لكم من الطين كهية الطير فانفخ فيه فيكون طيرا باذن الله وابرئ الاكمه والابرص واحي الموتي باذن الله وانبئكم بما تاكلون وما تدخرون في بيوتكم ان في ذالك لاية لكم ان كنتم مؤمنين"],[3,"آل عمران","Ali 'Imran",50,"ومصدقا لما بين يدي من التورية ولاحل لكم بعض الذي حرم عليكم وجئتكم باية من ربكم فاتقوا الله واطيعون"],[3,"آل عمران","Ali 'Imran",51,"ان الله ربي وربكم فاعبدوه هاذا صراط مستقيم"],[3,"آل عمران","Ali 'Imran",52,"۞فلما احس عيسي منهم الكفر قال من انصاري الي الله قال الحواريون نحن انصار الله ءامنا بالله واشهد بانا مسلمون"],[3,"آل عمران","Ali 'Imran",53,"ربنا ءامنا بما انزلت واتبعنا الرسول فاكتبنا مع الشاهدين"],[3,"آل عمران","Ali 'Imran",54,"ومكروا ومكر الله والله خير الماكرين"],[3,"آل عمران","Ali 'Imran",55,"اذ قال الله ياعيسي اني متوفيك ورافعك الي ومطهرك من الذين كفروا وجاعل الذين اتبعوك فوق الذين كفروا الي يوم القيامة ثم الي مرجعكم فاحكم بينكم فيما كنتم فيه تختلفون"],[3,"آل عمران","Ali 'Imran",56,"فاما الذين كفروا فاعذبهم عذابا شديدا في الدنيا والاخرة وما لهم من ناصرين"],[3,"آل عمران","Ali 'Imran",57,"واما الذين ءامنوا وعملوا الصالحات فيوفيهم اجورهم والله لا يحب الظالمين"],[3,"آل عمران","Ali 'Imran",58,"ذالك نتلوه عليك من الايات والذكر الحكيم"],[3,"آل عمران","Ali 'Imran",59,"ان مثل عيسي عند الله كمثل ءادم خلقه من تراب ثم قال له كن فيكون"],[3,"آل عمران","Ali 'Imran",60,"الحق من ربك فلا تكن من الممترين"],[3,"آل عمران","Ali 'Imran",61,"فمن حاجك فيه من بعد ما جاءك من العلم فقل تعالوا ندع ابناءنا وابناءكم ونساءنا ونساءكم وانفسنا وانفسكم ثم نبتهل فنجعل لعنت الله علي الكاذبين"],[3,"آل عمران","Ali 'Imran",62,"ان هاذا لهو القصص الحق وما من الاه الا الله وان الله لهو العزيز الحكيم"],[3,"آل عمران","Ali 'Imran",63,"فان تولوا فان الله عليم بالمفسدين"],[3,"آل عمران","Ali 'Imran",64,"قل يااهل الكتاب تعالوا الي كلمة سواء بيننا وبينكم الا نعبد الا الله ولا نشرك به شيا ولا يتخذ بعضنا بعضا اربابا من دون الله فان تولوا فقولوا اشهدوا بانا مسلمون"],[3,"آل عمران","Ali 'Imran",65,"يااهل الكتاب لم تحاجون في ابراهيم وما انزلت التورية والانجيل الا من بعده افلا تعقلون"],[3,"آل عمران","Ali 'Imran",66,"هاانتم هاؤلاء حاججتم فيما لكم به علم فلم تحاجون فيما ليس لكم به علم والله يعلم وانتم لا تعلمون"],[3,"آل عمران","Ali 'Imran",67,"ما كان ابراهيم يهوديا ولا نصرانيا ولاكن كان حنيفا مسلما وما كان من المشركين"],[3,"آل عمران","Ali 'Imran",68,"ان اولي الناس بابراهيم للذين اتبعوه وهاذا النبي والذين ءامنوا والله ولي المؤمنين"],[3,"آل عمران","Ali 'Imran",69,"ودت طائفة من اهل الكتاب لو يضلونكم وما يضلون الا انفسهم وما يشعرون"],[3,"آل عمران","Ali 'Imran",70,"يااهل الكتاب لم تكفرون بايات الله وانتم تشهدون"],[3,"آل عمران","Ali 'Imran",71,"يااهل الكتاب لم تلبسون الحق بالباطل وتكتمون الحق وانتم تعلمون"],[3,"آل عمران","Ali 'Imran",72,"وقالت طائفة من اهل الكتاب ءامنوا بالذي انزل علي الذين ءامنوا وجه النهار واكفروا ءاخره لعلهم يرجعون"],[3,"آل عمران","Ali 'Imran",73,"ولا تؤمنوا الا لمن تبع دينكم قل ان الهدي هدي الله ان يؤتي احد مثل ما اوتيتم او يحاجوكم عند ربكم قل ان الفضل بيد الله يؤتيه من يشاء والله واسع عليم"],[3,"آل عمران","Ali 'Imran",74,"يختص برحمته من يشاء والله ذو الفضل العظيم"],[3,"آل عمران","Ali 'Imran",75,"۞ومن اهل الكتاب من ان تامنه بقنطار يؤده اليك ومنهم من ان تامنه بدينار لا يؤده اليك الا ما دمت عليه قائما ذالك بانهم قالوا ليس علينا في الامين سبيل ويقولون علي الله الكذب وهم يعلمون"],[3,"آل عمران","Ali 'Imran",76,"بلي من اوفي بعهده واتقي فان الله يحب المتقين"],[3,"آل عمران","Ali 'Imran",77,"ان الذين يشترون بعهد الله وايمانهم ثمنا قليلا اولائك لا خلاق لهم في الاخرة ولا يكلمهم الله ولا ينظر اليهم يوم القيامة ولا يزكيهم ولهم عذاب اليم"],[3,"آل عمران","Ali 'Imran",78,"وان منهم لفريقا يلون السنتهم بالكتاب لتحسبوه من الكتاب وما هو من الكتاب ويقولون هو من عند الله وما هو من عند الله ويقولون علي الله الكذب وهم يعلمون"],[3,"آل عمران","Ali 'Imran",79,"ما كان لبشر ان يؤتيه الله الكتاب والحكم والنبوة ثم يقول للناس كونوا عبادا لي من دون الله ولاكن كونوا ربانين بما كنتم تعلمون الكتاب وبما كنتم تدرسون"],[3,"آل عمران","Ali 'Imran",80,"ولا يامركم ان تتخذوا الملائكة والنبين اربابا ايامركم بالكفر بعد اذ انتم مسلمون"],[3,"آل عمران","Ali 'Imran",81,"واذ اخذ الله ميثاق النبين لما ءاتيتكم من كتاب وحكمة ثم جاءكم رسول مصدق لما معكم لتؤمنن به ولتنصرنه قال ءاقررتم واخذتم علي ذالكم اصري قالوا اقررنا قال فاشهدوا وانا معكم من الشاهدين"],[3,"آل عمران","Ali 'Imran",82,"فمن تولي بعد ذالك فاولائك هم الفاسقون"],[3,"آل عمران","Ali 'Imran",83,"افغير دين الله يبغون وله اسلم من في السماوات والارض طوعا وكرها واليه يرجعون"],[3,"آل عمران","Ali 'Imran",84,"قل ءامنا بالله وما انزل علينا وما انزل علي ابراهيم واسماعيل واسحاق ويعقوب والاسباط وما اوتي موسي وعيسي والنبيون من ربهم لا نفرق بين احد منهم ونحن له مسلمون"],[3,"آل عمران","Ali 'Imran",85,"ومن يبتغ غير الاسلام دينا فلن يقبل منه وهو في الاخرة من الخاسرين"],[3,"آل عمران","Ali 'Imran",86,"كيف يهدي الله قوما كفروا بعد ايمانهم وشهدوا ان الرسول حق وجاءهم البينات والله لا يهدي القوم الظالمين"],[3,"آل عمران","Ali 'Imran",87,"اولائك جزاؤهم ان عليهم لعنة الله والملائكة والناس اجمعين"],[3,"آل عمران","Ali 'Imran",88,"خالدين فيها لا يخفف عنهم العذاب ولا هم ينظرون"],[3,"آل عمران","Ali 'Imran",89,"الا الذين تابوا من بعد ذالك واصلحوا فان الله غفور رحيم"],[3,"آل عمران","Ali 'Imran",90,"ان الذين كفروا بعد ايمانهم ثم ازدادوا كفرا لن تقبل توبتهم واولائك هم الضالون"],[3,"آل عمران","Ali 'Imran",91,"ان الذين كفروا وماتوا وهم كفار فلن يقبل من احدهم ملء الارض ذهبا ولو افتدي به اولائك لهم عذاب اليم وما لهم من ناصرين"],[3,"آل عمران","Ali 'Imran",92,"لن تنالوا البر حتي تنفقوا مما تحبون وما تنفقوا من شيء فان الله به عليم"],[3,"آل عمران","Ali 'Imran",93,"۞كل الطعام كان حلا لبني اسراءيل الا ما حرم اسراءيل علي نفسه من قبل ان تنزل التورية قل فاتوا بالتورية فاتلوها ان كنتم صادقين"],[3,"آل عمران","Ali 'Imran",94,"فمن افتري علي الله الكذب من بعد ذالك فاولائك هم الظالمون"],[3,"آل عمران","Ali 'Imran",95,"قل صدق الله فاتبعوا ملة ابراهيم حنيفا وما كان من المشركين"],[3,"آل عمران","Ali 'Imran",96,"ان اول بيت وضع للناس للذي ببكة مباركا وهدي للعالمين"],[3,"آل عمران","Ali 'Imran",97,"فيه ءايات بينات مقام ابراهيم ومن دخله كان ءامنا ولله علي الناس حج البيت من استطاع اليه سبيلا ومن كفر فان الله غني عن العالمين"],[3,"آل عمران","Ali 'Imran",98,"قل يااهل الكتاب لم تكفرون بايات الله والله شهيد علي ما تعملون"],[3,"آل عمران","Ali 'Imran",99,"قل يااهل الكتاب لم تصدون عن سبيل الله من ءامن تبغونها عوجا وانتم شهداء وما الله بغافل عما تعملون"],[3,"آل عمران","Ali 'Imran",100,"ياايها الذين ءامنوا ان تطيعوا فريقا من الذين اوتوا الكتاب يردوكم بعد ايمانكم كافرين"],[3,"آل عمران","Ali 'Imran",101,"وكيف تكفرون وانتم تتلي عليكم ءايات الله وفيكم رسوله ومن يعتصم بالله فقد هدي الي صراط مستقيم"],[3,"آل عمران","Ali 'Imran",102,"ياايها الذين ءامنوا اتقوا الله حق تقاته ولا تموتن الا وانتم مسلمون"],[3,"آل عمران","Ali 'Imran",103,"واعتصموا بحبل الله جميعا ولا تفرقوا واذكروا نعمت الله عليكم اذ كنتم اعداء فالف بين قلوبكم فاصبحتم بنعمته اخوانا وكنتم علي شفا حفرة من النار فانقذكم منها كذالك يبين الله لكم ءاياته لعلكم تهتدون"],[3,"آل عمران","Ali 'Imran",104,"ولتكن منكم امة يدعون الي الخير ويامرون بالمعروف وينهون عن المنكر واولائك هم المفلحون"],[3,"آل عمران","Ali 'Imran",105,"ولا تكونوا كالذين تفرقوا واختلفوا من بعد ما جاءهم البينات واولائك لهم عذاب عظيم"],[3,"آل عمران","Ali 'Imran",106,"يوم تبيض وجوه وتسود وجوه فاما الذين اسودت وجوههم اكفرتم بعد ايمانكم فذوقوا العذاب بما كنتم تكفرون"],[3,"آل عمران","Ali 'Imran",107,"واما الذين ابيضت وجوههم ففي رحمة الله هم فيها خالدون"],[3,"آل عمران","Ali 'Imran",108,"تلك ءايات الله نتلوها عليك بالحق وما الله يريد ظلما للعالمين"],[3,"آل عمران","Ali 'Imran",109,"ولله ما في السماوات وما في الارض والي الله ترجع الامور"],[3,"آل عمران","Ali 'Imran",110,"كنتم خير امة اخرجت للناس تامرون بالمعروف وتنهون عن المنكر وتؤمنون بالله ولو ءامن اهل الكتاب لكان خيرا لهم منهم المؤمنون واكثرهم الفاسقون"],[3,"آل عمران","Ali 'Imran",111,"لن يضروكم الا اذي وان يقاتلوكم يولوكم الادبار ثم لا ينصرون"],[3,"آل عمران","Ali 'Imran",112,"ضربت عليهم الذلة اين ما ثقفوا الا بحبل من الله وحبل من الناس وباءو بغضب من الله وضربت عليهم المسكنة ذالك بانهم كانوا يكفرون بايات الله ويقتلون الانبياء بغير حق ذالك بما عصوا وكانوا يعتدون"],[3,"آل عمران","Ali 'Imran",113,"۞ليسوا سواء من اهل الكتاب امة قائمة يتلون ءايات الله ءاناء اليل وهم يسجدون"],[3,"آل عمران","Ali 'Imran",114,"يؤمنون بالله واليوم الاخر ويامرون بالمعروف وينهون عن المنكر ويسارعون في الخيرات واولائك من الصالحين"],[3,"آل عمران","Ali 'Imran",115,"وما يفعلوا من خير فلن يكفروه والله عليم بالمتقين"],[3,"آل عمران","Ali 'Imran",116,"ان الذين كفروا لن تغني عنهم اموالهم ولا اولادهم من الله شيا واولائك اصحاب النار هم فيها خالدون"],[3,"آل عمران","Ali 'Imran",117,"مثل ما ينفقون في هاذه الحيواة الدنيا كمثل ريح فيها صر اصابت حرث قوم ظلموا انفسهم فاهلكته وما ظلمهم الله ولاكن انفسهم يظلمون"],[3,"آل عمران","Ali 'Imran",118,"ياايها الذين ءامنوا لا تتخذوا بطانة من دونكم لا يالونكم خبالا ودوا ما عنتم قد بدت البغضاء من افواههم وما تخفي صدورهم اكبر قد بينا لكم الايات ان كنتم تعقلون"],[3,"آل عمران","Ali 'Imran",119,"هاانتم اولاء تحبونهم ولا يحبونكم وتؤمنون بالكتاب كله واذا لقوكم قالوا ءامنا واذا خلوا عضوا عليكم الانامل من الغيظ قل موتوا بغيظكم ان الله عليم بذات الصدور"],[3,"آل عمران","Ali 'Imran",120,"ان تمسسكم حسنة تسؤهم وان تصبكم سيئة يفرحوا بها وان تصبروا وتتقوا لا يضركم كيدهم شيا ان الله بما يعملون محيط"],[3,"آل عمران","Ali 'Imran",121,"واذ غدوت من اهلك تبوئ المؤمنين مقاعد للقتال والله سميع عليم"],[3,"آل عمران","Ali 'Imran",122,"اذ همت طائفتان منكم ان تفشلا والله وليهما وعلي الله فليتوكل المؤمنون"],[3,"آل عمران","Ali 'Imran",123,"ولقد نصركم الله ببدر وانتم اذلة فاتقوا الله لعلكم تشكرون"],[3,"آل عمران","Ali 'Imran",124,"اذ تقول للمؤمنين الن يكفيكم ان يمدكم ربكم بثلاثة ءالاف من الملائكة منزلين"],[3,"آل عمران","Ali 'Imran",125,"بلي ان تصبروا وتتقوا وياتوكم من فورهم هاذا يمددكم ربكم بخمسة ءالاف من الملائكة مسومين"],[3,"آل عمران","Ali 'Imran",126,"وما جعله الله الا بشري لكم ولتطمئن قلوبكم به وما النصر الا من عند الله العزيز الحكيم"],[3,"آل عمران","Ali 'Imran",127,"ليقطع طرفا من الذين كفروا او يكبتهم فينقلبوا خائبين"],[3,"آل عمران","Ali 'Imran",128,"ليس لك من الامر شيء او يتوب عليهم او يعذبهم فانهم ظالمون"],[3,"آل عمران","Ali 'Imran",129,"ولله ما في السماوات وما في الارض يغفر لمن يشاء ويعذب من يشاء والله غفور رحيم"],[3,"آل عمران","Ali 'Imran",130,"ياايها الذين ءامنوا لا تاكلوا الربواا اضعافا مضاعفة واتقوا الله لعلكم تفلحون"],[3,"آل عمران","Ali 'Imran",131,"واتقوا النار التي اعدت للكافرين"],[3,"آل عمران","Ali 'Imran",132,"واطيعوا الله والرسول لعلكم ترحمون"],[3,"آل عمران","Ali 'Imran",133,"۞وسارعوا الي مغفرة من ربكم وجنة عرضها السماوات والارض اعدت للمتقين"],[3,"آل عمران","Ali 'Imran",134,"الذين ينفقون في السراء والضراء والكاظمين الغيظ والعافين عن الناس والله يحب المحسنين"],[3,"آل عمران","Ali 'Imran",135,"والذين اذا فعلوا فاحشة او ظلموا انفسهم ذكروا الله فاستغفروا لذنوبهم ومن يغفر الذنوب الا الله ولم يصروا علي ما فعلوا وهم يعلمون"],[3,"آل عمران","Ali 'Imran",136,"اولائك جزاؤهم مغفرة من ربهم وجنات تجري من تحتها الانهار خالدين فيها ونعم اجر العاملين"],[3,"آل عمران","Ali 'Imran",137,"قد خلت من قبلكم سنن فسيروا في الارض فانظروا كيف كان عاقبة المكذبين"],[3,"آل عمران","Ali 'Imran",138,"هاذا بيان للناس وهدي وموعظة للمتقين"],[3,"آل عمران","Ali 'Imran",139,"ولا تهنوا ولا تحزنوا وانتم الاعلون ان كنتم مؤمنين"],[3,"آل عمران","Ali 'Imran",140,"ان يمسسكم قرح فقد مس القوم قرح مثله وتلك الايام نداولها بين الناس وليعلم الله الذين ءامنوا ويتخذ منكم شهداء والله لا يحب الظالمين"],[3,"آل عمران","Ali 'Imran",141,"وليمحص الله الذين ءامنوا ويمحق الكافرين"],[3,"آل عمران","Ali 'Imran",142,"ام حسبتم ان تدخلوا الجنة ولما يعلم الله الذين جاهدوا منكم ويعلم الصابرين"],[3,"آل عمران","Ali 'Imran",143,"ولقد كنتم تمنون الموت من قبل ان تلقوه فقد رايتموه وانتم تنظرون"],[3,"آل عمران","Ali 'Imran",144,"وما محمد الا رسول قد خلت من قبله الرسل افاين مات او قتل انقلبتم علي اعقابكم ومن ينقلب علي عقبيه فلن يضر الله شيا وسيجزي الله الشاكرين"],[3,"آل عمران","Ali 'Imran",145,"وما كان لنفس ان تموت الا باذن الله كتابا مؤجلا ومن يرد ثواب الدنيا نؤته منها ومن يرد ثواب الاخرة نؤته منها وسنجزي الشاكرين"],[3,"آل عمران","Ali 'Imran",146,"وكاين من نبي قاتل معه ربيون كثير فما وهنوا لما اصابهم في سبيل الله وما ضعفوا وما استكانوا والله يحب الصابرين"],[3,"آل عمران","Ali 'Imran",147,"وما كان قولهم الا ان قالوا ربنا اغفر لنا ذنوبنا واسرافنا في امرنا وثبت اقدامنا وانصرنا علي القوم الكافرين"],[3,"آل عمران","Ali 'Imran",148,"فاتيهم الله ثواب الدنيا وحسن ثواب الاخرة والله يحب المحسنين"],[3,"آل عمران","Ali 'Imran",149,"ياايها الذين ءامنوا ان تطيعوا الذين كفروا يردوكم علي اعقابكم فتنقلبوا خاسرين"],[3,"آل عمران","Ali 'Imran",150,"بل الله موليكم وهو خير الناصرين"],[3,"آل عمران","Ali 'Imran",151,"سنلقي في قلوب الذين كفروا الرعب بما اشركوا بالله ما لم ينزل به سلطانا وماويهم النار وبئس مثوي الظالمين"],[3,"آل عمران","Ali 'Imran",152,"ولقد صدقكم الله وعده اذ تحسونهم باذنه حتي اذا فشلتم وتنازعتم في الامر وعصيتم من بعد ما اريكم ما تحبون منكم من يريد الدنيا ومنكم من يريد الاخرة ثم صرفكم عنهم ليبتليكم ولقد عفا عنكم والله ذو فضل علي المؤمنين"],[3,"آل عمران","Ali 'Imran",153,"۞اذ تصعدون ولا تلون علي احد والرسول يدعوكم في اخريكم فاثابكم غما بغم لكيلا تحزنوا علي ما فاتكم ولا ما اصابكم والله خبير بما تعملون"],[3,"آل عمران","Ali 'Imran",154,"ثم انزل عليكم من بعد الغم امنة نعاسا يغشي طائفة منكم وطائفة قد اهمتهم انفسهم يظنون بالله غير الحق ظن الجاهلية يقولون هل لنا من الامر من شيء قل ان الامر كله لله يخفون في انفسهم ما لا يبدون لك يقولون لو كان لنا من الامر شيء ما قتلنا هاهنا قل لو كنتم في بيوتكم لبرز الذين كتب عليهم القتل الي مضاجعهم وليبتلي الله ما في صدوركم وليمحص ما في قلوبكم والله عليم بذات الصدور"],[3,"آل عمران","Ali 'Imran",155,"ان الذين تولوا منكم يوم التقي الجمعان انما استزلهم الشيطان ببعض ما كسبوا ولقد عفا الله عنهم ان الله غفور حليم"],[3,"آل عمران","Ali 'Imran",156,"ياايها الذين ءامنوا لا تكونوا كالذين كفروا وقالوا لاخوانهم اذا ضربوا في الارض او كانوا غزي لو كانوا عندنا ما ماتوا وما قتلوا ليجعل الله ذالك حسرة في قلوبهم والله يحي ويميت والله بما تعملون بصير"],[3,"آل عمران","Ali 'Imran",157,"ولئن قتلتم في سبيل الله او متم لمغفرة من الله ورحمة خير مما يجمعون"],[3,"آل عمران","Ali 'Imran",158,"ولئن متم او قتلتم لالي الله تحشرون"],[3,"آل عمران","Ali 'Imran",159,"فبما رحمة من الله لنت لهم ولو كنت فظا غليظ القلب لانفضوا من حولك فاعف عنهم واستغفر لهم وشاورهم في الامر فاذا عزمت فتوكل علي الله ان الله يحب المتوكلين"],[3,"آل عمران","Ali 'Imran",160,"ان ينصركم الله فلا غالب لكم وان يخذلكم فمن ذا الذي ينصركم من بعده وعلي الله فليتوكل المؤمنون"],[3,"آل عمران","Ali 'Imran",161,"وما كان لنبي ان يغل ومن يغلل يات بما غل يوم القيامة ثم توفي كل نفس ما كسبت وهم لا يظلمون"],[3,"آل عمران","Ali 'Imran",162,"افمن اتبع رضوان الله كمن باء بسخط من الله وماويه جهنم وبئس المصير"],[3,"آل عمران","Ali 'Imran",163,"هم درجات عند الله والله بصير بما يعملون"],[3,"آل عمران","Ali 'Imran",164,"لقد من الله علي المؤمنين اذ بعث فيهم رسولا من انفسهم يتلوا عليهم ءاياته ويزكيهم ويعلمهم الكتاب والحكمة وان كانوا من قبل لفي ضلال مبين"],[3,"آل عمران","Ali 'Imran",165,"اولما اصابتكم مصيبة قد اصبتم مثليها قلتم اني هاذا قل هو من عند انفسكم ان الله علي كل شيء قدير"],[3,"آل عمران","Ali 'Imran",166,"وما اصابكم يوم التقي الجمعان فباذن الله وليعلم المؤمنين"],[3,"آل عمران","Ali 'Imran",167,"وليعلم الذين نافقوا وقيل لهم تعالوا قاتلوا في سبيل الله او ادفعوا قالوا لو نعلم قتالا لاتبعناكم هم للكفر يومئذ اقرب منهم للايمان يقولون بافواههم ما ليس في قلوبهم والله اعلم بما يكتمون"],[3,"آل عمران","Ali 'Imran",168,"الذين قالوا لاخوانهم وقعدوا لو اطاعونا ما قتلوا قل فادرءوا عن انفسكم الموت ان كنتم صادقين"],[3,"آل عمران","Ali 'Imran",169,"ولا تحسبن الذين قتلوا في سبيل الله امواتا بل احياء عند ربهم يرزقون"],[3,"آل عمران","Ali 'Imran",170,"فرحين بما ءاتيهم الله من فضله ويستبشرون بالذين لم يلحقوا بهم من خلفهم الا خوف عليهم ولا هم يحزنون"],[3,"آل عمران","Ali 'Imran",171,"۞يستبشرون بنعمة من الله وفضل وان الله لا يضيع اجر المؤمنين"],[3,"آل عمران","Ali 'Imran",172,"الذين استجابوا لله والرسول من بعد ما اصابهم القرح للذين احسنوا منهم واتقوا اجر عظيم"],[3,"آل عمران","Ali 'Imran",173,"الذين قال لهم الناس ان الناس قد جمعوا لكم فاخشوهم فزادهم ايمانا وقالوا حسبنا الله ونعم الوكيل"],[3,"آل عمران","Ali 'Imran",174,"فانقلبوا بنعمة من الله وفضل لم يمسسهم سوء واتبعوا رضوان الله والله ذو فضل عظيم"],[3,"آل عمران","Ali 'Imran",175,"انما ذالكم الشيطان يخوف اولياءه فلا تخافوهم وخافون ان كنتم مؤمنين"],[3,"آل عمران","Ali 'Imran",176,"ولا يحزنك الذين يسارعون في الكفر انهم لن يضروا الله شيا يريد الله الا يجعل لهم حظا في الاخرة ولهم عذاب عظيم"],[3,"آل عمران","Ali 'Imran",177,"ان الذين اشتروا الكفر بالايمان لن يضروا الله شيا ولهم عذاب اليم"],[3,"آل عمران","Ali 'Imran",178,"ولا يحسبن الذين كفروا انما نملي لهم خير لانفسهم انما نملي لهم ليزدادوا اثما ولهم عذاب مهين"],[3,"آل عمران","Ali 'Imran",179,"ما كان الله ليذر المؤمنين علي ما انتم عليه حتي يميز الخبيث من الطيب وما كان الله ليطلعكم علي الغيب ولاكن الله يجتبي من رسله من يشاء فامنوا بالله ورسله وان تؤمنوا وتتقوا فلكم اجر عظيم"],[3,"آل عمران","Ali 'Imran",180,"ولا يحسبن الذين يبخلون بما ءاتيهم الله من فضله هو خيرا لهم بل هو شر لهم سيطوقون ما بخلوا به يوم القيامة ولله ميراث السماوات والارض والله بما تعملون خبير"],[3,"آل عمران","Ali 'Imran",181,"لقد سمع الله قول الذين قالوا ان الله فقير ونحن اغنياء سنكتب ما قالوا وقتلهم الانبياء بغير حق ونقول ذوقوا عذاب الحريق"],[3,"آل عمران","Ali 'Imran",182,"ذالك بما قدمت ايديكم وان الله ليس بظلام للعبيد"],[3,"آل عمران","Ali 'Imran",183,"الذين قالوا ان الله عهد الينا الا نؤمن لرسول حتي ياتينا بقربان تاكله النار قل قد جاءكم رسل من قبلي بالبينات وبالذي قلتم فلم قتلتموهم ان كنتم صادقين"],[3,"آل عمران","Ali 'Imran",184,"فان كذبوك فقد كذب رسل من قبلك جاءو بالبينات والزبر والكتاب المنير"],[3,"آل عمران","Ali 'Imran",185,"كل نفس ذائقة الموت وانما توفون اجوركم يوم القيامة فمن زحزح عن النار وادخل الجنة فقد فاز وما الحيواة الدنيا الا متاع الغرور"],[3,"آل عمران","Ali 'Imran",186,"۞لتبلون في اموالكم وانفسكم ولتسمعن من الذين اوتوا الكتاب من قبلكم ومن الذين اشركوا اذي كثيرا وان تصبروا وتتقوا فان ذالك من عزم الامور"],[3,"آل عمران","Ali 'Imran",187,"واذ اخذ الله ميثاق الذين اوتوا الكتاب لتبيننه للناس ولا تكتمونه فنبذوه وراء ظهورهم واشتروا به ثمنا قليلا فبئس ما يشترون"],[3,"آل عمران","Ali 'Imran",188,"لا تحسبن الذين يفرحون بما اتوا ويحبون ان يحمدوا بما لم يفعلوا فلا تحسبنهم بمفازة من العذاب ولهم عذاب اليم"],[3,"آل عمران","Ali 'Imran",189,"ولله ملك السماوات والارض والله علي كل شيء قدير"],[3,"آل عمران","Ali 'Imran",190,"ان في خلق السماوات والارض واختلاف اليل والنهار لايات لاولي الالباب"],[3,"آل عمران","Ali 'Imran",191,"الذين يذكرون الله قياما وقعودا وعلي جنوبهم ويتفكرون في خلق السماوات والارض ربنا ما خلقت هاذا باطلا سبحانك فقنا عذاب النار"],[3,"آل عمران","Ali 'Imran",192,"ربنا انك من تدخل النار فقد اخزيته وما للظالمين من انصار"],[3,"آل عمران","Ali 'Imran",193,"ربنا اننا سمعنا مناديا ينادي للايمان ان ءامنوا بربكم فامنا ربنا فاغفر لنا ذنوبنا وكفر عنا سياتنا وتوفنا مع الابرار"],[3,"آل عمران","Ali 'Imran",194,"ربنا وءاتنا ما وعدتنا علي رسلك ولا تخزنا يوم القيامة انك لا تخلف الميعاد"],[3,"آل عمران","Ali 'Imran",195,"فاستجاب لهم ربهم اني لا اضيع عمل عامل منكم من ذكر او انثي بعضكم من بعض فالذين هاجروا واخرجوا من ديارهم واوذوا في سبيلي وقاتلوا وقتلوا لاكفرن عنهم سياتهم ولادخلنهم جنات تجري من تحتها الانهار ثوابا من عند الله والله عنده حسن الثواب"],[3,"آل عمران","Ali 'Imran",196,"لا يغرنك تقلب الذين كفروا في البلاد"],[3,"آل عمران","Ali 'Imran",197,"متاع قليل ثم ماويهم جهنم وبئس المهاد"],[3,"آل عمران","Ali 'Imran",198,"لاكن الذين اتقوا ربهم لهم جنات تجري من تحتها الانهار خالدين فيها نزلا من عند الله وما عند الله خير للابرار"],[3,"آل عمران","Ali 'Imran",199,"وان من اهل الكتاب لمن يؤمن بالله وما انزل اليكم وما انزل اليهم خاشعين لله لا يشترون بايات الله ثمنا قليلا اولائك لهم اجرهم عند ربهم ان الله سريع الحساب"],[3,"آل عمران","Ali 'Imran",200,"ياايها الذين ءامنوا اصبروا وصابروا ورابطوا واتقوا الله لعلكم تفلحون"],[4,"النساء","An-Nisa",1,"ياايها الناس اتقوا ربكم الذي خلقكم من نفس واحدة وخلق منها زوجها وبث منهما رجالا كثيرا ونساء واتقوا الله الذي تساءلون به والارحام ان الله كان عليكم رقيبا"],[4,"النساء","An-Nisa",2,"وءاتوا اليتامي اموالهم ولا تتبدلوا الخبيث بالطيب ولا تاكلوا اموالهم الي اموالكم انه كان حوبا كبيرا"],[4,"النساء","An-Nisa",3,"وان خفتم الا تقسطوا في اليتامي فانكحوا ما طاب لكم من النساء مثني وثلاث ورباع فان خفتم الا تعدلوا فواحدة او ما ملكت ايمانكم ذالك ادني الا تعولوا"],[4,"النساء","An-Nisa",4,"وءاتوا النساء صدقاتهن نحلة فان طبن لكم عن شيء منه نفسا فكلوه هنيا مريا"],[4,"النساء","An-Nisa",5,"ولا تؤتوا السفهاء اموالكم التي جعل الله لكم قياما وارزقوهم فيها واكسوهم وقولوا لهم قولا معروفا"],[4,"النساء","An-Nisa",6,"وابتلوا اليتامي حتي اذا بلغوا النكاح فان ءانستم منهم رشدا فادفعوا اليهم اموالهم ولا تاكلوها اسرافا وبدارا ان يكبروا ومن كان غنيا فليستعفف ومن كان فقيرا فلياكل بالمعروف فاذا دفعتم اليهم اموالهم فاشهدوا عليهم وكفي بالله حسيبا"],[4,"النساء","An-Nisa",7,"للرجال نصيب مما ترك الوالدان والاقربون وللنساء نصيب مما ترك الوالدان والاقربون مما قل منه او كثر نصيبا مفروضا"],[4,"النساء","An-Nisa",8,"واذا حضر القسمة اولوا القربي واليتامي والمساكين فارزقوهم منه وقولوا لهم قولا معروفا"],[4,"النساء","An-Nisa",9,"وليخش الذين لو تركوا من خلفهم ذرية ضعافا خافوا عليهم فليتقوا الله وليقولوا قولا سديدا"],[4,"النساء","An-Nisa",10,"ان الذين ياكلون اموال اليتامي ظلما انما ياكلون في بطونهم نارا وسيصلون سعيرا"],[4,"النساء","An-Nisa",11,"يوصيكم الله في اولادكم للذكر مثل حظ الانثيين فان كن نساء فوق اثنتين فلهن ثلثا ما ترك وان كانت واحدة فلها النصف ولابويه لكل واحد منهما السدس مما ترك ان كان له ولد فان لم يكن له ولد وورثه ابواه فلامه الثلث فان كان له اخوة فلامه السدس من بعد وصية يوصي بها او دين ءاباؤكم وابناؤكم لا تدرون ايهم اقرب لكم نفعا فريضة من الله ان الله كان عليما حكيما"],[4,"النساء","An-Nisa",12,"۞ولكم نصف ما ترك ازواجكم ان لم يكن لهن ولد فان كان لهن ولد فلكم الربع مما تركن من بعد وصية يوصين بها او دين ولهن الربع مما تركتم ان لم يكن لكم ولد فان كان لكم ولد فلهن الثمن مما تركتم من بعد وصية توصون بها او دين وان كان رجل يورث كلالة او امراة وله اخ او اخت فلكل واحد منهما السدس فان كانوا اكثر من ذالك فهم شركاء في الثلث من بعد وصية يوصي بها او دين غير مضار وصية من الله والله عليم حليم"],[4,"النساء","An-Nisa",13,"تلك حدود الله ومن يطع الله ورسوله يدخله جنات تجري من تحتها الانهار خالدين فيها وذالك الفوز العظيم"],[4,"النساء","An-Nisa",14,"ومن يعص الله ورسوله ويتعد حدوده يدخله نارا خالدا فيها وله عذاب مهين"],[4,"النساء","An-Nisa",15,"والاتي ياتين الفاحشة من نسائكم فاستشهدوا عليهن اربعة منكم فان شهدوا فامسكوهن في البيوت حتي يتوفيهن الموت او يجعل الله لهن سبيلا"],[4,"النساء","An-Nisa",16,"والذان ياتيانها منكم فاذوهما فان تابا واصلحا فاعرضوا عنهما ان الله كان توابا رحيما"],[4,"النساء","An-Nisa",17,"انما التوبة علي الله للذين يعملون السوء بجهالة ثم يتوبون من قريب فاولائك يتوب الله عليهم وكان الله عليما حكيما"],[4,"النساء","An-Nisa",18,"وليست التوبة للذين يعملون السيات حتي اذا حضر احدهم الموت قال اني تبت الان ولا الذين يموتون وهم كفار اولائك اعتدنا لهم عذابا اليما"],[4,"النساء","An-Nisa",19,"ياايها الذين ءامنوا لا يحل لكم ان ترثوا النساء كرها ولا تعضلوهن لتذهبوا ببعض ما ءاتيتموهن الا ان ياتين بفاحشة مبينة وعاشروهن بالمعروف فان كرهتموهن فعسي ان تكرهوا شيا ويجعل الله فيه خيرا كثيرا"],[4,"النساء","An-Nisa",20,"وان اردتم استبدال زوج مكان زوج وءاتيتم احديهن قنطارا فلا تاخذوا منه شيا اتاخذونه بهتانا واثما مبينا"],[4,"النساء","An-Nisa",21,"وكيف تاخذونه وقد افضي بعضكم الي بعض واخذن منكم ميثاقا غليظا"],[4,"النساء","An-Nisa",22,"ولا تنكحوا ما نكح ءاباؤكم من النساء الا ما قد سلف انه كان فاحشة ومقتا وساء سبيلا"],[4,"النساء","An-Nisa",23,"حرمت عليكم امهاتكم وبناتكم واخواتكم وعماتكم وخالاتكم وبنات الاخ وبنات الاخت وامهاتكم الاتي ارضعنكم واخواتكم من الرضاعة وامهات نسائكم وربائبكم الاتي في حجوركم من نسائكم الاتي دخلتم بهن فان لم تكونوا دخلتم بهن فلا جناح عليكم وحلائل ابنائكم الذين من اصلابكم وان تجمعوا بين الاختين الا ما قد سلف ان الله كان غفورا رحيما"],[4,"النساء","An-Nisa",24,"۞والمحصنات من النساء الا ما ملكت ايمانكم كتاب الله عليكم واحل لكم ما وراء ذالكم ان تبتغوا باموالكم محصنين غير مسافحين فما استمتعتم به منهن فاتوهن اجورهن فريضة ولا جناح عليكم فيما تراضيتم به من بعد الفريضة ان الله كان عليما حكيما"],[4,"النساء","An-Nisa",25,"ومن لم يستطع منكم طولا ان ينكح المحصنات المؤمنات فمن ما ملكت ايمانكم من فتياتكم المؤمنات والله اعلم بايمانكم بعضكم من بعض فانكحوهن باذن اهلهن وءاتوهن اجورهن بالمعروف محصنات غير مسافحات ولا متخذات اخدان فاذا احصن فان اتين بفاحشة فعليهن نصف ما علي المحصنات من العذاب ذالك لمن خشي العنت منكم وان تصبروا خير لكم والله غفور رحيم"],[4,"النساء","An-Nisa",26,"يريد الله ليبين لكم ويهديكم سنن الذين من قبلكم ويتوب عليكم والله عليم حكيم"],[4,"النساء","An-Nisa",27,"والله يريد ان يتوب عليكم ويريد الذين يتبعون الشهوات ان تميلوا ميلا عظيما"],[4,"النساء","An-Nisa",28,"يريد الله ان يخفف عنكم وخلق الا
